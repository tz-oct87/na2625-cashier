<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-950 text-slate-200">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NA2625 | POS PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        .page-content { display: none; height: 100%; overflow-y: auto; }
        .page-content.active { display: block; }
        .nav-btn.active { background: #1e293b; color: #2dd4bf; border-left: 4px solid #2dd4bf; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .modal.active { display: flex; }
        #toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 1rem 2.5rem; border-radius: 1rem; background: #1e293b; border: 1px solid #334155; color: #2dd4bf; font-weight: 800; z-index: 200; opacity: 0; pointer-events: none; transition: all 0.3s; }
        #toast.show { opacity: 1; }
        .spinner { width: 14px; height: 14px; border: 2px solid transparent; border-top-color: currentColor; border-radius: 50%; animation: spin 0.6s linear infinite; display: inline-block; margin-right: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media print {
            body * { visibility: hidden; }
            #receiptArea, #receiptArea * { visibility: visible; }
            #receiptArea { position: absolute; left: 0; top: 0; width: 100%; border: none !important; }
            .no-print { display: none !important; }
        }
    </style>
</head>
<body class="h-full overflow-hidden font-sans">

<div id="toast">SUCCESS</div>

<div id="loginPage" class="fixed inset-0 z-[110] flex items-center justify-center bg-slate-950">
    <div class="w-full max-w-sm p-10 bg-slate-900 rounded-3xl border border-slate-800 text-center">
        <h1 class="text-3xl font-black text-teal-400 mb-8">NA2625</h1>
        <input id="user" type="text" placeholder="Username" class="w-full p-4 mb-4 rounded-xl bg-slate-800 border border-slate-700 outline-none text-center">
        <input id="pass" type="password" placeholder="Password" class="w-full p-4 mb-6 rounded-xl bg-slate-800 border border-slate-700 outline-none text-center">
        <button id="loginBtn" onclick="doLogin()" class="w-full bg-teal-600 p-4 rounded-xl font-bold flex items-center justify-center">SIGN IN</button>
    </div>
</div>

<div id="app" class="flex h-full hidden">
    <nav class="w-64 bg-slate-900 border-r border-slate-800 flex flex-col shrink-0">
        <div class="p-8 text-xl font-black text-white border-b border-slate-800">NA2625 <span class="text-teal-400">POS</span></div>
        <div class="flex-1 p-4 space-y-1">
            <button onclick="showPage('cashier')" class="nav-btn w-full text-left px-6 py-4 rounded-xl font-bold text-slate-400">🛒 Cashier</button>
            <button onclick="showPage('manage')" class="nav-btn w-full text-left px-6 py-4 rounded-xl font-bold text-slate-400">📦 Inventory</button>
            <button onclick="showPage('history')" class="nav-btn w-full text-left px-6 py-4 rounded-xl font-bold text-slate-400">📜 History</button>
            <button onclick="showPage('settings')" class="nav-btn w-full text-left px-6 py-4 rounded-xl font-bold text-slate-400">⚙️ Settings</button>
        </div>
        <div class="p-6 border-t border-slate-800"><button onclick="logout()" class="w-full text-xs font-bold text-red-400 uppercase">Logout</button></div>
    </nav>

    <main class="flex-1 bg-slate-950 p-8 overflow-hidden flex flex-col">
        <div id="page-cashier" class="page-content active h-full">
            <div class="flex gap-8 h-full">
                <div class="flex-1 flex flex-col">
                    <input id="posSearch" oninput="renderProducts()" placeholder="Search items..." class="w-full p-4 bg-slate-900 border border-slate-800 rounded-2xl mb-6 outline-none">
                    <div id="productsGrid" class="grid grid-cols-2 lg:grid-cols-4 gap-4 overflow-y-auto pr-2"></div>
                </div>
                <div class="w-80 bg-slate-900 rounded-3xl p-6 border border-slate-800 flex flex-col">
                    <h3 class="font-bold text-slate-500 text-[10px] mb-4 uppercase">Cart</h3>
                    <div id="cartItems" class="flex-1 overflow-y-auto space-y-2 mb-4"></div>
                    <div class="border-t border-slate-800 pt-4 space-y-4">
                        <div class="flex justify-between text-xl font-black"><span>Total</span><span>Rp<span id="total">0</span></span></div>
                        <input type="number" id="cashInput" placeholder="Cash Amount" class="w-full p-4 bg-slate-800 rounded-xl text-center font-bold outline-none border border-slate-700">
                        <button id="checkoutBtn" onclick="checkout()" class="w-full bg-teal-600 p-4 rounded-xl font-black flex items-center justify-center">CHECKOUT</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="page-manage" class="page-content">
            <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800 mb-8">
                <h3 class="text-teal-400 font-black mb-4 uppercase text-xs">New Product</h3>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <input id="new-name" placeholder="Name" class="bg-slate-800 p-3 rounded-lg text-sm outline-none">
                    <input id="new-sell" type="number" placeholder="Price" class="bg-slate-800 p-3 rounded-lg text-sm outline-none">
                    <input id="new-cost" type="number" placeholder="Cost" class="bg-slate-800 p-3 rounded-lg text-sm outline-none">
                    <input id="new-stock" type="number" placeholder="Stock" class="bg-slate-800 p-3 rounded-lg text-sm outline-none">
                </div>
                <button id="addProdBtn" onclick="addNewProduct()" class="mt-4 w-full bg-teal-600 p-3 rounded-lg font-bold text-xs flex items-center justify-center">ADD TO INVENTORY</button>
            </div>
            <div id="manageList" class="space-y-4"></div>
            <div class="flex justify-center items-center gap-6 mt-8">
                <button onclick="changePage(-1)" class="text-teal-400 font-bold">← Prev</button>
                <span id="pageInfo" class="text-xs font-mono text-slate-500">Page 1</span>
                <button onclick="changePage(1)" class="text-teal-400 font-bold">Next →</button>
            </div>
        </div>

        <div id="page-history" class="page-content">
            <div id="historyList" class="space-y-3"></div>
        </div>

        <div id="page-settings" class="page-content">
            <div class="max-w-md mx-auto bg-slate-900 p-8 rounded-3xl border border-slate-800">
                <h2 class="text-teal-400 font-black mb-6 uppercase tracking-widest">Store Settings</h2>
                <div class="space-y-4">
                    <input id="set-name" placeholder="Store Name" class="w-full bg-slate-800 p-4 rounded-xl outline-none">
                    <textarea id="set-addr" placeholder="Address" class="w-full bg-slate-800 p-4 rounded-xl outline-none h-24"></textarea>
                    <input id="set-note" placeholder="Footer Note" class="w-full bg-slate-800 p-4 rounded-xl outline-none">
                    <button onclick="saveSettings()" class="w-full bg-teal-600 p-4 rounded-xl font-black">SAVE SETTINGS</button>
                </div>
            </div>
        </div>
    </main>
</div>

<div id="invoiceModal" class="modal">
    <div class="bg-white text-slate-900 w-80 p-6 rounded-xl shadow-2xl">
        <div id="receiptArea" class="p-2 text-center bg-white">
            <h2 id="invStoreName" class="font-black text-xl uppercase leading-none">NA2625</h2>
            <p id="invStoreAddr" class="text-[9px] text-slate-500 mb-4 whitespace-pre-wrap">STORE ADDRESS</p>
            <div class="border-y border-dashed border-slate-300 py-2 mb-4 text-[10px] flex justify-between uppercase">
                <span id="invDate">DATE</span><span id="invUser">BY</span>
            </div>
            <div id="receiptItems" class="text-[11px] space-y-1 mb-4 text-left"></div>
            <div class="border-t border-dashed border-slate-300 pt-2 space-y-1">
                <div class="flex justify-between font-black text-sm"><span>TOTAL</span><span id="recTotal">0</span></div>
                <div class="flex justify-between text-[10px]"><span>PAID</span><span id="recPaid">0</span></div>
                <div class="flex justify-between text-[10px] font-bold"><span>CHANGE</span><span id="recChange">0</span></div>
            </div>
            <p id="invNote" class="mt-6 text-[10px] italic border-t border-dashed pt-4">Thank you!</p>
        </div>
        <div class="grid grid-cols-2 gap-2 mt-6 no-print">
            <button onclick="window.print()" class="bg-teal-600 text-white p-3 rounded-lg font-bold text-[10px] uppercase">Print</button>
            <button onclick="saveInvoiceImage()" class="bg-slate-800 text-white p-3 rounded-lg font-bold text-[10px] uppercase">PNG</button>
            <button onclick="closeModal('invoiceModal')" class="col-span-2 bg-slate-200 p-3 rounded-lg font-bold text-[10px] uppercase text-slate-600">Close</button>
        </div>
    </div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbzyqsAt8auGOjzIpsoIMI842UqYyburz8xxmRLC5YTH2_yZhr7t3JN-Dy1YTJhaR1BN/exec"; // RE-PASTE YOUR DEPLOYMENT URL HERE
let products = [], cart = [], currentUser = "", historyData = [];
let currentPage = 1, itemsPerPage = 10;

// HELPERS
function showToast(msg, isError=false) {
    const t = document.getElementById('toast');
    t.innerText = msg;
    t.style.color = isError ? '#f87171' : '#2dd4bf';
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
}

function setBtnLoading(id, isLoading, text) {
    const b = document.getElementById(id);
    if(!b) return;
    b.disabled = isLoading;
    b.innerHTML = isLoading ? `<span class="spinner"></span> Processing...` : text;
    b.style.opacity = isLoading ? "0.6" : "1";
}

// AUTH
async function doLogin() {
    const u = document.getElementById('user').value, p = document.getElementById('pass').value;
    if(!u || !p) return showToast("FILL CREDENTIALS", true);
    setBtnLoading('loginBtn', true, 'SIGN IN');
    try {
        const res = await fetch(API, { method: 'POST', body: JSON.stringify({ type: 'login', user: u, pass: p }) });
        const data = await res.json();
        if(data.success) { localStorage.setItem('NA_POS_USER', u); location.reload(); }
        else showToast("INVALID LOGIN", true);
    } catch(e) { showToast("API ERROR", true); }
    setBtnLoading('loginBtn', false, 'SIGN IN');
}

function logout() { localStorage.removeItem('NA_POS_USER'); location.reload(); }

// SETTINGS
function saveSettings() {
    const data = {
        name: document.getElementById('set-name').value,
        addr: document.getElementById('set-addr').value,
        note: document.getElementById('set-note').value
    };
    localStorage.setItem('NA_POS_SETTINGS', JSON.stringify(data));
    showToast("Settings Saved");
}

function loadSettings() {
    const saved = localStorage.getItem('NA_POS_SETTINGS');
    if (saved) {
        const data = JSON.parse(saved);
        document.getElementById('set-name').value = data.name || "";
        document.getElementById('set-addr').value = data.addr || "";
        document.getElementById('set-note').value = data.note || "";
    }
}

// POS LOGIC
async function loadProducts() {
    try {
        const res = await fetch(API + "?type=products");
        products = await res.json();
        renderProducts();
    } catch(e) { showToast("LOAD ERROR", true); }
}

function renderProducts() {
    const s = document.getElementById('posSearch').value.toLowerCase();
    document.getElementById('productsGrid').innerHTML = products.filter(p => p.name.toLowerCase().includes(s)).map(p => `
        <div onclick="addToCart('${p.name}')" class="bg-slate-900 rounded-2xl p-4 border border-slate-800 hover:border-teal-500 cursor-pointer text-center">
            <p class="font-bold text-[10px] text-white truncate mb-1 uppercase">${p.name}</p>
            <p class="text-teal-400 font-black">Rp${p.sell.toLocaleString()}</p>
            <div class="mt-2 text-[9px] ${p.stock < 5 ? 'text-red-500' : 'text-slate-500'} font-bold uppercase">Stock: ${p.stock}</div>
        </div>`).join("");
}

function addToCart(name) {
    const p = products.find(x => x.name === name);
    if(p.stock <= 0) return showToast("NO STOCK", true);
    let item = cart.find(i => i.name === name);
    if (item) {
        if(item.qty >= p.stock) return showToast("LIMIT REACHED", true);
        item.qty++;
    } else cart.push({ name: p.name, qty: 1, price: p.sell, cost: p.cost });
    renderCart();
}

function renderCart() {
    let total = 0;
    document.getElementById('cartItems').innerHTML = cart.map(i => {
        total += i.qty * i.price;
        return `<div class="flex justify-between bg-slate-800 p-2 rounded-xl text-[10px] items-center">
            <span class="truncate w-24 font-bold uppercase">${i.name}</span>
            <div class="flex items-center gap-2">
                <button onclick="changeQty('${i.name}', -1)" class="bg-slate-700 w-5 h-5 rounded">-</button>
                <span>${i.qty}</span>
                <button onclick="changeQty('${i.name}', 1)" class="bg-slate-700 w-5 h-5 rounded">+</button>
            </div>
        </div>`;
    }).join("");
    document.getElementById('total').innerText = total.toLocaleString();
}

function changeQty(name, delta) {
    let item = cart.find(i => i.name === name);
    const p = products.find(x => x.name === name);
    if (delta > 0 && item.qty >= p.stock) return showToast("NO STOCK", true);
    item.qty += delta;
    if (item.qty <= 0) cart = cart.filter(i => i.name !== name);
    renderCart();
}

async function checkout() {
    const total = cart.reduce((sum, i) => sum + (i.qty * i.price), 0);
    const paid = Number(document.getElementById('cashInput').value || 0);
    if (cart.length === 0) return showToast("CART EMPTY", true);
    if (paid < total) return showToast("SHORT PAYMENT", true);

    setBtnLoading('checkoutBtn', true, 'CHECKOUT');
    try {
        const profit = cart.reduce((sum, i) => sum + (i.qty * (i.price - i.cost)), 0);
        await fetch(API, { method: 'POST', body: JSON.stringify({ 
            type: 'addTransaction', user: currentUser, total, profit, items: JSON.stringify(cart), paid, change: paid - total 
        })});
        showInvoice(currentUser, cart, total, paid, paid-total);
        cart = []; document.getElementById('cashInput').value = "";
        await loadProducts(); renderCart();
    } catch(e) { showToast("CHECKOUT FAIL", true); }
    setBtnLoading('checkoutBtn', false, 'CHECKOUT');
}

// INVOICE UI
function showInvoice(user, items, total, paid, change, dateStr = null) {
    const set = JSON.parse(localStorage.getItem('NA_POS_SETTINGS') || '{}');
    document.getElementById('invStoreName').innerText = set.name || "NA2625";
    document.getElementById('invStoreAddr').innerText = set.addr || "";
    document.getElementById('invNote').innerText = set.note || "Thank you!";
    document.getElementById('invDate').innerText = dateStr || new Date().toLocaleString();
    document.getElementById('invUser').innerText = "BY: " + user;
    document.getElementById('recTotal').innerText = "Rp" + total.toLocaleString();
    document.getElementById('recPaid').innerText = "Rp" + paid.toLocaleString();
    document.getElementById('recChange').innerText = "Rp" + change.toLocaleString();
    document.getElementById('receiptItems').innerHTML = items.map(i => `
        <div class="flex justify-between"><span>${i.name} x${i.qty}</span><span>${(i.qty*i.price).toLocaleString()}</span></div>
    `).join("");
    document.getElementById('invoiceModal').classList.add('active');
}

function saveInvoiceImage() {
    html2canvas(document.querySelector("#receiptArea")).then(canvas => {
        const link = document.createElement('a');
        link.download = `Invoice_${Date.now()}.png`;
        link.href = canvas.toDataURL("image/png");
        link.click();
    });
}

// INVENTORY
async function addNewProduct() {
    const n = document.getElementById('new-name').value, s = Number(document.getElementById('new-sell').value);
    const c = Number(document.getElementById('new-cost').value), st = Number(document.getElementById('new-stock').value);
    if(!n || !s) return showToast("MISSING INFO", true);
    setBtnLoading('addProdBtn', true, 'ADD TO INVENTORY');
    await fetch(API, { method: 'POST', body: JSON.stringify({ type: 'addProduct', name: n, sell: s, cost: c, stock: st }) });
    document.querySelectorAll('#page-manage input').forEach(i => i.value="");
    await loadProducts(); renderManage();
    setBtnLoading('addProdBtn', false, 'ADD TO INVENTORY');
}

function renderManage() {
    const start = (currentPage - 1) * itemsPerPage;
    const paginated = products.slice(start, start + itemsPerPage);
    document.getElementById('pageInfo').innerText = `Page ${currentPage} of ${Math.ceil(products.length / itemsPerPage)}`;
    document.getElementById('manageList').innerHTML = paginated.map((p, idx) => `
        <div class="bg-slate-900 p-4 rounded-xl border border-slate-800 flex flex-wrap items-center justify-between gap-4">
            <p class="font-bold text-[10px] uppercase w-full md:w-1/4">${p.name}</p>
            <div class="flex flex-1 gap-2 justify-end">
                <input id="prc-${idx}" type="number" value="${p.sell}" class="w-20 bg-slate-800 p-2 rounded text-[10px] outline-none border border-slate-700">
                <input id="stk-${idx}" type="number" value="${p.stock}" class="w-16 bg-slate-800 p-2 rounded text-[10px] outline-none border border-slate-700">
                <button id="upd-${idx}" onclick="updateItem('${p.name}', ${idx})" class="bg-teal-600 px-4 py-2 rounded text-[9px] font-bold">SAVE</button>
            </div>
        </div>`).join("");
}

async function updateItem(name, idx) {
    const p = products.find(x => x.name === name);
    const newPrice = Number(document.getElementById(`prc-${idx}`).value);
    const newStock = Number(document.getElementById(`stk-${idx}`).value);
    setBtnLoading(`upd-${idx}`, true, '...');
    await fetch(API, { method: 'POST', body: JSON.stringify({ 
        type: 'editProduct', oldName: name, name: name, sell: newPrice, cost: p.cost, stock: newStock 
    })});
    await loadProducts(); renderManage();
    showToast("UPDATED");
}

function changePage(delta) {
    const max = Math.ceil(products.length / itemsPerPage);
    currentPage = Math.max(1, Math.min(currentPage + delta, max));
    renderManage();
}

// HISTORY
async function fetchHistory() {
    const res = await fetch(API + "?type=transactions");
    historyData = (await res.json()).reverse();
    document.getElementById('historyList').innerHTML = historyData.map((r, idx) => `
        <div class="bg-slate-900 p-4 rounded-xl border border-slate-800 flex justify-between items-center">
            <div>
                <p class="text-[9px] text-slate-500 font-mono">${new Date(r[0]).toLocaleString()}</p>
                <p class="font-black text-teal-400">Rp${Number(r[3]).toLocaleString()}</p>
            </div>
            <button onclick="viewInvoice(${idx})" class="text-[9px] bg-slate-800 px-4 py-2 rounded border border-slate-700 font-bold uppercase">Details</button>
        </div>`).join("");
}

function viewInvoice(idx) {
    const r = historyData[idx];
    showInvoice(r[1], JSON.parse(r[5]), r[3], r[6], r[7], new Date(r[0]).toLocaleString());
}

// NAVIGATION
function showPage(p) {
    document.querySelectorAll('.page-content').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(x => x.classList.remove('active'));
    document.getElementById('page-'+p).classList.add('active');
    if(p === 'history') fetchHistory();
    if(p === 'settings') loadSettings();
    if(p === 'manage') renderManage();
}

function closeModal(id) { document.getElementById(id).classList.remove('active'); }

window.onload = () => {
    const saved = localStorage.getItem('NA_POS_USER');
    if (saved) {
        currentUser = saved;
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('app').classList.remove('hidden');
        loadProducts();
    }
};
</script>
</body>
</html>
