<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NA2625 CREATIVEWORKS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .page-content { display: none; height: 100%; width: 100%; overflow-y: auto; }
        .page-content.active { display: block; }
        .nav-btn.active { background-color: #1A877E; color: white; }
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .modal-overlay.active { display: flex; }
    </style>
</head>
<body class="h-full bg-gray-50 overflow-hidden font-sans text-gray-900">

<div id="successModal" class="modal-overlay">
    <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl text-center max-w-sm w-full mx-6 transform transition-all scale-100">
        <div class="w-20 h-20 bg-teal-100 text-teal-600 rounded-full flex items-center justify-center mx-auto mb-6">
            <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
        </div>
        <h3 class="text-2xl font-black text-gray-800 mb-2">Payment Received</h3>
        <p class="text-gray-500 mb-8 font-medium">Transaction has been saved to the database successfully.</p>
        <button onclick="closeSuccess()" class="w-full bg-teal-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-teal-100 hover:bg-teal-700 transition active:scale-95">CONTINUE</button>
    </div>
</div>

<div id="loginPage" class="fixed inset-0 z-[100] flex items-center justify-center bg-white px-6">
    <div class="w-full max-w-sm p-8 border rounded-3xl shadow-2xl text-center">
        <h1 class="text-2xl font-black text-teal-800 mb-8">NA2625 CREATIVEWORKS</h1>
        <div class="space-y-4">
            <input id="user" type="text" placeholder="Username" class="w-full p-4 border rounded-xl outline-none focus:ring-2 focus:ring-teal-500">
            <input id="pass" type="password" placeholder="Password" class="w-full p-4 border rounded-xl outline-none focus:ring-2 focus:ring-teal-500">
            <button id="loginBtn" class="w-full bg-teal-600 text-white p-4 rounded-xl font-bold">SIGN IN</button>
        </div>
    </div>
</div>

<div id="app" class="flex h-full w-full hidden">
    <nav class="w-72 bg-white border-r flex flex-col h-full shrink-0">
        <div class="p-8 border-b">
            <h2 class="text-xl font-black text-teal-900 leading-tight">NA2625<br>CREATIVEWORKS</h2>
            <p id="userDisplay" class="text-[10px] text-teal-600 mt-2 font-black uppercase"></p>
        </div>
        <div class="flex-1 p-4 space-y-2">
            <button onclick="showPage('cashier')" class="nav-btn w-full text-left px-5 py-4 rounded-2xl font-bold text-gray-500 hover:bg-gray-100 transition">🛒 Cashier</button>
            <button onclick="showPage('inventory')" class="nav-btn w-full text-left px-5 py-4 rounded-2xl font-bold text-gray-500 hover:bg-gray-100 transition">📦 Add Product</button>
            <button onclick="showPage('history')" class="nav-btn w-full text-left px-5 py-4 rounded-2xl font-bold text-gray-500 hover:bg-gray-100 transition">📜 Transactions</button>
        </div>
    </nav>

    <main class="flex-1 relative bg-gray-50 overflow-hidden">
        <div id="page-cashier" class="page-content active p-8">
            <div class="flex gap-8 h-full">
                <div class="flex-1 flex flex-col">
                    <h2 class="text-3xl font-black mb-6">Terminal</h2>
                    <input type="text" id="posSearch" oninput="renderProducts()" placeholder="Search..." class="p-5 rounded-2xl border mb-6 shadow-sm outline-none focus:ring-2 focus:ring-teal-500">
                    <div id="productsGrid" class="grid grid-cols-2 md:grid-cols-4 gap-4 overflow-y-auto pr-2"></div>
                </div>
                <div class="w-96 bg-white rounded-[2.5rem] shadow-xl p-8 flex flex-col">
                    <h3 class="font-black text-gray-400 text-[10px] uppercase mb-6">Cart</h3>
                    <div id="cartItems" class="flex-1 overflow-y-auto space-y-4 mb-6"></div>
                    <div class="border-t pt-6">
                        <div class="flex justify-between text-2xl font-black mb-8"><span>Total</span><span>Rp <span id="total">0</span></span></div>
                        <button onclick="checkout('Cash')" class="w-full bg-teal-600 text-white p-6 rounded-2xl font-black text-lg shadow-lg">PAY NOW</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="page-inventory" class="page-content p-12">
            <div class="max-w-xl mx-auto bg-white p-12 rounded-[2.5rem] shadow-sm border">
                <h2 class="text-2xl font-black mb-10 text-teal-800">Add New Product</h2>
                <div class="space-y-6">
                    <input id="pName" placeholder="Product Name" class="w-full p-4 bg-gray-50 border rounded-xl">
                    <div class="grid grid-cols-2 gap-4">
                        <input id="pSell" type="number" placeholder="Sell Price" class="w-full p-4 bg-gray-50 border rounded-xl">
                        <input id="pCost" type="number" placeholder="Cost Price" class="w-full p-4 bg-gray-50 border rounded-xl">
                    </div>
                    <input id="pStock" type="number" placeholder="Initial Stock" class="w-full p-4 bg-gray-50 border rounded-xl">
                    <button onclick="saveProduct()" id="saveBtn" class="w-full bg-teal-600 text-white p-5 rounded-2xl font-black">SAVE PRODUCT</button>
                </div>
            </div>
        </div>

        <div id="page-history" class="page-content p-12">
            <h2 class="text-2xl font-black mb-8">History</h2>
            <div class="bg-white rounded-3xl shadow-sm border overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 border-b">
                        <tr class="text-[10px] font-black text-gray-400 uppercase"><th class="p-6">Date</th><th class="p-6">User</th><th class="p-6">Total</th><th class="p-6">Detail</th></tr>
                    </thead>
                    <tbody id="historyList" class="divide-y text-sm"></tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbyQmwrik6rlEyYil188g4peiw0rAmcZ1qdtaw6yUNrrk39xaQm_WFO3aqAV7PCS0YF-/exec"; 
let products = [], cart = [], historyData = [], currentUser = "";

// BASIC FUNCTIONS
function showPage(pageId) {
    document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
    document.getElementById('page-' + pageId).classList.add('active');
    if(pageId === 'history') fetchHistory();
}

document.getElementById('loginBtn').onclick = async () => {
    const u = document.getElementById('user').value, p = document.getElementById('pass').value;
    const res = await fetch(API, { method: 'POST', body: JSON.stringify({ type: 'login', user: u, pass: p }) });
    const data = await res.json();
    if(data.success) {
        currentUser = u;
        document.getElementById('userDisplay').innerText = u;
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('app').classList.remove('hidden');
        loadProducts(); showPage('cashier');
    }
};

// ADD PRODUCT FIX
async function saveProduct() {
    const btn = document.getElementById('saveBtn'); btn.disabled = true; btn.innerText = "Saving...";
    const payload = {
        type: 'addProduct',
        name: document.getElementById('pName').value,
        sell: document.getElementById('pSell').value,
        cost: document.getElementById('pCost').value,
        stock: document.getElementById('pStock').value
    };
    await fetch(API, { method: 'POST', body: JSON.stringify(payload) });
    alert("Product Added!");
    document.querySelectorAll('#page-inventory input').forEach(i => i.value = "");
    btn.disabled = false; btn.innerText = "SAVE PRODUCT";
    loadProducts();
}

async function loadProducts() {
    const res = await fetch(API + "?type=products");
    const data = await res.json();
    products = data.slice(1).map(r => ({ name: r[0], sell: +r[1], stock: +r[3] }));
    renderProducts();
}

function renderProducts() {
    const grid = document.getElementById('productsGrid');
    grid.innerHTML = products.map(p => `
        <div onclick="updateQuantity('${p.name}', 1)" class="bg-white p-6 rounded-3xl border hover:border-teal-500 cursor-pointer shadow-sm active:scale-95 transition">
            <div class="font-bold">${p.name}</div>
            <div class="text-teal-600 font-black text-sm">Rp ${p.sell.toLocaleString()}</div>
        </div>`).join("");
}

function updateQuantity(name, change) {
    let item = cart.find(i => i.name === name);
    if (!item && change > 0) {
        const p = products.find(x => x.name === name);
        cart.push({ name: p.name, qty: 1, price: p.sell });
    } else if (item) {
        item.qty += change;
        if (item.qty <= 0) cart = cart.filter(i => i.name !== name);
    }
    renderCart();
}

function renderCart() {
    let total = 0;
    const itemsDiv = document.getElementById('cartItems');
    itemsDiv.innerHTML = cart.map(i => {
        total += i.qty * i.price;
        return `<div class="flex justify-between items-center p-4 bg-gray-50 rounded-2xl border">
            <div class="text-xs font-black">${i.name} x${i.qty}</div>
            <div class="flex gap-2"><button onclick="updateQuantity('${i.name}',-1)" class="w-6 h-6 rounded-full bg-white border">-</button><button onclick="updateQuantity('${i.name}',1)" class="w-6 h-6 rounded-full bg-white border">+</button></div>
        </div>`;
    }).join("");
    document.getElementById('total').innerText = total.toLocaleString();
}

// CHECKOUT & MODAL FIX
async function checkout(method) {
    if(!cart.length) return;
    const payload = { type: 'addTransaction', user: currentUser, payment: method, items: JSON.stringify(cart) };
    await fetch(API, { method: 'POST', body: JSON.stringify(payload) });
    document.getElementById('successModal').classList.add('active');
    cart = []; renderCart(); loadProducts();
}

function closeSuccess() { document.getElementById('successModal').classList.remove('active'); }

async function fetchHistory() {
    const res = await fetch(API + "?type=transactions");
    const data = await res.json();
    historyData = data.slice(1).reverse();
    document.getElementById('historyList').innerHTML = historyData.map(r => `
        <tr><td class="p-6 text-gray-400 font-mono text-[10px]">${new Date(r[0]).toLocaleDateString()}</td><td class="p-6 font-bold uppercase text-xs">${r[1]}</td><td class="p-6 font-black text-teal-700">Rp ${Number(r[3]).toLocaleString()}</td><td class="p-6"><button class="text-teal-600 font-black text-[10px] underline">VIEW MORE</button></td></tr>
    `).join("");
}
</script>
</body>
</html>
