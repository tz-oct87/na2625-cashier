<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/html5-qrcode"></script>
</head>

<body class="p-4">

<!-- LOGIN -->
<div id="loginPage">
  <h2>Login</h2>
  <input id="user" placeholder="Username" class="border p-2"><br><br>
  <input id="pass" type="password" placeholder="Password" class="border p-2"><br><br>
  <button onclick="login()" class="bg-green-500 text-white p-2">Login</button>
</div>

<!-- APP -->
<div id="app" style="display:none">

<h2>Cashier</h2>

<div id="reader" style="width:300px"></div>

<div id="products"></div>

<h3>Cart</h3>
<div id="cart"></div>
Total: <b id="total">0</b>

<button onclick="checkout('cash')" class="bg-green-500 text-white p-2 w-full mt-2">Cash</button>

<hr>

<h3>Add Product</h3>
<input id="pName" placeholder="Name"><br>
<input id="pSell" placeholder="Sell"><br>
<input id="pCost" placeholder="Cost"><br>
<input id="pStock" placeholder="Stock"><br>
<input id="pBarcode" placeholder="Barcode"><br>
<button onclick="addProduct()">Add</button>

</div>

<script>
const API="https://script.google.com/macros/s/AKfycbwjm3UYSNMIDtMr3-A-eKSbIrpShxUeJTl4WsBoOCFtlgpfaJJTIhgDJGbnJCrQVsvO/exec";

let products=[],cart=[],userName="";

/* LOGIN */
async function login(){
  let res=await fetch(API,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({type:"login",user:user.value,pass:pass.value})
  });

  let data=await res.json();

  if(data.success){
    userName=user.value;
    loginPage.style.display="none";
    app.style.display="block";
    load();
    startScanner();
  }else alert("Login failed");
}

/* LOAD */
async function load(){
  let res=await fetch(API+"?type=products");
  let data=await res.json();

  products=data.slice(1).map(p=>({
    name:p[0],
    sell:+p[1],
    cost:+p[2],
    stock:+p[3],
    barcode:p[5]
  }));

  renderProducts();
}

/* RENDER PRODUCTS */
function renderProducts(){
  productsDiv=document.getElementById("products");

  productsDiv.innerHTML=products.map(p=>`
    <div onclick="addToCart('${p.name}')" class="border p-2 mb-2">
      ${p.name} - Rp ${p.sell} (${p.stock})
    </div>
  `).join("");
}

/* CART */
function addToCart(name){
  let p=products.find(x=>x.name===name);
  let ex=cart.find(i=>i.name===name);

  if(ex) ex.qty++;
  else cart.push({name:p.name,qty:1,price:p.sell});

  renderCart();
}

function renderCart(){
  let t=0;

  cartDiv=document.getElementById("cart");

  cartDiv.innerHTML=cart.map(i=>{
    let sub=i.qty*i.price;
    t+=sub;
    return `${i.name} x${i.qty} = ${sub}<br>`;
  }).join("");

  total.innerText=t;
}

/* CHECKOUT */
async function checkout(method){
  if(cart.length===0) return;

  await fetch(API,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      type:"addTransaction",
      user:userName,
      items:JSON.stringify(cart),
      payment:method
    })
  });

  printReceipt();

  cart=[];
  renderCart();
  load();
}

/* ADD PRODUCT */
async function addProduct(){
  await fetch(API,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      type:"addProduct",
      name:pName.value,
      sell:pSell.value,
      cost:pCost.value,
      stock:pStock.value,
      barcode:pBarcode.value
    })
  });

  alert("Added!");
  load();
}

/* RECEIPT */
function printReceipt(){
  let w=window.open("","","width=300");

  w.document.write(cart.map(i=>`${i.name} x${i.qty}`).join("<br>"));
  w.document.write("<hr>Total: "+total.innerText);

  w.print();
}

/* SCANNER */
function startScanner(){
  const scanner=new Html5Qrcode("reader");

  scanner.start({facingMode:"environment"},{fps:10,qrbox:250},
    code=>{
      let p=products.find(x=>x.barcode==code);
      if(p) addToCart(p.name);
    }
  );
}
</script>

</body>
</html>
