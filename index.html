<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<title>POS Level 3</title>
<style>
.modal {display:none;position:fixed;z-index:50;left:0;top:0;width:100%;height:100%;overflow:auto;background:rgba(0,0,0,0.5);}
.modal-content {background:white;margin:10% auto;padding:20px;border-radius:8px;width:90%;max-width:400px;}
.card {border-radius:8px;padding:10px;background:#fff;box-shadow:0 2px 5px rgba(0,0,0,0.1);}
.cursor-pointer{cursor:pointer;}
</style>
</head>
<body class="p-4 bg-gray-100">

<!-- LOGIN -->
<div id="loginPage" class="max-w-md mx-auto">
  <h2 class="text-xl mb-2">Login</h2>
  <input id="user" placeholder="Username" class="border p-2 w-full mb-2"><br>
  <input id="pass" type="password" placeholder="Password" class="border p-2 w-full mb-2"><br>
  <button onclick="login()" class="bg-green-500 text-white p-2 w-full mb-2">Login</button>
  <button onclick="openRegister()" class="bg-blue-500 text-white p-2 w-full">Register</button>
</div>

<!-- REGISTER MODAL -->
<div id="registerModal" class="modal">
  <div class="modal-content">
    <h2 class="text-xl mb-2">Register</h2>
    <input id="rUser" placeholder="Username" class="border p-2 w-full mb-2"><br>
    <input id="rPass" type="password" placeholder="Password" class="border p-2 w-full mb-2"><br>
    <select id="rRole" class="border p-2 w-full mb-2"><option value="staff">Staff</option><option value="admin">Admin</option></select><br>
    <button onclick="register()" class="bg-green-500 text-white p-2 w-full mb-2">Register</button>
    <button onclick="closeRegister()" class="bg-gray-500 text-white p-2 w-full">Cancel</button>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">

<h1 class="text-xl mb-3">Cashier</h1>

<div class="mb-2">
  <input id="barcodeInput" placeholder="Scan barcode" class="border p-2 w-full mb-2">
</div>

<div id="reader" class="mb-2"></div>

<div id="productsGrid" class="grid grid-cols-2 md:grid-cols-3 gap-2 mb-2"></div>

<h2 class="mt-4">Cart</h2>
<div id="cartItems" class="mb-2"></div>
<div>Total: <b id="total">0</b></div>

<button onclick="checkout('cash')" class="bg-green-500 text-white p-2 w-full mt-2">Cash</button>
<button onclick="payQRIS()" class="bg-purple-500 text-white p-2 w-full mt-2">QRIS</button>

<hr class="my-4">

<h2>Analytics</h2>
<canvas id="chart"></canvas>

<hr class="my-4">

<h2>Products Management</h2>
<div id="productForm" class="card mb-2">
  <input id="pName" placeholder="Name" class="border p-1 w-full mb-1">
  <input id="pSell" placeholder="Sell" class="border p-1 w-full mb-1">
  <input id="pCost" placeholder="Cost" class="border p-1 w-full mb-1">
  <input id="pStock" placeholder="Stock" class="border p-1 w-full mb-1">
  <input id="pBarcode" placeholder="Barcode" class="border p-1 w-full mb-1">
  <button onclick="addProduct()" class="bg-blue-500 text-white p-2 w-full mb-1">Add Product</button>
</div>

<div id="productList" class="space-y-2"></div>

</div>

<script>
const API="https://script.google.com/macros/s/AKfycbzd2rLfQAKNcbx1k5oFv8m4xGcqeHJCM-hCMRa0VJRYn58xMjdMOdLA5o8IrKlxZhUo/exec";

let products=[], cart=[], currentUser="";

/* LOGIN / REGISTER MODAL */
function openRegister(){document.getElementById("registerModal").style.display="block";}
function closeRegister(){document.getElementById("registerModal").style.display="none";}
async function login(){
  const res = await fetch(API,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({type:"login",user:user.value,pass:pass.value})});
  const data = await res.json();
  if(data.success){currentUser=user.value; loginPage.style.display="none"; app.classList.remove("hidden"); load(); startScanner();}
  else alert("Login failed");
}
async function register(){
  const res = await fetch(API,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({type:"register",user:rUser.value,pass:rPass.value,role:rRole.value})});
  const data = await res.json();
  if(data.success){alert("Registered! Login now."); closeRegister();} else alert(data.error||"Failed");
}

/* LOAD PRODUCTS */
async function load(){
  let res = await fetch(API+"?type=products"); let data = await res.json();
  products = data.slice(1).map(p=>({name:p[0],sell:+p[1],cost:+p[2],stock:+p[3],barcode:p[5]}));
  renderProducts(); renderProductList(); loadAnalytics();
}

/* RENDER PRODUCTS GRID */
function renderProducts(){
  productsGrid.innerHTML = products.map(p=>`<div onclick="addToCart('${p.name}')" class="card cursor-pointer">${p.name}<br>Rp ${p.sell}</div>`).join("");
}

/* RENDER PRODUCT LIST WITH DELETE */
function renderProductList(){
  productList.innerHTML = products.map(p=>`<div class="card flex justify-between">${p.name} (${p.stock}) <button onclick="deleteProduct('${p.name}')" class="text-red-500">❌</button></div>`).join("");
}

/* ADD PRODUCT */
async function addProduct(){
  await fetch(API,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({type:"addProduct",name:pName.value,sell:pSell.value,cost:pCost.value,stock:pStock.value,barcode:pBarcode.value})});
  pName.value="";pSell.value="";pCost.value="";pStock.value="";pBarcode.value="";
  load();
}

/* DELETE PRODUCT */
async function deleteProduct(name){
  await fetch(API,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({type:"deleteProduct",name})});
  load();
}

/* CART */
function addToCart(name){
  let p = products.find(x=>x.name===name);
  let ex = cart.find(i=>i.name===name); if(ex) ex.qty++; else cart.push({name:p.name,qty:1,price:p.sell}); renderCart();
}
function renderCart(){
  let t=0; cartItems.innerHTML = cart.map(i=>{let sub=i.qty*i.price;t+=sub; return `${i.name} x${i.qty}=${sub}<br>`}).join(""); total.innerText=t;
}

/* CHECKOUT */
async function checkout(method){
  if(cart.length===0) return;
  const payload = {type:"addTransaction",user:currentUser,items:JSON.stringify(cart),payment:method};
  try{ await fetch(API,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});
    printReceipt(); cart=[]; renderCart(); load();
  }catch(e){saveOffline(payload);}
}

/* QRIS */
function payQRIS(){ let url="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=PAY-"+total.innerText; let w=window.open(""); w.document.write(`<img src="${url}">`); }

/* RECEIPT */
function printReceipt(){ let w=window.open("","","width=300"); w.document.write(`<style>body{font-family:monospace;width:80mm}</style>${cart.map(i=>`${i.name} x${i.qty}=${i.qty*i.price}`).join("<br>")}<hr>Total:${total.innerText}`); w.print(); }

/* OFFLINE QUEUE */
function saveOffline(d){ let q=JSON.parse(localStorage.getItem("q")||"[]"); q.push(d); localStorage.setItem("q",JSON.stringify(q)); }

/* BARCODE SCANNER */
function startScanner(){
  const scanner = new Html5Qrcode("reader");
  scanner.start({facingMode:"environment"},{fps:10,qrbox:250}, code=>{
    let p=products.find(x=>x.barcode==code); if(p) addToCart(p.name);
  });
}

/* ANALYTICS */
async function loadAnalytics(){
  let res = await fetch(API+"?type=transactions"); let data = await res.json();
  let daily={};
  data.slice(1).forEach(r=>{let d=new Date(r[0]).toLocaleDateString(); daily[d]=(daily[d]||0)+Number(r[3]);});
  new Chart(chart,{type:"line",data:{labels:Object.keys(daily),datasets:[{data:Object.values(daily),label:"Revenue"}]}});
}
</script>
</body>
</html>
