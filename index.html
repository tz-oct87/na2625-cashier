<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-950 text-slate-200">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NA2625 | DARK POS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        .page-content { display: none; height: 100%; overflow-y: auto; }
        .page-content.active { display: block; }
        .nav-btn.active { background: #1e293b; color: #2dd4bf; border-left: 4px solid #2dd4bf; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 50; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .modal.active { display: flex; }
    </style>
</head>
<body class="h-full overflow-hidden font-sans">

<div id="loginPage" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-950">
    <div class="w-full max-w-sm p-10 bg-slate-900 rounded-3xl border border-slate-800 shadow-2xl">
        <h1 class="text-3xl font-black text-teal-400 mb-8 text-center">NA2625</h1>
        <div class="space-y-4">
            <input id="user" type="text" placeholder="Username" class="w-full p-4 rounded-xl bg-slate-800 border border-slate-700 outline-none focus:ring-2 focus:ring-teal-500">
            <input id="pass" type="password" placeholder="Password" class="w-full p-4 rounded-xl bg-slate-800 border border-slate-700 outline-none focus:ring-2 focus:ring-teal-500">
            <button id="loginBtn" class="w-full bg-teal-600 hover:bg-teal-500 p-4 rounded-xl font-bold transition">SIGN IN</button>
        </div>
    </div>
</div>

<div id="detailModal" class="modal">
    <div class="bg-slate-900 w-full max-w-md rounded-3xl p-8 border border-slate-800 shadow-2xl">
        <h3 class="text-xl font-bold mb-6 text-teal-400">Transaction Details</h3>
        <div id="detailContent" class="space-y-4 text-sm"></div>
        <button onclick="closeModal('detailModal')" class="w-full mt-8 bg-slate-800 p-4 rounded-xl font-bold">Close</button>
    </div>
</div>

<div id="app" class="flex h-full hidden">
    <nav class="w-64 bg-slate-900 border-r border-slate-800 flex flex-col h-full">
        <div class="p-8 text-xl font-black text-teal-400 border-b border-slate-800">NA2625</div>
        <div class="flex-1 p-4 space-y-1">
            <button onclick="showPage('cashier')" class="nav-btn w-full text-left px-6 py-4 rounded-xl font-bold text-slate-400 hover:bg-slate-800">🛒 Cashier</button>
            <button onclick="showPage('manage')" class="nav-btn w-full text-left px-6 py-4 rounded-xl font-bold text-slate-400 hover:bg-slate-800">📦 Inventory</button>
            <button onclick="showPage('history')" class="nav-btn w-full text-left px-6 py-4 rounded-xl font-bold text-slate-400 hover:bg-slate-800">📜 History</button>
        </div>
        <div class="p-6 border-t border-slate-800">
            <button onclick="logout()" class="text-xs font-bold text-red-400 uppercase">Logout</button>
        </div>
    </nav>

    <main class="flex-1 bg-slate-950 p-10">
        <div id="page-cashier" class="page-content active">
            <div class="flex gap-8 h-full">
                <div class="flex-1">
                    <input id="posSearch" oninput="renderProducts()" placeholder="Search products..." class="w-full p-4 bg-slate-900 border border-slate-800 rounded-2xl mb-8 outline-none focus:border-teal-500">
                    <div id="productsGrid" class="grid grid-cols-2 lg:grid-cols-4 gap-6"></div>
                </div>
                <div class="w-96 bg-slate-900 rounded-3xl p-8 border border-slate-800 flex flex-col shadow-xl">
                    <h3 class="font-bold text-slate-500 uppercase text-xs tracking-widest mb-6">Current Order</h3>
                    <div id="cartItems" class="flex-1 overflow-y-auto space-y-3 mb-6"></div>
                    <div class="border-t border-slate-800 pt-6 space-y-4">
                        <div class="flex justify-between text-2xl font-black text-white"><span>Total</span><span>Rp<span id="total">0</span></span></div>
                        <input type="number" id="cashInput" placeholder="Buyer's Cash" class="w-full p-4 bg-slate-800 rounded-xl text-center font-bold text-lg outline-none border border-slate-700 focus:border-teal-500">
                        <button onclick="checkout()" class="w-full bg-teal-600 p-5 rounded-xl font-black text-lg hover:bg-teal-500 active:scale-95 transition shadow-lg shadow-teal-900/20">CHECKOUT</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="page-manage" class="page-content">
            <div class="flex justify-between items-center mb-10">
                <h2 class="text-3xl font-black">Inventory</h2>
                <button onclick="showPage('add')" class="bg-teal-600 px-6 py-3 rounded-xl font-bold">+ New Item</button>
            </div>
            <div id="manageList" class="grid gap-4"></div>
        </div>

        <div id="page-add" class="page-content">
            <div class="max-w-xl mx-auto bg-slate-900 p-10 rounded-3xl border border-slate-800">
                <h2 class="text-2xl font-bold mb-8">Add Product</h2>
                <div class="space-y-4">
                    <input id="pName" placeholder="Product Name" class="w-full p-4 bg-slate-800 rounded-xl border border-slate-700">
                    <div class="grid grid-cols-2 gap-4">
                        <input id="pSell" type="number" placeholder="Selling Price" class="p-4 bg-slate-800 rounded-xl border border-slate-700">
                        <input id="pCost" type="number" placeholder="Factory Cost" class="p-4 bg-slate-800 rounded-xl border border-slate-700">
                    </div>
                    <input id="pStock" type="number" placeholder="Stock" class="p-4 bg-slate-800 rounded-xl border border-slate-700">
                    <div class="p-4 bg-slate-800 rounded-xl border border-slate-700 border-dashed text-center">
                        <input type="file" id="pImgInput" onchange="handleFileUpload(this)" class="hidden">
                        <label for="pImgInput" class="cursor-pointer text-teal-400 font-bold block" id="uploadLabel">Click to upload photo</label>
                        <input type="hidden" id="pImgId">
                    </div>
                    <button onclick="saveProduct()" class="w-full bg-teal-600 p-4 rounded-xl font-bold mt-4">Save Product</button>
                </div>
            </div>
        </div>

        <div id="page-history" class="page-content">
            <h2 class="text-3xl font-black mb-8">History</h2>
            <div id="historyList" class="space-y-4"></div>
        </div>
    </main>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbyVljg8Nh46FhtVipm2qDLmO2lWstKAKrkIvt3OnwFvsF1yaHao_iCcF5aD5NrATpOr/exec";
let products = [], cart = [], currentUser = "";

// Check Session
window.onload = () => {
    const savedUser = localStorage.getItem('NA_POS_USER');
    if (savedUser) {
        currentUser = savedUser;
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('app').classList.remove('hidden');
        loadProducts();
        showPage('cashier');
    }
};

function logout() { localStorage.removeItem('NA_POS_USER'); location.reload(); }

function showPage(p) {
    document.querySelectorAll('.page-content').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(x => x.classList.remove('active'));
    document.getElementById('page-'+p).classList.add('active');
    if(p === 'history') fetchHistory();
}

function closeModal(id) { document.getElementById(id).classList.remove('active'); }

// File Upload to Config Sheet
async function handleFileUpload(input) {
    if (!input.files[0]) return;
    document.getElementById('uploadLabel').innerText = "Uploading...";
    const reader = new FileReader();
    reader.onload = async (e) => {
        const res = await fetch(API, { method: 'POST', body: JSON.stringify({ type: 'uploadImage', base64: e.target.result }) });
        const data = await res.json();
        if (data.success) {
            document.getElementById('pImgId').value = data.imgId;
            document.getElementById('uploadLabel').innerText = "Photo Ready ✅";
        }
    };
    reader.readAsDataURL(input.files[0]);
}

// Auth
document.getElementById('loginBtn').onclick = async () => {
    const u = document.getElementById('user').value, p = document.getElementById('pass').value;
    const res = await fetch(API, { method: 'POST', body: JSON.stringify({ type: 'login', user: u, pass: p }) });
    const data = await res.json();
    if(data.success) {
        localStorage.setItem('NA_POS_USER', u);
        location.reload();
    } else { alert("Login failed"); }
};

async function loadProducts() {
    const res = await fetch(API + "?type=products");
    products = await res.json();
    renderProducts();
    renderManage();
}

function renderProducts() {
    const s = document.getElementById('posSearch').value.toLowerCase();
    document.getElementById('productsGrid').innerHTML = products.filter(p => p.name.toLowerCase().includes(s)).map(p => `
        <div onclick="addToCart('${p.name}')" class="bg-slate-900 rounded-3xl p-4 border border-slate-800 hover:border-teal-500/50 cursor-pointer transition">
            <img src="${p.imgId ? API + '?type=img&id=' + p.imgId : 'https://via.placeholder.com/150'}" class="w-full h-32 object-cover rounded-2xl mb-4">
            <div class="text-center">
                <p class="font-bold text-sm truncate">${p.name}</p>
                <p class="text-teal-400 font-black">Rp${p.sell.toLocaleString()}</p>
                <p class="text-[10px] text-slate-500 mt-1">Stock: ${p.stock}</p>
            </div>
        </div>`).join("");
}

function addToCart(name) {
    const p = products.find(x => x.name === name);
    let item = cart.find(i => i.name === name);
    if (item) item.qty++;
    else cart.push({ name: p.name, qty: 1, price: p.sell, cost: p.cost });
    renderCart();
}

function renderCart() {
    let total = 0;
    document.getElementById('cartItems').innerHTML = cart.map(i => {
        total += i.qty * i.price;
        return `<div class="flex justify-between items-center p-4 bg-slate-800 rounded-2xl">
            <div class="text-xs font-bold">${i.name} <span class="text-teal-400">x${i.qty}</span></div>
            <div class="text-xs font-black">Rp${(i.qty * i.price).toLocaleString()}</div>
        </div>`;
    }).join("");
    document.getElementById('total').innerText = total.toLocaleString();
}

async function checkout() {
    const total = cart.reduce((sum, i) => sum + (i.qty * i.price), 0);
    const paid = Number(document.getElementById('cashInput').value || 0);
    if (paid < total) return alert("Cash not enough!");
    
    const profit = cart.reduce((sum, i) => sum + (i.qty * (i.price - i.cost)), 0);
    const payload = { type: 'addTransaction', user: currentUser, total, profit, items: JSON.stringify(cart), paid, change: paid - total };
    
    await fetch(API, { method: 'POST', body: JSON.stringify(payload) });
    alert("Transaction Successful!");
    cart = [];
    document.getElementById('cashInput').value = "";
    loadProducts();
    renderCart();
}

async function fetchHistory() {
    const res = await fetch(API + "?type=transactions");
    const data = (await res.json()).slice(1).reverse();
    document.getElementById('historyList').innerHTML = data.map((r, idx) => `
        <div onclick="viewDetail('${encodeURIComponent(r[5])}')" class="bg-slate-900 p-6 rounded-2xl border border-slate-800 flex justify-between items-center cursor-pointer hover:bg-slate-800 transition">
            <div>
                <p class="text-[10px] text-slate-500 uppercase">${new Date(r[0]).toLocaleString()}</p>
                <p class="font-bold text-teal-400">Rp${r[3].toLocaleString()}</p>
            </div>
            <div class="text-right">
                <p class="text-xs font-bold">Staff: ${r[1]}</p>
                <p class="text-[10px] text-teal-600">View Detail →</p>
            </div>
        </div>`).join("");
}

function viewDetail(encodedItems) {
    const items = JSON.parse(decodeURIComponent(encodedItems));
    document.getElementById('detailContent').innerHTML = items.map(i => `
        <div class="flex justify-between border-b border-slate-800 pb-2">
            <span>${i.name} x${i.qty}</span>
            <span class="font-bold">Rp${(i.qty * i.price).toLocaleString()}</span>
        </div>`).join("");
    document.getElementById('detailModal').classList.add('active');
}

function renderManage() {
    document.getElementById('manageList').innerHTML = products.map((p, idx) => `
        <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <img src="${p.imgId ? API + '?type=img&id=' + p.imgId : 'https://via.placeholder.com/150'}" class="w-12 h-12 rounded-lg object-cover">
                <div>
                    <p class="font-bold">${p.name}</p>
                    <p class="text-xs text-slate-500">Stock: ${p.stock}</p>
                </div>
            </div>
            <p class="font-black text-teal-400">Rp${p.sell.toLocaleString()}</p>
        </div>`).join("");
}

async function saveProduct() {
    const payload = {
        type: 'addProduct',
        name: document.getElementById('pName').value,
        sell: Number(document.getElementById('pSell').value),
        cost: Number(document.getElementById('pCost').value),
        stock: Number(document.getElementById('pStock').value),
        imgId: document.getElementById('pImgId').value
    };
    await fetch(API, { method: 'POST', body: JSON.stringify(payload) });
    alert("Product Added");
    loadProducts();
    showPage('manage');
}
</script>
</body>
</html>
