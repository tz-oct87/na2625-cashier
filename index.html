<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-950 text-slate-200">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NA2625 | DARK POS PRO</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
.page-content{display:none;height:100%;overflow-y:auto;}
.page-content.active{display:block;}
.nav-btn.active{background:#1e293b;color:#2dd4bf;border-left:4px solid #2dd4bf;}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:100;align-items:center;justify-content:center;}
.modal.active{display:flex;}
</style>
</head>

<body class="h-full overflow-hidden font-sans">

<!-- HISTORY MODAL -->
<div id="historyModal" class="modal">
<div class="bg-slate-900 p-6 rounded-xl w-96">
<h3 class="text-teal-400 font-bold mb-4">Order Details</h3>
<div id="historyDetailContent"></div>
<button onclick="closeModal('historyModal')" class="w-full mt-4 bg-slate-800 p-3 rounded">Close</button>
</div>
</div>

<!-- RECEIPT -->
<div id="invoiceModal" class="modal">
<div class="bg-white text-black p-6 w-80 rounded-xl">
<div id="receiptArea">
<h2 class="text-center font-bold mb-4">Receipt</h2>
<div id="receiptItems"></div>
<hr class="my-2">
<div>Total: <span id="recTotal"></span></div>
<div>Paid: <span id="recPaid"></span></div>
<div>Change: <span id="recChange"></span></div>
</div>
<button onclick="downloadReceipt()" class="w-full mt-3 bg-teal-600 text-white p-2 rounded">Save</button>
<button onclick="closeModal('invoiceModal')" class="w-full mt-2 bg-gray-300 p-2 rounded">Close</button>
</div>
</div>

<!-- LOGIN -->
<div id="loginPage" class="fixed inset-0 flex items-center justify-center bg-slate-950">
<div class="bg-slate-900 p-8 rounded-xl w-80 text-center">
<h1 class="text-2xl text-teal-400 mb-6">NA2625</h1>
<input id="user" placeholder="Username" class="w-full p-3 mb-3 bg-slate-800 rounded">
<input id="pass" type="password" placeholder="Password" class="w-full p-3 mb-3 bg-slate-800 rounded">
<button id="loginBtn" class="w-full bg-teal-600 p-3 rounded">LOGIN</button>
</div>
</div>

<!-- APP -->
<div id="app" class="flex h-full hidden">

<!-- SIDEBAR -->
<nav class="w-60 bg-slate-900 p-4 flex flex-col">
<button onclick="showPage('cashier')" class="nav-btn p-3 text-left">Cashier</button>
<button onclick="showPage('manage')" class="nav-btn p-3 text-left">Inventory</button>
<button onclick="showPage('history')" class="nav-btn p-3 text-left">History</button>
<button onclick="logout()" class="mt-auto text-red-400">Logout</button>
</nav>

<!-- MAIN -->
<main class="flex-1 p-6">

<!-- CASHIER -->
<div id="page-cashier" class="page-content active">
<input id="posSearch" oninput="renderProducts()" placeholder="Search..." class="w-full p-3 mb-4 bg-slate-800 rounded">
<div id="productsGrid" class="grid grid-cols-3 gap-4 mb-4"></div>

<div class="bg-slate-900 p-4 rounded">
<div id="cartItems"></div>
<div class="mt-3 font-bold">Total: Rp<span id="totalEl">0</span></div>
<input id="cashInput" type="number" placeholder="Cash" class="w-full mt-2 p-2 bg-slate-800 rounded">
<button onclick="checkout()" class="w-full mt-2 bg-teal-600 p-2 rounded">Checkout</button>
</div>
</div>

<!-- INVENTORY -->
<div id="page-manage" class="page-content">

<div class="bg-slate-900 p-4 mb-4 rounded">
<input id="newPName" placeholder="Name" class="w-full p-2 mb-2 bg-slate-800 rounded">
<input id="newPStock" type="number" placeholder="Stock" class="w-full p-2 mb-2 bg-slate-800 rounded">
<input id="newPSell" type="number" placeholder="Sell" class="w-full p-2 mb-2 bg-slate-800 rounded">
<input id="newPCost" type="number" placeholder="Cost" class="w-full p-2 mb-2 bg-slate-800 rounded">
<button onclick="addNewProduct()" class="w-full bg-teal-600 p-2 rounded">Add Product</button>
</div>

<div id="manageList"></div>
</div>

<!-- HISTORY -->
<div id="page-history" class="page-content">
<div id="historyList"></div>
</div>

</main>
</div>

<script>
const API="https://script.google.com/macros/s/AKfycbw4rRwQvjD54uOPiNwk-Xt7QRv4vmfo--kexzYmhSM-uspNZiKQXn7p4Jq6IZvDionA/exec";

let products=[],cart=[],currentUser="";
let currentPage=1, perPage=10;

window.onload=()=>{
const saved=localStorage.getItem('NA_POS_USER');
if(saved){
currentUser=saved;
loginPage.style.display='none';
app.classList.remove('hidden');
loadProducts();
}
};

function logout(){localStorage.removeItem('NA_POS_USER');location.reload();}
function showPage(p){
document.querySelectorAll('.page-content').forEach(x=>x.classList.remove('active'));
document.getElementById('page-'+p).classList.add('active');
if(p==='manage'){currentPage=1;renderManage();}
if(p==='history')fetchHistory();
}

function closeModal(id){document.getElementById(id).classList.remove('active');}

loginBtn.onclick=async()=>{
const res=await fetch(API,{method:'POST',body:JSON.stringify({type:'login',user:user.value,pass:pass.value})});
const data=await res.json();
if(data.success){localStorage.setItem('NA_POS_USER',user.value);location.reload();}
else alert("Login Failed");
};

async function loadProducts(){
const res=await fetch(API+"?type=products");
products=await res.json();
renderProducts();
}

function renderProducts(){
const s=posSearch.value.toLowerCase();
productsGrid.innerHTML=products.filter(p=>p.name.toLowerCase().includes(s)).map(p=>`
<div onclick="addToCart('${p.name}')" class="bg-slate-900 p-3 rounded cursor-pointer">
<p>${p.name}</p>
<p>Rp${p.sell}</p>
<p>Stock:${p.stock}</p>
</div>`).join("");
}

function addToCart(name){
const p=products.find(x=>x.name===name);
if(p.stock<=0)return alert("Out of stock");
let item=cart.find(i=>i.name===name);
if(item)item.qty++;
else cart.push({name:p.name,qty:1,price:p.sell,cost:p.cost});
renderCart();
}

function renderCart(){
let total=0;
cartItems.innerHTML=cart.map(i=>{
total+=i.qty*i.price;
return`
<div class="flex justify-between">
<span>${i.name}</span>
<div>
<button onclick="changeQty('${i.name}',-1)">-</button>
<span>${i.qty}</span>
<button onclick="changeQty('${i.name}',1)">+</button>
</div>
<span>${i.qty*i.price}</span>
</div>`;
}).join("");
totalEl.innerText=total;
}

function changeQty(name,d){
const item=cart.find(i=>i.name===name);
item.qty+=d;
if(item.qty<=0)cart=cart.filter(i=>i.name!==name);
renderCart();
}

async function checkout(){
const total=cart.reduce((s,i)=>s+i.qty*i.price,0);
const paid=Number(cashInput.value||0);
if(paid<total)return alert("Insufficient");
const change=paid-total;
recTotal.innerText=total;
recPaid.innerText=paid;
recChange.innerText=change;
receiptItems.innerHTML=cart.map(i=>`<div>${i.name} x${i.qty}</div>`).join("");
invoiceModal.classList.add('active');

await fetch(API,{method:'POST',body:JSON.stringify({
type:'addTransaction',user:currentUser,total,profit:0,
items:JSON.stringify(cart),paid,change
})});

cart=[];cashInput.value="";
loadProducts();renderCart();
}

function renderManage(){
const start=(currentPage-1)*perPage;
const list=products.slice(start,start+perPage);

manageList.innerHTML=list.map((p,i)=>{
const idx=start+i;
return`
<div class="bg-slate-900 p-3 mb-2">
<p>${p.name}</p>
<input id="editStock-${idx}" value="${p.stock}">
<input id="editSell-${idx}" value="${p.sell}">
<input id="editCost-${idx}" value="${p.cost}">
<button onclick="updateExistingProduct('${p.name}',${idx})">Update</button>
</div>`;
}).join("")+`
<button onclick="prevPage()">Prev</button>
<button onclick="nextPage()">Next</button>`;
}

function nextPage(){if(currentPage*perPage<products.length){currentPage++;renderManage();}}
function prevPage(){if(currentPage>1){currentPage--;renderManage();}}

async function addNewProduct(){
const form=document.querySelector('#page-manage .bg-slate-900');
form.innerHTML='<div class="animate-spin h-10 w-10 border-4 border-teal-500 border-t-transparent rounded-full mx-auto"></div>';

await fetch(API,{method:'POST',body:JSON.stringify({
type:'addProduct',
name:newPName.value,
stock:Number(newPStock.value),
sell:Number(newPSell.value),
cost:Number(newPCost.value),
imgId:""
})});

setTimeout(()=>{
form.innerHTML='<button onclick="location.reload()">Add Another</button>';
loadProducts();renderManage();
},3000);
}

async function updateExistingProduct(name,idx){
await fetch(API,{method:'POST',body:JSON.stringify({
type:'editProduct',
oldName:name,
name:name,
stock:Number(document.getElementById(`editStock-${idx}`).value),
sell:Number(document.getElementById(`editSell-${idx}`).value),
cost:Number(document.getElementById(`editCost-${idx}`).value),
imgId:""
})});
alert("Updated");
loadProducts();
}

async function fetchHistory(){
const res=await fetch(API+"?type=transactions");
const data=(await res.json()).slice(1).reverse();
historyList.innerHTML=data.map(r=>`
<div onclick="showHistoryDetail('${encodeURIComponent(r[5])}')">
<p>${new Date(r[0])}</p>
<p>${r[3]}</p>
</div>`).join("");
}

function showHistoryDetail(str){
const items=JSON.parse(decodeURIComponent(str));
historyDetailContent.innerHTML=items.map(i=>`<div>${i.name} x${i.qty}</div>`).join("");
historyModal.classList.add('active');
}
</script>

</body>
</html>
