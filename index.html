<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NA2625 POS</title>

<link rel="manifest" href="manifest.json">

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{background:#f1f5f9;font-family:sans-serif}
.card{background:white;border-radius:12px;padding:12px;box-shadow:0 4px 10px rgba(0,0,0,0.08)}
</style>
</head>

<body>

<!-- HEADER -->
<div class="bg-green-600 text-white p-4 flex justify-between">
  <b>POS APP</b>
  <button id="installBtn" class="hidden">⬇ Install</button>
</div>

<!-- PRODUCTS -->
<div class="p-4 grid grid-cols-2 md:grid-cols-4 gap-3" id="productsGrid"></div>

<!-- CART -->
<div class="fixed bottom-0 left-0 right-0 bg-white p-3 shadow flex justify-between">
  <div>Total: <b id="total">0</b></div>
  <button onclick="checkout()" class="bg-green-500 text-white px-4 py-2 rounded">
    Checkout
  </button>
</div>

<!-- ADD PRODUCT -->
<div class="p-4">
  <h2>Add Product</h2>

  <div id="formBox">
    <input id="pName" placeholder="Name" class="border p-2 w-full mb-2">
    <input id="pSell" placeholder="Sell" class="border p-2 w-full mb-2">
    <input id="pCost" placeholder="Cost" class="border p-2 w-full mb-2">
    <input id="pStock" placeholder="Stock" class="border p-2 w-full mb-2">

    <button onclick="addProduct()" class="bg-blue-500 text-white w-full p-2">
      Add
    </button>
  </div>

  <div id="loading" class="hidden text-center">
    <div class="animate-spin h-10 w-10 border-4 border-green-500 border-t-transparent rounded-full mx-auto"></div>
    Saving...
  </div>

</div>

<script>
const API="https://script.google.com/macros/s/AKfycbxPNHtcXmXS87O9jZO0OqdBfthl53lSq9NzsQdJbZVyTNio0dcglYTQSJYLOs_0s69G/exec";

let products=[],cart=[];

/* LOAD */
async function load(){
  let res=await fetch(API+"?type=products");
  let data=await res.json();

  products=data.slice(1).map(p=>({
    name:p[0],sell:+p[1]
  }));

  renderProducts();
}

/* UI */
function renderProducts(){
  productsGrid.innerHTML=products.map(p=>`
    <div class="card" onclick="add('${p.name}')">
      ${p.name}<br>Rp ${p.sell}
    </div>
  `).join("");
}

function add(name){
  let p=products.find(x=>x.name===name);
  let ex=cart.find(i=>i.name===name);

  if(ex) ex.qty++;
  else cart.push({name:p.name,qty:1,price:p.sell});

  renderCart();
}

function renderCart(){
  let t=0;
  cart.forEach(i=>t+=i.qty*i.price);
  total.innerText=t;
}

/* ADD PRODUCT */
async function addProduct(){

  formBox.classList.add("hidden");
  loading.classList.remove("hidden");

  try{
    let res=await fetch(API,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        type:"addProduct",
        name:pName.value,
        sell:pSell.value,
        cost:pCost.value,
        stock:pStock.value
      })
    });

    let result=await res.json();

    if(result.error){
      alert(result.error);
    }

    await new Promise(r=>setTimeout(r,2000));

    formBox.classList.remove("hidden");
    loading.classList.add("hidden");

    load();

  }catch(e){
    alert("Network error");
  }
}

/* CHECKOUT */
async function checkout(){
  await fetch(API,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      type:"addTransaction",
      items:JSON.stringify(cart),
      total:total.innerText,
      profit:0,
      customer:"-"
    })
  });

  cart=[];
  renderCart();
}

/* PWA INSTALL */
let deferredPrompt;

window.addEventListener('beforeinstallprompt',(e)=>{
  e.preventDefault();
  deferredPrompt=e;
  installBtn.classList.remove("hidden");
});

installBtn.onclick=()=>{
  deferredPrompt.prompt();
};

/* INIT */
load();
</script>

</body>
</html>
