<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-950 text-slate-200">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NA2625 | POS PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        .page-content { display: none; height: 100%; overflow-y: auto; }
        .page-content.active { display: block; }
        .nav-btn.active { background: #1e293b; color: #2dd4bf; border-left: 4px solid #2dd4bf; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .modal.active { display: flex; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="h-full overflow-hidden font-sans">

<div id="loginPage" class="fixed inset-0 z-[110] flex items-center justify-center bg-slate-950">
    <div class="w-full max-w-sm p-10 bg-slate-900 rounded-3xl border border-slate-800 shadow-2xl text-center">
        <h1 class="text-3xl font-black text-teal-400 mb-8">NA2625</h1>
        <div class="space-y-4">
            <input id="user" type="text" placeholder="Username" class="w-full p-4 rounded-xl bg-slate-800 border border-slate-700 outline-none text-center">
            <input id="pass" type="password" placeholder="Password" class="w-full p-4 rounded-xl bg-slate-800 border border-slate-700 outline-none text-center">
            <button id="loginBtn" class="w-full bg-teal-600 p-4 rounded-xl font-bold transition hover:bg-teal-500">SIGN IN</button>
        </div>
    </div>
</div>

<div id="app" class="flex h-full hidden">
    <nav class="w-64 bg-slate-900 border-r border-slate-800 flex flex-col h-full shrink-0">
        <div class="p-8 text-xl font-black text-white border-b border-slate-800">NA2625 <span class="text-teal-400">POS</span></div>
        <div class="flex-1 p-4 space-y-1">
            <button onclick="showPage('cashier')" class="nav-btn w-full text-left px-6 py-4 rounded-xl font-bold text-slate-400">🛒 Cashier</button>
            <button onclick="showPage('manage')" class="nav-btn w-full text-left px-6 py-4 rounded-xl font-bold text-slate-400">📦 Inventory</button>
            <button onclick="showPage('history')" class="nav-btn w-full text-left px-6 py-4 rounded-xl font-bold text-slate-400">📜 History</button>
        </div>
        <div class="p-6 border-t border-slate-800">
            <button onclick="logout()" class="w-full text-xs font-bold text-red-400 uppercase tracking-widest py-2">Logout</button>
        </div>
    </nav>

    <main class="flex-1 bg-slate-950 p-8 overflow-hidden flex flex-col">
        <div id="page-cashier" class="page-content active h-full">
            <div class="flex gap-8 h-full">
                <div class="flex-1 flex flex-col">
                    <input id="posSearch" oninput="renderProducts()" placeholder="Search items..." class="w-full p-4 bg-slate-900 border border-slate-800 rounded-2xl mb-6 outline-none">
                    <div id="productsGrid" class="grid grid-cols-2 lg:grid-cols-4 gap-4 overflow-y-auto pr-2"></div>
                </div>
                <div class="w-80 bg-slate-900 rounded-3xl p-6 border border-slate-800 flex flex-col">
                    <h3 class="font-bold text-slate-500 text-[10px] uppercase mb-4 tracking-widest">Cart</h3>
                    <div id="cartItems" class="flex-1 overflow-y-auto space-y-2 mb-4"></div>
                    <div class="border-t border-slate-800 pt-4 space-y-4">
                        <div class="flex justify-between text-xl font-black"><span>Total</span><span>Rp<span id="total">0</span></span></div>
                        <input type="number" id="cashInput" placeholder="Cash Amount" class="w-full p-4 bg-slate-800 rounded-xl text-center font-bold">
                        <button onclick="checkout()" class="w-full bg-teal-600 p-4 rounded-xl font-black">CHECKOUT</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="page-manage" class="page-content">
            <div id="manageList" class="grid gap-4"></div>
        </div>

        <div id="page-history" class="page-content">
            <div id="historyList" class="space-y-3"></div>
        </div>
    </main>
</div>

<div id="invoiceModal" class="modal">
    <div class="bg-white text-slate-900 w-80 p-6 rounded-xl shadow-2xl">
        <div id="receiptArea" class="p-2">
            <div class="text-center border-b border-dashed border-slate-300 pb-4 mb-4">
                <h2 class="font-black text-xl">NA2625</h2>
                <p class="text-[10px] uppercase text-slate-500">Official Receipt</p>
            </div>
            <div id="receiptItems" class="text-xs space-y-2 mb-4"></div>
            <div class="border-t border-dashed border-slate-300 pt-4 text-xs space-y-1">
                <div class="flex justify-between font-bold"><span>TOTAL</span><span id="recTotal"></span></div>
                <div class="flex justify-between"><span>PAID</span><span id="recPaid"></span></div>
                <div class="flex justify-between text-teal-600 font-bold"><span>CHANGE</span><span id="recChange"></span></div>
            </div>
        </div>
        <div class="flex gap-2 mt-6">
            <button onclick="downloadReceipt()" class="flex-1 bg-teal-600 text-white p-3 rounded-lg font-bold text-xs">Save</button>
            <button onclick="closeModal('invoiceModal')" class="flex-1 bg-slate-200 p-3 rounded-lg font-bold text-xs">Close</button>
        </div>
    </div>
</div>

<script>
// REPLACE WITH YOUR ACTUAL DEPLOYMENT URL
const API = "https://script.google.com/macros/s/AKfycby8u_Okc10ueZFSN1iU6maw9B2Wy1Ue2lvobWKDwQLUln3EC-6LcDb-AS5cdOdG3y9l/exec";
let products = [], cart = [], currentUser = "";

window.onload = () => {
    const saved = localStorage.getItem('NA_POS_USER');
    if (saved) {
        currentUser = saved;
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('app').classList.remove('hidden');
        loadProducts();
    }
};

function logout() { localStorage.removeItem('NA_POS_USER'); location.reload(); }
function showPage(p) {
    document.querySelectorAll('.page-content').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(x => x.classList.remove('active'));
    document.getElementById('page-'+p).classList.add('active');
    if(p === 'history') fetchHistory();
    if(p === 'manage') renderManage();
}
function closeModal(id) { document.getElementById(id).classList.remove('active'); }

// AUTH
document.getElementById('loginBtn').onclick = async () => {
    const u = document.getElementById('user').value, p = document.getElementById('pass').value;
    const res = await fetch(API, { method: 'POST', body: JSON.stringify({ type: 'login', user: u, pass: p }) });
    const data = await res.json();
    if(data.success) { localStorage.setItem('NA_POS_USER', u); location.reload(); }
    else alert("Login Failed");
};

async function loadProducts() {
    const res = await fetch(API + "?type=products");
    products = await res.json();
    renderProducts();
}

function renderProducts() {
    const s = document.getElementById('posSearch').value.toLowerCase();
    document.getElementById('productsGrid').innerHTML = products.filter(p => p.name.toLowerCase().includes(s)).map(p => {
        const img = p.imgId ? API + '?type=img&id=' + p.imgId : 'https://via.placeholder.com/150';
        return `
        <div onclick="addToCart('${p.name}')" class="bg-slate-900 rounded-2xl p-3 border border-slate-800 hover:border-teal-500 transition cursor-pointer">
            <img src="${img}" class="w-full h-24 object-cover rounded-xl mb-3 bg-slate-950">
            <div class="text-center">
                <p class="font-bold text-[10px] text-slate-400 uppercase truncate">${p.name}</p>
                <p class="text-teal-400 font-black">Rp${p.sell.toLocaleString()}</p>
                <p class="text-[9px] text-slate-600 mt-1">Stock: ${p.stock}</p>
            </div>
        </div>`;
    }).join("");
}

function addToCart(name) {
    const p = products.find(x => x.name === name);
    if(p.stock <= 0) return alert("Out of stock!");
    let item = cart.find(i => i.name === name);
    if (item) item.qty++;
    else cart.push({ name: p.name, qty: 1, price: p.sell, cost: p.cost });
    renderCart();
}

// QUANTITY HANDLERS (+ / -)
function changeQty(name, delta) {
    let item = cart.find(i => i.name === name);
    const p = products.find(x => x.name === name);
    if (!item) return;

    if (delta > 0 && item.qty >= p.stock) return alert("Max stock reached");
    item.qty += delta;
    if (item.qty <= 0) cart = cart.filter(i => i.name !== name);
    renderCart();
}

function renderCart() {
    let total = 0;
    document.getElementById('cartItems').innerHTML = cart.map(i => {
        total += i.qty * i.price;
        return `
        <div class="flex items-center justify-between bg-slate-800 p-2 rounded-xl border border-slate-700">
            <div class="flex-1 min-w-0 pr-2">
                <p class="text-[9px] font-bold text-white truncate uppercase">${i.name}</p>
                <p class="text-[9px] text-teal-400">Rp${(i.qty * i.price).toLocaleString()}</p>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="changeQty('${i.name}', -1)" class="w-5 h-5 flex items-center justify-center bg-slate-700 rounded text-xs hover:bg-red-500">-</button>
                <span class="text-[10px] font-bold w-4 text-center">${i.qty}</span>
                <button onclick="changeQty('${i.name}', 1)" class="w-5 h-5 flex items-center justify-center bg-slate-700 rounded text-xs hover:bg-teal-500">+</button>
            </div>
        </div>`;
    }).join("");
    document.getElementById('total').innerText = total.toLocaleString();
}

async function checkout() {
    const total = cart.reduce((sum, i) => sum + (i.qty * i.price), 0);
    const paid = Number(document.getElementById('cashInput').value || 0);
    if (paid < total) return alert("Insufficient Cash");
    
    const change = paid - total;
    const profit = cart.reduce((sum, i) => sum + (i.qty * (i.price - i.cost)), 0);

    document.getElementById('recTotal').innerText = "Rp" + total.toLocaleString();
    document.getElementById('recPaid').innerText = "Rp" + paid.toLocaleString();
    document.getElementById('recChange').innerText = "Rp" + change.toLocaleString();
    document.getElementById('receiptItems').innerHTML = cart.map(i => `
        <div class="flex justify-between"><span>${i.name} x${i.qty}</span><span>${(i.qty*i.price).toLocaleString()}</span></div>
    `).join("");
    document.getElementById('invoiceModal').classList.add('active');

    const payload = { type: 'addTransaction', user: currentUser, total, profit, items: JSON.stringify(cart), paid, change };
    await fetch(API, { method: 'POST', body: JSON.stringify(payload) });
    
    cart = [];
    document.getElementById('cashInput').value = "";
    loadProducts();
    renderCart();
}

function downloadReceipt() {
    html2canvas(document.querySelector("#receiptArea")).then(canvas => {
        let link = document.createElement('a');
        link.download = 'Receipt.png';
        link.href = canvas.toDataURL();
        link.click();
    });
}

function renderManage() {
    document.getElementById('manageList').innerHTML = products.map((p, idx) => `
        <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800 flex flex-col gap-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <img id="prev-${idx}" onclick="changeProductPic('${p.name}', ${idx})" src="${p.imgId ? API + '?type=img&id=' + p.imgId : 'https://via.placeholder.com/150'}" class="w-12 h-12 rounded-lg object-cover bg-slate-950 cursor-pointer border border-slate-700 hover:opacity-50 transition">
                    <p class="font-black text-white uppercase">${p.name}</p>
                </div>
                <button onclick="updateItem('${p.name}', ${idx})" class="bg-teal-600 px-4 py-2 rounded-lg text-xs font-bold">Save Changes</button>
            </div>
            <div class="grid grid-cols-3 gap-4">
                <div><label class="text-[9px] text-slate-500 uppercase">Stock</label><input id="stk-${idx}" type="number" value="${p.stock}" class="w-full bg-slate-800 p-2 rounded-lg text-sm outline-none border border-slate-700"></div>
                <div><label class="text-[9px] text-slate-500 uppercase">Price</label><input id="prc-${idx}" type="number" value="${p.sell}" class="w-full bg-slate-800 p-2 rounded-lg text-sm outline-none border border-slate-700"></div>
                <div><label class="text-[9px] text-slate-500 uppercase">Cost</label><input id="cst-${idx}" type="number" value="${p.cost}" class="w-full bg-slate-800 p-2 rounded-lg text-sm outline-none border border-slate-700"></div>
            </div>
        </div>`).join("");
}

async function updateItem(name, idx) {
    const prod = products.find(p => p.name === name);
    const payload = {
        type: 'editProduct', oldName: name, name: name,
        stock: Number(document.getElementById(`stk-${idx}`).value),
        sell: Number(document.getElementById(`prc-${idx}`).value),
        cost: Number(document.getElementById(`cst-${idx}`).value),
        imgId: prod.imgId
    };
    await fetch(API, { method: 'POST', body: JSON.stringify(payload) });
    alert("Updated!");
    loadProducts();
}

async function changeProductPic(pName, idx) {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.onchange = async (e) => {
        const file = e.target.files[0];
        if (file.size > 2000000) return alert("File too big (max 2MB)");

        const reader = new FileReader();
        reader.onload = async () => {
            const base64 = reader.result;
            document.getElementById(`prev-${idx}`).src = base64; // Show preview immediately

            try {
                // Send the image to GAS
                const res = await fetch(API, { 
                    method: 'POST', 
                    body: JSON.stringify({ type: 'uploadImage', base64: base64 }) 
                });
                const data = await res.json();
                
                if (data.success) {
                    const prod = products.find(x => x.name === pName);
                    // Now link the new ID to the product
                    await fetch(API, { method: 'POST', body: JSON.stringify({ 
                        type: 'editProduct', oldName: pName, name: pName, 
                        stock: Number(document.getElementById(`stk-${idx}`).value),
                        sell: Number(document.getElementById(`prc-${idx}`).value),
                        cost: Number(document.getElementById(`cst-${idx}`).value),
                        imgId: data.imgId 
                    }) });
                    alert("Image Uploaded & Saved!");
                    loadProducts();
                }
            } catch (err) {
                alert("Upload failed. Verify your API URL and 'Anyone' access.");
            }
        };
        reader.readAsDataURL(file);
    };
    input.click();
}

async function fetchHistory() {
    const res = await fetch(API + "?type=transactions");
    const data = (await res.json()).slice(1).reverse();
    document.getElementById('historyList').innerHTML = data.map(r => `
        <div class="bg-slate-900 p-4 rounded-2xl border border-slate-800 flex justify-between items-center">
            <div>
                <p class="text-[9px] text-slate-500 font-mono">${new Date(r[0]).toLocaleString()}</p>
                <p class="font-black text-white">Rp${Number(r[3]).toLocaleString()}</p>
            </div>
            <span class="text-[9px] font-bold text-teal-600 uppercase">Cash Entry</span>
        </div>`).join("");
}
</script>
</body>
</html>
