<!DOCTYPE html>
<html>
<head>
<title>NA2625 Business</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#0f172a] text-white flex">

<!-- SIDEBAR -->
<div class="w-64 bg-[#020617] p-6 flex flex-col gap-3 min-h-screen">
  <div class="text-2xl font-bold mb-6">NA2625</div>

  <button onclick="nav('dashboard')" class="nav">Dashboard</button>
  <button onclick="nav('products')" class="nav">Products</button>
  <button onclick="nav('stock')" class="nav">Stock</button>
  <button onclick="nav('billing')" class="nav">Cashier</button>
  <button onclick="nav('analytics')" class="nav">Analytics</button>
</div>

<!-- MAIN -->
<div class="flex-1 p-8 space-y-6">

<!-- DASHBOARD -->
<div id="dashboard">
  <h1 class="text-2xl mb-4">Dashboard</h1>

  <div class="grid grid-cols-4 gap-4">
    <div class="card">Revenue<br><b id="rev"></b></div>
    <div class="card">Profit<br><b id="prof"></b></div>
    <div class="card">Transactions<br><b id="trx"></b></div>
    <div class="card">Products<br><b id="prodCount"></b></div>
  </div>
</div>

<!-- PRODUCTS -->
<div id="products" class="hidden">
  <h1 class="text-2xl mb-4">Product Management</h1>

  <div class="card grid grid-cols-5 gap-2">
    <input id="name" placeholder="Name" class="input">
    <input id="sell" placeholder="Sell Price" class="input">
    <input id="cost" placeholder="Cost Price" class="input">
    <input id="stockVal" placeholder="Stock" class="input">
    <input id="barcode" placeholder="Barcode" class="input">
  </div>

  <button onclick="addProduct()" class="btn mt-3">Add Product</button>

  <div class="card mt-4">
    <table class="w-full text-sm">
      <thead>
        <tr class="text-gray-400">
          <th>Name</th><th>Sell</th><th>Cost</th><th>Stock</th><th>Barcode</th>
        </tr>
      </thead>
      <tbody id="productList"></tbody>
    </table>
  </div>
</div>

<!-- STOCK -->
<div id="stock" class="hidden">
  <h1 class="text-2xl mb-4">Stock Management</h1>

  <div class="card flex gap-3">
    <select id="stockProduct" class="input flex-1"></select>
    <input id="qty" type="number" placeholder="Qty" class="input">
    <button onclick="addStock()" class="btn">Update</button>
  </div>
</div>

<!-- BILLING -->
<div id="billing" class="hidden">
  <h1 class="text-2xl mb-4">Cashier</h1>

  <!-- SCAN -->
  <input id="barcodeScan" placeholder="Scan barcode..."
    class="input w-full mb-4">

  <!-- PRODUCT QUICK ADD -->
  <div class="card mb-4 grid grid-cols-4 gap-2 max-h-40 overflow-y-auto" id="productButtons"></div>

  <!-- CART -->
  <div class="card">
    <table class="w-full text-sm">
      <thead>
        <tr class="text-gray-400">
          <th>Name</th><th>Qty</th><th>Total</th>
        </tr>
      </thead>
      <tbody id="cart"></tbody>
    </table>

    <div class="mt-4">
      Total: <b id="total">0</b><br>
      Profit: <b id="profit">0</b>
    </div>

    <button onclick="checkout()" class="btn mt-4 w-full">
      Checkout
    </button>
  </div>

  <!-- RECEIPT -->
  <div id="receipt" class="hidden bg-white text-black p-4 mt-4 w-80 rounded">
    <div class="text-center font-bold text-lg">NA2625 STORE</div>
    <hr>
    <div id="rItems"></div>
    <hr>
    Total: <b id="rTotal"></b>
    <div id="rDate"></div>
  </div>

</div>

<!-- ANALYTICS -->
<div id="analytics" class="hidden">
  <h1 class="text-2xl mb-4">Analytics</h1>

  <select id="filter" onchange="loadAnalytics()" class="input mb-4">
    <option value="all">All</option>
    <option value="day">Today</option>
    <option value="week">7 Days</option>
    <option value="month">Month</option>
    <option value="year">Year</option>
  </select>

  <div class="card" id="report"></div>
</div>

</div>

<style>
.nav{padding:10px;border-radius:8px;text-align:left}
.nav:hover{background:#1e293b}
.card{background:#1e293b;padding:16px;border-radius:12px}
.input{padding:10px;border-radius:8px;color:black;width:100%}
.btn{background:#22c55e;padding:10px;border-radius:10px}
</style>

<script>
const API="https://script.google.com/macros/s/AKfycbx6ty3Fy-r7iAzu9jX79JY1u8Wrx59i4Kk0o7UpArwZU9nEUtLvgmKK9VSSBURTONne/exec";

let products=[],cart=[];

// NAV
function nav(id){
  ["dashboard","products","stock","billing","analytics"].forEach(p=>{
    document.getElementById(p).classList.add("hidden");
  });
  document.getElementById(id).classList.remove("hidden");
}

// LOAD PRODUCTS
async function loadProducts(){
  let res=await fetch(API+"?type=products");
  let data=await res.json();

  products=data.slice(1).map(p=>({
    name:p[0], sell:+p[1], cost:+p[2], stock:+p[3], barcode:p[4]
  }));

  prodCount.innerText=products.length;

  // TABLE
  productList.innerHTML=products.map(p=>`
    <tr>
      <td>${p.name}</td>
      <td>${p.sell}</td>
      <td>${p.cost}</td>
      <td>${p.stock}</td>
      <td>${p.barcode}</td>
    </tr>
  `).join("");

  // STOCK SELECT
  stockProduct.innerHTML=products.map(p=>`<option>${p.name}</option>`).join("");

  // QUICK BUTTONS
  productButtons.innerHTML=products.map(p=>`
    <button onclick="addToCart('${p.name}')"
      class="bg-blue-500 rounded p-2 text-sm">
      ${p.name}<br>${p.sell}
    </button>
  `).join("");
}

// ADD PRODUCT
async function addProduct(){
  await fetch(API,{
    method:"POST",
    body:JSON.stringify({
      type:"addProduct",
      name:name.value,
      sell:sell.value,
      cost:cost.value,
      stock:stockVal.value,
      barcode:barcode.value
    })
  });
  loadProducts();
}

// STOCK
async function addStock(){
  await fetch(API,{
    method:"POST",
    body:JSON.stringify({
      type:"updateStock",
      name:stockProduct.value,
      qty:+qty.value,
      action:"ADD"
    })
  });
  loadProducts();
}

// ADD CART (MANUAL)
function addToCart(name){
  let p=products.find(x=>x.name===name);
  processCart(p);
}

// SCAN
barcodeScan.addEventListener("change",()=>{
  let p=products.find(x=>x.barcode==barcodeScan.value);
  if(!p)return alert("Not found");
  processCart(p);
  barcodeScan.value="";
});

// PROCESS CART
function processCart(p){
  let exist=cart.find(i=>i.name===p.name);

  if(exist){
    exist.qty++;
    exist.total+=p.sell;
    exist.profit+=(p.sell-p.cost);
  }else{
    cart.push({name:p.name,qty:1,total:p.sell,profit:(p.sell-p.cost)});
  }

  renderCart();
}

// RENDER CART
function renderCart(){
  let t=0,pr=0;

  cart.forEach(i=>{t+=i.total;pr+=i.profit});

  total.innerText=t;
  profit.innerText=pr;

  cart.innerHTML=cart.map(i=>`
    <tr>
      <td>${i.name}</td>
      <td>${i.qty}</td>
      <td>${i.total}</td>
    </tr>
  `).join("");
}

// CHECKOUT
async function checkout(){

  rItems.innerHTML=cart.map(i=>`
    <div>${i.name} x${i.qty} = ${i.total}</div>
  `).join("");

  rTotal.innerText=total.innerText;
  rDate.innerText=new Date().toLocaleString();

  receipt.classList.remove("hidden");

  await fetch(API,{
    method:"POST",
    body:JSON.stringify({
      type:"addTransaction",
      items:JSON.stringify(cart),
      total:total.innerText,
      profit:profit.innerText,
      customer:"-"
    })
  });

  cart=[];
  renderCart();
  loadAnalytics();
}

// ANALYTICS
async function loadAnalytics(){
  let res=await fetch(API+"?type=transactions");
  let data=await res.json();
  data=data.slice(1);

  let now=new Date();
  let f=filter.value;

  data=data.filter(d=>{
    let t=new Date(d[0]);
    if(f==="day") return t.toDateString()===now.toDateString();
    if(f==="week") return (now-t)/(1000*60*60*24)<=7;
    if(f==="month") return t.getMonth()===now.getMonth();
    if(f==="year") return t.getFullYear()===now.getFullYear();
    return true;
  });

  let rev=0,prof=0;
  data.forEach(d=>{rev+=+d[2];prof+=+d[3]});

  report.innerHTML=`
    Revenue: ${rev}<br>
    Profit: ${prof}<br>
    Transactions: ${data.length}
  `;

  document.getElementById("rev").innerText=rev;
  document.getElementById("prof").innerText=prof;
  document.getElementById("trx").innerText=data.length;
}

// INIT
loadProducts();
loadAnalytics();
</script>

</body>
</html>
