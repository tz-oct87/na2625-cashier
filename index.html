<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-950 text-gray-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NA2625 CREATIVEWORKS | POSv2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { dark: '#05080F', deep: '#0D1117', border: '#21262E', accent: '#1A877E' } } } }
    </script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        .page-content { display: none; height: 100%; width: 100%; overflow-y: auto; }
        .page-content.active { display: block; }
        .nav-btn.active { background-color: #1A877E; color: white; }
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 200; align-items: center; justify-content: center; backdrop-filter: blur(12px); }
        .modal-overlay.active { display: flex; }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        @media print { body * { visibility: hidden; } #invoiceArea, #invoiceArea * { visibility: visible; } #invoiceArea { position: fixed; left: 0; top: 0; width: 100%; } }
    </style>
</head>
<body class="h-full font-sans antialiased dark">

<div id="invoiceModal" class="modal-overlay">
    <div class="bg-deep w-full max-w-sm rounded-[2.5rem] overflow-hidden shadow-2xl flex flex-col mx-4 border border-border">
        <div id="invoiceArea" class="p-10 bg-deep text-gray-100">
            <div class="text-center border-b border-dashed border-gray-700 pb-6 mb-6">
                <h1 class="font-black text-xl text-accent">NA2625 CREATIVEWORKS</h1>
                <p class="text-[10px] text-gray-500 uppercase tracking-widest mt-1 font-bold">Order Completed</p>
            </div>
            <div id="invItems" class="space-y-3 mb-6 text-xs font-medium"></div>
            <div class="border-t border-dashed border-gray-700 pt-6 space-y-2">
                <div class="flex justify-between font-black text-sm"><span>Total</span><span id="invTotal"></span></div>
                <div class="flex justify-between font-bold text-xs text-accent"><span>Paid</span><span id="invPaid"></span></div>
                <div class="flex justify-between font-bold text-xs text-red-400"><span>Change</span><span id="invChange"></span></div>
            </div>
            <p class="text-[9px] mt-8 text-center text-gray-600 font-mono" id="invId"></p>
        </div>
        <div class="p-6 bg-gray-950 flex gap-2 border-t border-border">
            <button onclick="window.print()" class="flex-1 bg-accent text-white py-4 rounded-2xl font-black text-xs">PRINT</button>
            <button onclick="downloadPng()" class="flex-1 bg-gray-700 text-white py-4 rounded-2xl font-black text-xs">PNG</button>
            <button onclick="closeInvoice()" class="flex-1 bg-deep text-gray-400 py-4 rounded-2xl font-black text-xs border border-border">CLOSE</button>
        </div>
    </div>
</div>

<div id="uploaderModal" class="modal-overlay">
    <div class="bg-deep w-full max-w-sm rounded-3xl p-10 border border-border text-center shadow-xl">
        <h3 class="text-xl font-black mb-6 text-accent">Set Product Picture</h3>
        <label class="block w-40 h-40 mx-auto rounded-3xl border-4 border-dashed border-gray-700 bg-gray-950 mb-6 cursor-pointer overflow-hidden flex items-center justify-center group hover:border-accent">
            <input type="file" accept="image/*" class="hidden" id="pImgInput" onchange="previewUpload(this)">
            <img id="uploadPreview" class="w-full h-full object-cover hidden">
            <span id="uploadPlaceholder" class="text-xs font-black text-gray-600 group-hover:text-accent">Click to Upload</span>
        </label>
        <button onclick="uploadImageToServer()" id="uploadBtn" class="w-full bg-accent text-white p-5 rounded-2xl font-black mb-2 opacity-60 pointer-events-none transition">UPLOAD IMAGE</button>
        <button onclick="closeModal('uploaderModal')" class="text-xs text-gray-500 font-bold uppercase tracking-widest mt-4">Cancel</button>
    </div>
</div>

<div id="detailModal" class="modal-overlay">
    <div class="bg-deep w-full max-w-lg rounded-3xl p-10 border border-border shadow-xl">
        <h3 class="text-xl font-black mb-10 text-accent">Transaction Details</h3>
        <div id="detailsArea" class="space-y-6 text-gray-300"></div>
        <button onclick="closeModal('detailModal')" class="w-full bg-accent text-white p-5 rounded-2xl font-black mt-10">CLOSE</button>
    </div>
</div>

<div id="loginPage" class="fixed inset-0 z-[100] flex items-center justify-center bg-gray-950 px-6">
    <div class="w-full max-w-sm p-12 border border-border rounded-[3rem] shadow-2xl text-center bg-deep">
        <h1 class="text-3xl font-black text-accent mb-2">NA2625</h1>
        <p class="text-[10px] font-black text-gray-500 uppercase tracking-[0.3em] mb-10">TZ GANG POS</p>
        <div class="space-y-4">
            <input id="user" type="text" placeholder="Username" class="w-full p-5 border border-border rounded-2xl bg-gray-950 outline-none focus:ring-2 focus:ring-accent text-center font-bold">
            <input id="pass" type="password" placeholder="Password" class="w-full p-5 border border-border rounded-2xl bg-gray-950 outline-none focus:ring-2 focus:ring-accent text-center font-bold">
            <button id="loginBtn" class="w-full bg-accent text-white p-5 rounded-2xl font-black shadow-xl hover:bg-teal-700 transition">SIGN IN</button>
        </div>
    </div>
</div>

<div id="app" class="flex h-full w-full hidden bg-gray-950">
    <nav class="w-72 bg-deep border-r border-border flex flex-col h-full shrink-0">
        <div class="p-10 border-b border-border"><h2 class="text-xl font-black text-white">NA2625 <span class="text-accent">POS</span></h2></div>
        <div class="flex-1 p-4 space-y-2">
            <button onclick="showPage('cashier')" class="nav-btn w-full text-left px-6 py-5 rounded-3xl font-black text-gray-400 border border-transparent hover:bg-gray-800 transition">🛒 Cashier</button>
            <button onclick="showPage('manage')" class="nav-btn w-full text-left px-6 py-5 rounded-3xl font-black text-gray-400 border border-transparent hover:bg-gray-800 transition">📦 Products</button>
            <button onclick="showPage('history')" class="nav-btn w-full text-left px-6 py-5 rounded-3xl font-black text-gray-400 border border-transparent hover:bg-gray-800 transition">📜 Transactions</button>
        </div>
        <div class="p-8"><button onclick="logout()" class="text-xs font-black text-red-400 uppercase tracking-widest">Logout</button></div>
    </nav>

    <main class="flex-1 relative bg-gray-950 overflow-hidden">
        <div id="page-cashier" class="page-content active p-10">
            <div class="flex gap-10 h-full">
                <div class="flex-1 flex flex-col">
                    <input type="text" id="posSearch" oninput="renderProducts()" placeholder="Quick Search..." class="p-6 rounded-[2rem] border border-border bg-deep shadow-sm mb-8 outline-none focus:ring-4 focus:ring-accent/10 font-bold">
                    <div id="productsGrid" class="grid grid-cols-2 lg:grid-cols-4 gap-6 overflow-y-auto pr-4"></div>
                </div>
                <div class="w-96 bg-deep rounded-[3rem] shadow-2xl p-10 flex flex-col border border-border">
                    <h3 class="font-black text-gray-500 text-[10px] uppercase tracking-[0.2em] mb-8">Cart Items</h3>
                    <div id="cartItems" class="flex-1 overflow-y-auto space-y-4 mb-8"></div>
                    <div class="border-t border-border pt-8 space-y-4">
                        <div class="flex justify-between text-3xl font-black"><span>Total</span><span class="text-white">Rp<span id="total">0</span></span></div>
                        <input type="number" id="cashInput" placeholder="Buyer's Cash" class="w-full p-6 bg-gray-950 rounded-[1.5rem] text-center font-black text-xl outline-none border-2 border-border focus:border-accent focus:bg-gray-900 transition">
                        <button onclick="checkout()" id="checkoutBtn" class="w-full bg-accent text-white p-6 rounded-[1.5rem] font-black text-lg shadow-xl hover:bg-teal-700 active:scale-95 transition opacity-60 pointer-events-none">CHECKOUT</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="page-manage" class="page-content p-12 relative">
            <h2 class="text-3xl font-black mb-10 text-white">Inventory List</h2>
            <div id="manageList" class="grid gap-4 mb-16"></div>
            <div class="absolute bottom-6 left-6 right-6">
                <button onclick="showAddProduct()" class="w-full bg-accent text-white p-5 rounded-2xl font-black text-sm uppercase tracking-widest shadow-lg">REGISTER NEW PRODUCT</button>
            </div>
        </div>

        <div id="page-history" class="page-content p-12"><h2 class="text-3xl font-black mb-8 text-white">Transaction Logs</h2><div id="historyList" class="grid gap-4"></div></div>
    </main>
</div>

<script>
// REPLACE WITH YOUR FULL GOOGLE SCRIPT WEB APP URL
const API = "https://script.google.com/macros/s/AKfycbwe0VZPWLJf7YfuXBcIgnuHJEb9orSOghADOcPouuYfGoVMnqXrVT6cAAb85NPJ_bLV/exec"; 
let products = [], cart = [], currentUser = "", targetEditId = null, currentUploadBase64 = null;

// CORE UI & SESSION PERSISTENCE (Point 3 Fix)
window.onload = () => {
    const savedUser = localStorage.getItem('NA2625User');
    if (savedUser) {
        currentUser = savedUser;
        document.getElementById('loginPage').style.display='none';
        document.getElementById('app').classList.remove('hidden');
        loadProducts(); showPage('cashier');
    }
};

function logout() { localStorage.removeItem('NA2625User'); location.reload(); }

function showPage(p) {
    document.querySelectorAll('.page-content').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(x => x.classList.remove('active'));
    document.getElementById('page-'+p).classList.add('active');
    const btn = Array.from(document.querySelectorAll('.nav-btn')).find(b => b.innerText.toLowerCase().includes(p));
    if(btn) btn.classList.add('active');
    if(p === 'manage') renderManage();
    if(p === 'history') fetchHistory();
}

function closeModal(id) { document.getElementById(id).classList.remove('active'); }

// AUTH (Localstorage Save)
document.getElementById('loginBtn').onclick = async () => {
    const u = document.getElementById('user').value, p = document.getElementById('pass').value;
    const btn = document.getElementById('loginBtn');
    btn.innerText = "Signing in..."; btn.classList.add('opacity-60','pointer-events-none');
    try {
        const res = await fetch(API, { method: 'POST', body: JSON.stringify({ type: 'login', user: u, pass: p }) });
        const data = await res.json();
        if(data.success) {
            localStorage.setItem('NA2625User', u); // SAVE SESSION
            location.reload(); // Reload triggers onload session recovery
        } else { alert("Wrong credentials"); btn.innerText="SIGN IN"; btn.classList.remove('opacity-60','pointer-events-none'); }
    } catch (e) { alert("API Error"); btn.innerText="SIGN IN"; btn.classList.remove('opacity-60','pointer-events-none'); }
};

// LOAD DATA
async function loadProducts() {
    const res = await fetch(API + "?type=products");
    products = await res.json(); // API already handles slice(1) and raw numbers
    renderProducts();
}

// UPLOADER LOGIC (Point 2 Fix)
function openUploader(idx) {
    targetEditId = (idx === null) ? null : products[idx].name; // Null means "Add New"
    document.getElementById('uploadPreview').classList.add('hidden');
    document.getElementById('uploadPlaceholder').classList.remove('hidden');
    document.getElementById('uploaderModal').classList.add('active');
}

function previewUpload(input) {
    if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = function(e) {
            currentUploadBase64 = e.target.result;
            document.getElementById('uploadPreview').src = currentUploadBase64;
            document.getElementById('uploadPreview').classList.remove('hidden');
            document.getElementById('uploadPlaceholder').classList.add('hidden');
            const btn = document.getElementById('uploadBtn');
            btn.classList.remove('opacity-60','pointer-events-none');
        };
        reader.readAsDataURL(input.files[0]);
    }
}

async function uploadImageToServer() {
    if(!currentUploadBase64) return;
    const btn = document.getElementById('uploadBtn');
    btn.innerText = "Saving..."; btn.classList.add('opacity-60','pointer-events-none');
    
    // Upload image to Config sheet
    const payload = { type: 'uploadImage', base64: currentUploadBase64 };
    const res = await fetch(API, { method: 'POST', body: JSON.stringify(payload) });
    const data = await res.json();
    
    if (data.success) {
        if(targetEditId !== null) { // Editing existing product
            const pIndex = products.findIndex(x => x.name === targetEditId);
            const p = products[pIndex];
            p.imgId = data.imgId; //imgId is the row in Config sheet
            await updateProduct(pIndex); // Use standard update payload
        } else {
            // New Product: Just hold the imgId for the final submit
            document.getElementById('pNewImgIdHolder').value = data.imgId;
            document.getElementById('uploadAction').innerText="Pic Set (Row " + data.imgId + ")";
        }
        closeModal('uploaderModal'); loadProducts();
    }
    btn.innerText = "UPLOAD IMAGE";
}

function renderProducts() {
    const s = document.getElementById('posSearch').value.toLowerCase();
    document.getElementById('productsGrid').innerHTML = products.filter(p => p.name.toLowerCase().includes(s)).map(p => {
        const imgSrc = p.imgId ? (API + "?type=img&id=" + p.imgId) : 'https://via.placeholder.com/200/0D1117/888?text=TZGANG';
        return `<div onclick="updateQuantity('${p.name}', 1)" class="bg-deep rounded-[2rem] border border-border shadow-sm overflow-hidden hover:border-accent/30 transition-all cursor-pointer group">
            <div class="h-40 bg-gray-950 overflow-hidden"><img src="${imgSrc}" class="w-full h-full object-cover group-hover:scale-110 transition-transform"></div>
            <div class="p-6 text-center"><div class="font-black text-xs text-gray-500 uppercase tracking-widest mb-1 truncate">${p.name}</div><div class="text-accent font-black text-lg">Rp${p.sell.toLocaleString('id-ID')}</div></div>
        </div>`
    }).join("");
}

// CART (Math Fixed)
function updateQuantity(name, change) {
    let item = cart.find(i => i.name === name);
    if (!item && change > 0) {
        const p = products.find(x => x.name === name);
        if(p.stock < 1) return alert("OutOfStock: "+name);
        cart.push({ name: p.name, qty: 1, price: Number(p.sell), cost: Number(p.cost) });
    } else if (item) {
        item.qty += change;
        if (item.qty <= 0) cart = cart.filter(i => i.name !== name);
    }
    renderCart();
}

function renderCart() {
    let total = 0;
    document.getElementById('cartItems').innerHTML = cart.map(i => {
        total += i.qty * i.price; // RAW NUMBER MATH
        return `<div class="flex justify-between items-center p-5 bg-gray-950 rounded-3xl border border-border">
            <div class="font-black text-xs text-accent">${i.name} <span class="text-gray-600">x${i.qty}</span></div>
            <div class="flex gap-2"><button onclick="updateQuantity('${i.name}',-1)" class="w-8 h-8 bg-deep border border-border text-white rounded-full font-black">-</button><button onclick="updateQuantity('${i.name}',1)" class="w-8 h-8 bg-deep border border-border text-white rounded-full font-black">+</button></div>
        </div>`;
    }).join("");
    document.getElementById('total').innerText = total.toLocaleString('id-ID'); // FORMAT ONLY FOR VIEW
    const cInput = document.getElementById('cashInput').value || 0;
    document.getElementById('checkoutBtn').classList.toggle('opacity-60', (Number(cInput) < total || total === 0));
    document.getElementById('checkoutBtn').classList.toggle('pointer-events-none', (Number(cInput) < total || total === 0));
}

// Fixed Checkout (Math point 1 fix)
async function checkout() {
    // Math Fix: Total is derived from RAW NUMBERS in cart, not Rp formatted string
    const total = cart.reduce((sum, it) => sum + (it.qty * it.price), 0);
    const paid = Number(document.getElementById('cashInput').value || 0);
    const btn = document.getElementById('checkoutBtn');

    if (!cart.length) return;
    if (paid < total) return alert("Cash Not Enough");

    btn.innerText = "Wait..."; btn.classList.add('opacity-60','pointer-events-none');
    const change = paid - total;
    const profit = cart.reduce((sum, it) => sum + (it.qty * (it.price - it.cost)), 0);
    
    // Receipt Modal (Math Fixed)
    document.getElementById('invTotal').innerText = "Rp" + total.toLocaleString('id-ID');
    document.getElementById('invPaid').innerText = "Rp" + paid.toLocaleString('id-ID');
    document.getElementById('invChange').innerText = "Rp" + change.toLocaleString('id-ID');
    document.getElementById('invItems').innerHTML = cart.map(i => `<div class="flex justify-between text-gray-300"><span>${i.name} x${i.qty}</span><span>${(i.qty*i.price).toLocaleString('id-ID')}</span></div>`).join("");
    document.getElementById('invId').innerText = "TRANS-" + Date.now();
    document.getElementById('invoiceModal').classList.add('active');

    // Background write (Send RAW NUMBERS)
    const payload = { type: 'addTransaction', user: currentUser, total, profit, items: JSON.stringify(cart), paid, change };
    fetch(API, { method: 'POST', body: JSON.stringify(payload) }).then(() => { btn.innerText="CHECKOUT"; loadProducts(); });
}

function closeInvoice() {
    document.getElementById('invoiceModal').classList.remove('active');
    cart = []; document.getElementById('cashInput').value = ""; renderCart();
}

function downloadPng() { html2canvas(document.querySelector("#invoiceArea")).then(canvas => { const link = document.createElement('a'); link.download = 'TZ_Receipt.png'; link.href = canvas.toDataURL(); link.click(); }); }

// INVENTORY MANAGEMENT (Updated for Picture Uploader point 2)
function showAddProduct() {
    targetEditId = null; // New
    document.getElementById('manageList').insertAdjacentHTML('afterbegin', `
        <div class="bg-deep p-10 rounded-[2.5rem] border border-accent/20 flex flex-col gap-6 shadow-xl mb-6">
            <input id="pNameNew" placeholder="New Item Name" class="w-full p-5 border border-border rounded-xl bg-gray-950 font-bold outline-none">
            <div class="grid grid-cols-3 gap-4">
                <input id="pSellNew" type="number" placeholder="Sell Price" class="p-5 border border-border rounded-xl bg-gray-950 font-bold">
                <input id="pCostNew" type="number" placeholder="Cost" class="p-5 border border-border rounded-xl bg-gray-950 font-bold">
                <input id="pStockNew" type="number" placeholder="Stock" class="p-5 border border-border rounded-xl bg-gray-950 font-bold">
            </div>
            <button onclick="openUploader(null)" id="uploadAction" class="w-full bg-gray-950 text-gray-500 py-4 rounded-xl font-bold border-2 border-dashed border-border hover:border-accent group hover:text-accent">Upload Image (Optional)</button>
            <input type="hidden" id="pNewImgIdHolder">
            <button onclick="saveProductNew()" id="submitNewBtn" class="w-full bg-accent text-white p-5 rounded-2xl font-black transition">REGISTER ITEM</button>
        </div>`);
}

async function saveProductNew() {
    const payload = { type: 'addProduct', name: document.getElementById('pNameNew').value, sell: document.getElementById('pSellNew').value, cost: document.getElementById('pCostNew').value, stock: document.getElementById('pStockNew').value, imgId: document.getElementById('pNewImgIdHolder').value || "" };
    if(!payload.name || !payload.sell) return alert("Fill Name and SellPrice");
    const btn = document.getElementById('submitNewBtn');
    btn.innerText="Registering..."; btn.classList.add('opacity-60','pointer-events-none');
    await fetch(API, { method: 'POST', body: JSON.stringify(payload) });
    alert("Added!"); loadProducts(); renderManage(); 
}

function renderManage() {
    document.getElementById('manageList').innerHTML = products.map((p, idx) => `
        <div class="bg-deep p-8 rounded-3xl border border-border flex items-center gap-8 shadow-sm">
            <div class="relative group cursor-pointer" onclick="openUploader(${idx})">
                <img src="${p.imgId ? (API+'?type=img&id='+p.imgId) : 'https://via.placeholder.com/200/0D1117/888?text=TZGANG'}" class="w-20 h-20 object-cover rounded-2xl bg-gray-950 border-2 border-border group-hover:border-accent transition">
                <div class="absolute inset-0 bg-dark/70 rounded-2xl opacity-0 group-hover:opacity-100 flex items-center justify-center text-xs text-white font-bold transition">Change</div>
            </div>
            <div class="flex-1 grid grid-cols-4 gap-6 items-end">
                <div><label class="text-[9px] font-black text-gray-600 block mb-2 uppercase">Name</label><input class="w-full p-3 bg-gray-950 border border-border rounded-xl text-sm font-bold" value="${p.name}" id="mName-${idx}"></div>
                <div><label class="text-[9px] font-black text-gray-600 block mb-2 uppercase">Sell Rp (Raw)</label><input type="number" class="w-full p-3 bg-gray-950 border border-border rounded-xl text-sm font-bold text-accent" value="${p.sell}" id="mPrice-${idx}"></div>
                <div><label class="text-[9px] font-black text-gray-600 block mb-2 uppercase">Stock</label><input type="number" class="w-full p-3 bg-gray-950 border border-border rounded-xl text-sm font-bold text-white" value="${p.stock}" id="mStock-${idx}"></div>
                <button onclick="updateProduct(${idx})" id="mBtn-${idx}" class="bg-gray-800 text-gray-400 h-[46px] rounded-xl font-black text-[10px] uppercase tracking-widest active:scale-95 transition border border-border hover:bg-gray-700 hover:text-white">Save</button>
            </div>
        </div>`).join("");
}

async function updateProduct(idx) {
    const btn = document.getElementById('mBtn-'+idx);
    btn.innerText="saving..."; btn.classList.add('opacity-60','pointer-events-none');
    const payload = { type: 'editProduct', oldName: products[idx].name, name: document.getElementById(`mName-${idx}`).value, sell: Number(document.getElementById(`mPrice-${idx}`).value), stock: Number(document.getElementById(`mStock-${idx}`).value), cost: products[idx].cost, imgId: products[idx].imgId };
    await fetch(API, { method: 'POST', body: JSON.stringify(payload) });
    loadProducts(); btn.innerText="Save"; btn.classList.remove('opacity-60','pointer-events-none');
}

// HISTORY (Point 4 Detail View Fix)
async function fetchHistory() {
    const res = await fetch(API + "?type=transactions");
    const data = (await res.json()).slice(0).reverse(); // All Transactions, latest first
    document.getElementById('historyList').innerHTML = data.map((r, idx) => {
        const transItemsRaw = r[5]; // The JSON items string
        const items = JSON.parse(transItemsRaw);
        const itemCount = items.reduce((sum,i) => sum + i.qty, 0);
        return `<div class="bg-deep p-6 rounded-3xl border border-border flex justify-between items-center group cursor-pointer hover:border-accent/30" onclick="viewTransDetail(${data.length - 1 - idx}, data)">
            <div><div class="text-[10px] font-black text-gray-600 uppercase">${new Date(r[0]).toLocaleString('id-ID')}</div><div class="font-black text-accent uppercase text-xs">Staff: ${r[1]} (${itemCount} items sold)</div></div>
            <div class="text-right flex items-center gap-4">
                <div><div class="font-black text-lg text-white">Rp${Number(r[3]).toLocaleString('id-ID')}</div><div class="text-[10px] text-accent/70 font-bold">Paid: ${Number(r[6]).toLocaleString('id-ID')}</div></div>
                <div class="w-8 h-8 rounded-full border border-border flex items-center justify-center text-accent group-hover:bg-accent group-hover:text-white transition">→</div>
            </div>
        </div>`
    }).join("");
}

function viewTransDetail(origIdx, dataList) {
    const r = dataList[origIdx]; // Indexing reversed list logic
    const items = JSON.parse(r[5]);
    const itemsHtml = items.map(i => `<div class="flex justify-between items-center p-4 bg-gray-950 border border-border rounded-xl"><div><span class="font-bold text-accent">${i.name}</span> <span class="text-gray-600">x${i.qty}</span></div><span class="font-bold text-white text-xs">Rp${(i.qty*i.price).toLocaleString('id-ID')}</span></div>`).join("");
    
    document.getElementById('detailsArea').innerHTML = `
        <div class="text-center text-gray-600 text-sm font-black mb-10 pb-6 border-b border-border uppercase tracking-widest">${new Date(r[0]).toLocaleString('id-ID')} By ${r[1]}</div>
        ${itemsHtml}
        <div class="border-t border-dashed border-gray-700 pt-6 mt-6 space-y-2 text-sm">
            <div class="flex justify-between font-black text-white text-lg"><span>Grand Total</span><span>Rp${Number(r[3]).toLocaleString('id-ID')}</span></div>
            <div class="flex justify-between font-bold text-accent"><span>Cash Received</span><span>Rp${Number(r[6]).toLocaleString('id-ID')}</span></div>
            <div class="flex justify-between font-bold text-red-400"><span>Change Returned</span><span>Rp${Number(r[7]).toLocaleString('id-ID')}</span></div>
        </div>
    `;
    document.getElementById('detailModal').classList.add('active');
}
</script>
