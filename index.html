<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NA2625 POS PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .page-content { display: none; height: 100%; width: 100%; overflow-y: auto; }
        .page-content.active { display: block; }
        .nav-btn.active { background-color: #1A877E; color: white; }
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 200; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal-overlay.active { display: flex; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="h-full bg-gray-50 overflow-hidden font-sans text-gray-900">

<div id="invoiceModal" class="modal-overlay">
    <div class="bg-white w-full max-w-sm rounded-[2.5rem] overflow-hidden shadow-2xl flex flex-col mx-4">
        <div id="invoiceArea" class="p-8 bg-white font-mono text-sm">
            <div class="text-center border-b border-black border-dashed pb-4 mb-4">
                <h1 class="font-black text-lg uppercase">NA2625 Creative</h1>
                <p id="invDate" class="text-[10px]"></p>
            </div>
            <div id="invItems" class="space-y-1 mb-4"></div>
            <div class="border-t border-black border-dashed pt-4 space-y-1">
                <div class="flex justify-between font-bold"><span>TOTAL</span><span id="invTotal"></span></div>
                <div class="flex justify-between"><span>CASH</span><span id="invPaid"></span></div>
                <div class="flex justify-between"><span>CHANGE</span><span id="invChange"></span></div>
            </div>
        </div>
        <div class="p-4 bg-gray-100 grid grid-cols-2 gap-2">
            <button onclick="printBluetooth()" class="bg-teal-600 text-white py-4 rounded-xl font-black text-xs">BT PRINT</button>
            <button onclick="closeInvoice()" class="bg-gray-300 text-gray-700 py-4 rounded-xl font-black text-xs">CLOSE</button>
        </div>
    </div>
</div>

<div id="editModal" class="modal-overlay">
    <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-8 space-y-4 shadow-2xl">
        <h3 class="font-black text-xl mb-2">Edit Product</h3>
        <input id="edit-name" type="text" placeholder="Name" class="w-full p-4 bg-gray-50 rounded-2xl font-bold border outline-none">
        <div class="grid grid-cols-2 gap-4">
            <input id="edit-sell" type="number" placeholder="Sell Price" class="p-4 bg-gray-50 rounded-2xl font-bold border outline-none">
            <input id="edit-stock" type="number" placeholder="Stock" class="p-4 bg-gray-50 rounded-2xl font-bold border outline-none">
        </div>
        <div class="flex gap-2">
            <button onclick="updateProduct()" class="flex-1 bg-teal-600 text-white py-4 rounded-2xl font-black">SAVE</button>
            <button onclick="closeEditModal()" class="flex-1 bg-gray-200 text-gray-700 py-4 rounded-2xl font-black">CANCEL</button>
        </div>
    </div>
</div>

<div id="loginPage" class="fixed inset-0 z-[500] flex items-center justify-center bg-white">
    <div class="w-full max-w-xs p-8 text-center">
        <h1 class="text-4xl font-black text-teal-900 mb-8 tracking-tighter">NA2625</h1>
        <div class="space-y-3">
            <input id="user" type="text" placeholder="Username" class="w-full p-4 border rounded-2xl bg-gray-50 text-center font-bold outline-none">
            <input id="pass" type="password" placeholder="Password" class="w-full p-4 border rounded-2xl bg-gray-50 text-center font-bold outline-none">
            <button id="loginBtn" class="w-full bg-teal-600 text-white p-4 rounded-2xl font-black shadow-lg">LOGIN</button>
        </div>
    </div>
</div>

<div id="app" class="flex h-full w-full hidden">
    <nav class="w-64 bg-white border-r flex flex-col shrink-0">
        <div class="p-8 font-black text-teal-900 text-xl border-b">NA2625</div>
        <div class="p-4 space-y-2 flex-1">
            <button id="nav-cashier" onclick="showPage('cashier')" class="nav-btn active w-full text-left p-4 rounded-2xl font-bold">🛒 Cashier</button>
            <button id="nav-manage" onclick="showPage('manage')" class="nav-btn w-full text-left p-4 rounded-2xl font-bold text-gray-400">📦 Products</button>
            <button id="nav-additem" onclick="showPage('additem')" class="nav-btn w-full text-left p-4 rounded-2xl font-bold text-gray-400">➕ Add Item</button>
            <button id="nav-history" onclick="showPage('history')" class="nav-btn w-full text-left p-4 rounded-2xl font-bold text-gray-400">📜 History</button>
        </div>
        <div class="p-6 border-t"><button onclick="logout()" class="text-xs font-bold text-red-500 uppercase tracking-widest">Sign Out</button></div>
    </nav>

    <main class="flex-1 bg-gray-50 overflow-hidden relative h-full">
        <div id="page-cashier" class="page-content active p-8 flex gap-8">
            <div class="flex-1 flex flex-col overflow-hidden">
                <input type="text" id="posSearch" oninput="renderCashier()" placeholder="Search items to sell..." class="w-full p-5 rounded-3xl border-none shadow-sm mb-6 font-bold outline-none focus:ring-2 focus:ring-teal-400">
                <div id="cashierGrid" class="grid grid-cols-2 md:grid-cols-4 gap-4 overflow-y-auto pb-20"></div>
            </div>
            <div class="w-80 bg-white rounded-[2.5rem] shadow-xl p-8 flex flex-col shrink-0">
                <div id="cartItems" class="flex-1 overflow-y-auto space-y-4 mb-6"></div>
                <div class="border-t pt-6 space-y-4">
                    <div class="flex justify-between font-black text-xl"><span>Total</span><span>Rp <span id="total">0</span></span></div>
                    <input type="number" id="cashInput" placeholder="Enter Cash (Rp)" class="w-full p-4 bg-gray-100 rounded-2xl text-center font-black text-lg outline-none border-2 border-transparent focus:border-teal-500">
                    <button onclick="checkout()" class="w-full bg-teal-600 text-white p-5 rounded-2xl font-black text-lg shadow-xl active:scale-95 transition">PAY NOW</button>
                </div>
            </div>
        </div>

        <div id="page-manage" class="page-content p-8">
            <h2 class="text-2xl font-black mb-6">Product Management</h2>
            <input type="text" id="manageSearch" oninput="renderManage()" placeholder="Search product to edit..." class="w-full p-5 rounded-3xl border-none shadow-sm mb-6 font-bold outline-none bg-white">
            <div id="manageGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </div>

        <div id="page-additem" class="page-content p-8">
            <div class="max-w-md mx-auto bg-white p-8 rounded-[2.5rem] shadow-sm border space-y-4">
                <h2 class="text-2xl font-black mb-2">New Product</h2>
                <input id="add-name" type="text" placeholder="Product Name" class="w-full p-4 bg-gray-50 rounded-2xl font-bold border outline-none">
                <div class="grid grid-cols-2 gap-4">
                    <input id="add-sell" type="number" placeholder="Selling Price" class="p-4 bg-gray-50 rounded-2xl font-bold border outline-none">
                    <input id="add-cost" type="number" placeholder="Cost Price" class="p-4 bg-gray-50 rounded-2xl font-bold border outline-none">
                </div>
                <input id="add-stock" type="number" placeholder="Initial Stock" class="w-full p-4 bg-gray-50 rounded-2xl font-bold border outline-none">
                <input id="add-img" type="file" accept="image/*" class="text-xs p-4 bg-gray-50 w-full rounded-2xl border">
                <button onclick="saveNewItem()" class="w-full bg-teal-600 text-white p-5 rounded-2xl font-black shadow-lg">CREATE PRODUCT</button>
            </div>
        </div>

        <div id="page-history" class="page-content p-8">
            <h2 class="text-2xl font-black mb-6">Recent Sales</h2>
            <div id="historyList" class="space-y-3"></div>
        </div>
    </main>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbxo7eLeJa5TvX8qKqaO-sxe11x8BOkuouEKZ-lkghtLR80W4S9iZJwuunow9Fa9Q_Pb/exec"; 
let products = [], cart = [], currentUser = "", editingOldName = "";

// --- INIT ---
window.onload = () => {
    const session = localStorage.getItem('na2625_session');
    if (session) { currentUser = session; initApp(); }
};

document.getElementById('loginBtn').onclick = async () => {
    const u = document.getElementById('user').value, p = document.getElementById('pass').value;
    const res = await fetch(API, { method: 'POST', body: JSON.stringify({ type: 'login', user: u, pass: p }) });
    const data = await res.json();
    if(data.success) { currentUser = u; localStorage.setItem('na2625_session', u); initApp(); }
    else alert("Access Denied");
};

function initApp() {
    document.getElementById('loginPage').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    loadProducts();
}

async function loadProducts() {
    const res = await fetch(API + "?type=products");
    const data = await res.json();
    products = data.slice(1).map(r => ({ name: r[0], sell: Number(r[1]), cost: Number(r[2]), stock: Number(r[3]), img: r[4] }));
    renderCashier();
}

// --- RENDERERS ---
function renderCashier() {
    const s = document.getElementById('posSearch').value.toLowerCase();
    document.getElementById('cashierGrid').innerHTML = products.filter(p => p.name.toLowerCase().includes(s)).map(p => `
        <div onclick="addToCart('${p.name}')" class="bg-white p-4 rounded-3xl shadow-sm hover:shadow-md cursor-pointer active:scale-95 transition-all text-center border-2 border-transparent hover:border-teal-400">
            <div class="h-24 bg-gray-50 rounded-2xl mb-3 overflow-hidden">
                <img src="${p.img || 'https://via.placeholder.com/100'}" class="w-full h-full object-cover">
            </div>
            <div class="text-[10px] font-black text-gray-400 uppercase truncate">${p.name}</div>
            <div class="font-black text-teal-700">Rp ${p.sell.toLocaleString()}</div>
        </div>`).join("");
}

function renderManage() {
    const s = document.getElementById('manageSearch').value.toLowerCase();
    document.getElementById('manageGrid').innerHTML = products.filter(p => p.name.toLowerCase().includes(s)).map(p => `
        <div class="bg-white p-6 rounded-[2rem] shadow-sm flex items-center justify-between border">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-gray-100 rounded-xl overflow-hidden"><img src="${p.img || ''}" class="w-full h-full object-cover"></div>
                <div>
                    <div class="font-black text-xs uppercase">${p.name}</div>
                    <div class="text-[10px] font-bold text-teal-600">Rp ${p.sell.toLocaleString()} • Stock: ${p.stock}</div>
                </div>
            </div>
            <button onclick="openEditModal('${p.name}')" class="bg-gray-100 px-4 py-2 rounded-xl text-[10px] font-black uppercase">Edit</button>
        </div>`).join("");
}

// --- CART & TRANSACTIONS ---
function addToCart(name) {
    const p = products.find(x => x.name === name);
    if(p.stock <= 0) return alert("Out of stock!");
    let item = cart.find(i => i.name === name);
    if (!item) cart.push({ name: p.name, qty: 1, price: p.sell, cost: p.cost });
    else item.qty++;
    renderCart();
}

function renderCart() {
    let total = 0;
    document.getElementById('cartItems').innerHTML = cart.map(i => {
        total += (i.qty * i.price);
        return `<div class="flex justify-between items-center p-3 bg-gray-50 rounded-2xl border text-xs font-bold italic">
            <span>${i.name} x${i.qty}</span><span>${(i.qty*i.price).toLocaleString()}</span>
        </div>`;
    }).join("");
    document.getElementById('total').innerText = total.toLocaleString();
}

async function checkout() {
    const total = cart.reduce((s, i) => s + (i.qty * i.price), 0);
    const paid = parseInt(document.getElementById('cashInput').value || 0);
    if (!cart.length || paid < total) return alert("Check Items/Cash!");

    const change = paid - total;
    document.getElementById('invDate').innerText = new Date().toLocaleString();
    document.getElementById('invTotal').innerText = "Rp " + total.toLocaleString();
    document.getElementById('invPaid').innerText = "Rp " + paid.toLocaleString();
    document.getElementById('invChange').innerText = "Rp " + change.toLocaleString();
    document.getElementById('invItems').innerHTML = cart.map(i => `
        <div class="flex justify-between"><span>${i.name} x${i.qty}</span><span>${(i.qty*i.price).toLocaleString()}</span></div>
    `).join("");
    
    document.getElementById('invoiceModal').classList.add('active');
    fetch(API, { method: 'POST', body: JSON.stringify({ type: 'addTransaction', user: currentUser, total, items: JSON.stringify(cart), paid, change, profit: 0 })}).then(() => loadProducts());
}

// --- PRODUCT MANAGEMENT ACTIONS ---
function openEditModal(name) {
    const p = products.find(x => x.name === name);
    editingOldName = name;
    document.getElementById('edit-name').value = p.name;
    document.getElementById('edit-sell').value = p.sell;
    document.getElementById('edit-stock').value = p.stock;
    document.getElementById('editModal').classList.add('active');
}

async function updateProduct() {
    const payload = {
        type: 'updateProduct',
        oldName: editingOldName,
        newName: document.getElementById('edit-name').value,
        sell: document.getElementById('edit-sell').value,
        stock: document.getElementById('edit-stock').value
    };
    await fetch(API, { method: 'POST', body: JSON.stringify(payload) });
    closeEditModal(); loadProducts(); renderManage();
}

async function saveNewItem() {
    const file = document.getElementById('add-img').files[0];
    let img = "";
    if(file) img = await new Promise(r => { const rd = new FileReader(); rd.onload = () => r(rd.result); rd.readAsDataURL(file); });
    
    await fetch(API, { method: 'POST', body: JSON.stringify({
        type: 'addProduct', name: document.getElementById('add-name').value, 
        sell: document.getElementById('add-sell').value, cost: document.getElementById('add-cost').value, 
        stock: document.getElementById('add-stock').value, img
    })});
    alert("Saved!"); loadProducts(); showPage('manage');
}

// --- UI UTILS ---
function showPage(p) {
    document.querySelectorAll('.page-content, .nav-btn').forEach(el => {
        el.classList.remove('active');
        if(el.classList.contains('nav-btn')) el.classList.add('text-gray-400');
    });
    document.getElementById('page-'+p).classList.add('active');
    document.getElementById('nav-'+p).classList.add('active');
    document.getElementById('nav-'+p).classList.remove('text-gray-400');
    if(p === 'manage') renderManage();
    if(p === 'history') fetchHistory();
}

async function fetchHistory() {
    const res = await fetch(API + "?type=transactions");
    const data = (await res.json()).slice(1).reverse();
    document.getElementById('historyList').innerHTML = data.slice(0,10).map(r => `
        <div class="bg-white p-4 rounded-2xl shadow-sm flex justify-between items-center border">
            <div class="text-[10px] font-black text-gray-400 uppercase">${new Date(r[0]).toLocaleString()}</div>
            <div class="font-black text-teal-700">Rp ${Number(r[3]).toLocaleString()}</div>
        </div>`).join("");
}

function closeInvoice() { document.getElementById('invoiceModal').classList.remove('active'); cart = []; renderCart(); }
function closeEditModal() { document.getElementById('editModal').classList.remove('active'); }
function logout() { localStorage.removeItem('na2625_session'); location.reload(); }

async function printBluetooth() { alert("Bluetooth connection initialized..."); /* MPT implementation from your previous snippet */ }
</script>
</body>
</html>
