<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NA2625 POS</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body{background:#f1f5f9;font-family:sans-serif}
.header{background:linear-gradient(90deg,#10b981,#059669)}
.card{background:white;border-radius:16px;box-shadow:0 4px 15px rgba(0,0,0,0.08)}
.product{transition:0.2s;cursor:pointer}
.product:active{transform:scale(0.96)}
.category{padding:6px 12px;border-radius:999px;background:#e5e7eb}
.category.active{background:#10b981;color:white}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header text-white p-4 flex justify-between">
  <div class="font-bold">NA2625 POS</div>
  <div>Cart: <span id="cartCount">0</span></div>
</div>

<!-- CATEGORY -->
<div id="categories" class="flex gap-2 overflow-x-auto p-3"></div>

<!-- MAIN -->
<div class="grid md:grid-cols-3 gap-4 p-4">

  <!-- PRODUCTS -->
  <div class="md:col-span-2">
    <div id="productsGrid" class="grid grid-cols-2 md:grid-cols-3 gap-3"></div>
  </div>

  <!-- CART -->
  <div class="card p-4">
    <h2 class="font-bold mb-2">Cart</h2>

    <div id="cartItems" class="text-sm"></div>

    <div class="mt-2 font-semibold">
      Total: <span id="total">0</span>
    </div>

    <button onclick="checkout()" class="bg-green-500 text-white w-full mt-3 p-3 rounded-xl">
      Checkout
    </button>
  </div>

</div>

<!-- RECEIPT -->
<div id="receiptModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center">
  <div class="bg-white w-72 p-4 rounded">
    <h2 class="text-center font-bold">Receipt</h2>
    <div id="receiptContent" class="text-sm mt-2"></div>
    <div class="mt-2 font-bold text-right">
      Total: <span id="receiptTotal"></span>
    </div>
    <button onclick="window.print()" class="bg-green-500 text-white w-full mt-2 p-2 rounded">
      Print
    </button>
    <button onclick="closeReceipt()" class="bg-gray-200 w-full mt-2 p-2 rounded">
      Close
    </button>
  </div>
</div>

<script>
const API="https://script.google.com/macros/s/AKfycbzQ7DntFuURViDZDitCEwLVzsyOkp5d7k177hWSEmh6ijjNpa8GpFKhUIX0Zyseu2Ze/exec";

let productData=[];
let cart=[];
let activeCategory="All";

/* LOAD */
async function load(){
  try{
    let res=await fetch(API+"?type=products");
    let data=await res.json();

    productData=data.slice(1).map(p=>({
      name:p[0],
      sell:+p[1],
      cost:+p[2],
      stock:+p[3],
      image:p[5],
      category:p[6]||"General"
    }));

    renderCategories();
    renderProducts();

  }catch(e){
    alert("API ERROR");
    console.log(e);
  }
}

/* CATEGORY */
function renderCategories(){
  const cats=["All",...new Set(productData.map(p=>p.category))];

  document.getElementById("categories").innerHTML=cats.map(c=>`
    <div onclick="setCategory('${c}')"
      class="category ${c===activeCategory?'active':''}">
      ${c}
    </div>
  `).join("");
}

function setCategory(c){
  activeCategory=c;
  renderCategories();
  renderProducts();
}

/* PRODUCTS */
function renderProducts(){
  const list=productData.filter(p=>activeCategory==="All"||p.category===activeCategory);

  document.getElementById("productsGrid").innerHTML=list.map(p=>`
    <div class="card product p-2" onclick="addToCart('${p.name}')">
      <img src="${p.image||'https://via.placeholder.com/150'}"
        class="w-full h-24 object-cover rounded">
      <div class="text-sm mt-1">${p.name}</div>
      <div class="text-green-600 text-sm">Rp ${p.sell}</div>
    </div>
  `).join("");
}

/* CART */
function addToCart(name){
  const p=productData.find(x=>x.name===name);
  const existing=cart.find(i=>i.name===name);

  if(existing) existing.qty++;
  else cart.push({name:p.name,qty:1,price:p.sell});

  renderCart();
}

function renderCart(){
  let totalVal=0;

  document.getElementById("cartItems").innerHTML=cart.map((i,idx)=>{
    let sub=i.qty*i.price;
    totalVal+=sub;

    return `
      <div class="flex justify-between border-b py-1">
        ${i.name} x${i.qty}
        <span>${sub}</span>
      </div>
    `;
  }).join("");

  document.getElementById("total").innerText=totalVal;
  document.getElementById("cartCount").innerText=cart.length;
}

/* CHECKOUT */
async function checkout(){
  if(cart.length===0) return alert("Cart kosong");

  const savedCart=[...cart]; // keep copy

  await fetch(API,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      type:"addTransaction",
      items:JSON.stringify(savedCart),
      total:document.getElementById("total").innerText,
      profit:0,
      customer:"-"
    })
  });

  showReceipt(savedCart);

  cart=[];
  renderCart();
}

/* RECEIPT */
function showReceipt(data){
  document.getElementById("receiptModal").classList.remove("hidden");

  document.getElementById("receiptContent").innerHTML=data.map(i=>`
    <div class="flex justify-between">
      ${i.name} x${i.qty}
      <span>${i.qty*i.price}</span>
    </div>
  `).join("");

  document.getElementById("receiptTotal").innerText=
    data.reduce((sum,i)=>sum+(i.qty*i.price),0);
}

function closeReceipt(){
  document.getElementById("receiptModal").classList.add("hidden");
}

/* INIT */
load();
</script>

</body>
</html>
