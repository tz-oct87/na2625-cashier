<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body, html {height:100%; margin:0; font-family:sans-serif; background:#f9fafb;}
        #loginPage {display:flex; flex-direction:column; justify-content:center; align-items:center; height:100%;}
        #app {display:none; padding:20px; max-width: 1200px; margin: auto;}
    </style>
</head>
<body>

<div id="loginPage">
    <div class="bg-white p-8 rounded-lg shadow-xl w-80 border-t-4 border-blue-600">
        <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">POS Login</h2>
        <input id="user" placeholder="Username" class="border p-3 w-full mb-3 rounded outline-none focus:ring-2 focus:ring-blue-400">
        <input id="pass" type="password" placeholder="Password" class="border p-3 w-full mb-6 rounded outline-none focus:ring-2 focus:ring-blue-400">
        <button id="loginBtn" class="bg-blue-600 hover:bg-blue-700 text-white p-3 w-full rounded font-bold transition">LOGIN</button>
    </div>
</div>

<div id="app">
    <div id="adminPanel" class="hidden grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
        <div class="bg-white p-5 rounded shadow border-l-4 border-blue-500">
            <h3 class="font-bold text-blue-700 mb-4 uppercase text-sm">Staff Management</h3>
            <input id="staffUser" placeholder="New Username" class="border p-2 w-full mb-2 rounded text-sm">
            <input id="staffPass" type="password" placeholder="New Password" class="border p-2 w-full mb-2 rounded text-sm">
            <button id="addStaffBtn" class="bg-blue-600 text-white w-full p-2 rounded text-sm font-semibold">Add Staff</button>
        </div>
        <div class="bg-white p-5 rounded shadow border-l-4 border-orange-500">
            <h3 class="font-bold text-orange-700 mb-4 uppercase text-sm">Products Sheet Editor</h3>
            <div class="grid grid-cols-2 gap-2">
                <input id="pName" placeholder="Product Name" class="border p-2 rounded text-sm col-span-2">
                <input id="pSell" type="number" placeholder="Sell Price" class="border p-2 rounded text-sm">
                <input id="pCost" type="number" placeholder="Cost Price" class="border p-2 rounded text-sm">
                <input id="pStock" type="number" placeholder="Stock" class="border p-2 rounded text-sm">
                <input id="pBar" placeholder="Barcode" class="border p-2 rounded text-sm">
                <button id="addProductBtn" class="bg-orange-500 text-white w-full p-2 rounded text-sm font-semibold col-span-2">Add to 'products'</button>
            </div>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <div class="lg:col-span-2">
            <h3 class="text-xl font-bold text-gray-700 mb-4">Catalog</h3>
            <input id="barcodeInput" placeholder="Scan or search..." class="border p-4 w-full mb-6 rounded-lg shadow-inner bg-white text-lg focus:ring-2 focus:ring-green-400 outline-none">
            <div id="reader" class="mb-6 overflow-hidden rounded-lg bg-black"></div>
            <div id="productsGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4"></div>
        </div>

        <div class="bg-white p-6 rounded-lg shadow-lg border border-gray-100 h-fit">
            <h3 class="text-lg font-bold border-b pb-4 mb-4 text-gray-800">Current Cart</h3>
            <div id="cartItems" class="space-y-2 mb-6 min-h-[100px]"></div>
            <div class="border-t pt-4">
                <div class="flex justify-between text-2xl font-black text-gray-900 mb-6"><span>Total</span><span>Rp <span id="total">0</span></span></div>
                <button onclick="checkout('cash')" class="bg-green-600 hover:bg-green-700 text-white p-4 w-full rounded-xl mb-3 font-bold transition">CASH</button>
                <button onclick="payQRIS()" class="bg-purple-600 hover:bg-purple-700 text-white p-4 w-full rounded-xl font-bold transition">QRIS</button>
            </div>
        </div>
    </div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbwR58GxmaImIrO6mKkLcu95ym11AWFGRKz3yEHHDBNLt-lHoxcHpHMgBmQuMP31LsoR/exec";
let products = [], cart = [], currentUser = "", currentRole = "";

document.getElementById("loginBtn").addEventListener("click", async () => {
    const u = document.getElementById("user").value;
    const p = document.getElementById("pass").value;
    const res = await fetch(API, { method: "POST", body: JSON.stringify({ type: "login", user: u, pass: p }) });
    const data = await res.json();
    if (data.success) {
        currentUser = u; currentRole = data.role;
        document.getElementById("loginPage").classList.add("hidden");
        document.getElementById("app").style.display = "block";
        if (currentRole === "admin") document.getElementById("adminPanel").classList.remove("hidden");
        load();
        startScanner();
    } else alert("Invalid Login");
});

async function load() {
    const res = await fetch(API + "?type=products");
    const data = await res.json();
    products = data.slice(1).map(p => ({ name: p[0], sell: +p[1], cost: +p[2], stock: +p[3], image: p[4], barcode: p[5] }));
    renderProducts();
}

function renderProducts() {
    const grid = document.getElementById("productsGrid");
    grid.innerHTML = products.map(p => `
        <div onclick="addToCart('${p.name}')" class="bg-white border p-4 cursor-pointer rounded-xl hover:shadow-md transition">
            <div class="font-bold">${p.name}</div>
            <div class="text-green-600">Rp ${p.sell}</div>
            <div class="text-xs text-gray-400">Stock: ${p.stock}</div>
        </div>
    `).join("");
}

function addToCart(name) {
    const p = products.find(x => x.name === name);
    let ex = cart.find(i => i.name === name);
    if (ex) ex.qty++; else cart.push({ name: p.name, qty: 1, price: p.sell });
    renderCart();
}

function renderCart() {
    let total = 0;
    const div = document.getElementById("cartItems");
    div.innerHTML = cart.map(i => {
        total += i.qty * i.price;
        return `<div class="flex justify-between text-sm"><span>${i.name} x${i.qty}</span><span>${i.qty * i.price}</span></div>`;
    }).join("");
    document.getElementById("total").innerText = total;
}

async function checkout(method) {
    if (!cart.length) return;
    const payload = { type: "addTransaction", user: currentUser, items: JSON.stringify(cart), payment: method };
    await fetch(API, { method: "POST", body: JSON.stringify(payload) });
    alert("Done!");
    cart = []; renderCart(); load();
}

function startScanner() {
    const scanner = new Html5Qrcode("reader");
    scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, code => {
        const p = products.find(x => x.barcode == code);
        if (p) { addToCart(p.name); scanner.pause(); setTimeout(() => scanner.resume(), 2000); }
    });
}
</script>
</body>
</html>
