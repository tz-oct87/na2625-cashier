<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="p-4">

<!-- LOGIN -->
<div id="loginPage">
  <h2 class="text-xl mb-2">Login</h2>
  <input id="user" placeholder="Username" class="border p-2"><br><br>
  <input id="pass" type="password" placeholder="Password" class="border p-2"><br><br>
  <button onclick="login()" class="bg-green-500 text-white p-2">Login</button>
</div>

<!-- APP -->
<div id="app" style="display:none">

<h1 class="text-xl mb-3">Cashier</h1>

<input id="barcodeInput" placeholder="Scan barcode" class="border p-2 w-full mb-2">

<div id="reader"></div>

<div id="productsGrid" class="grid grid-cols-2 gap-2"></div>

<h2 class="mt-4">Cart</h2>
<div id="cartItems"></div>
<div>Total: <b id="total">0</b></div>

<button onclick="checkout('cash')" class="bg-green-500 text-white p-2 w-full mt-2">Cash</button>
<button onclick="payQRIS()" class="bg-purple-500 text-white p-2 w-full mt-2">QRIS</button>

<hr class="my-4">

<h2>Analytics</h2>
<canvas id="chart"></canvas>

</div>

<script>
const API="https://script.google.com/macros/s/AKfycbyAse_JAG2oxa0DmOq1Pfa-IUVBsHUQQ8GhGewRuhIJY3o03Zp-CayIwjwBxbLWYcP4/exec";

let products=[],cart=[],currentUser="";

/* LOGIN */
async function login(){
  let res=await fetch(API,{
    method:"POST",
    body:JSON.stringify({type:"login",user:user.value,pass:pass.value})
  });

  let data=await res.json();

  if(data.success){
    currentUser=user.value;
    loginPage.style.display="none";
    app.style.display="block";
    load();
    startScanner();
  }else alert("Login failed");
}

/* LOAD */
async function load(){
  let res=await fetch(API+"?type=products");
  let data=await res.json();

  products=data.slice(1).map(p=>({
    name:p[0],sell:+p[1],cost:+p[2],stock:+p[3],barcode:p[5]
  }));

  renderProducts();
}

/* PRODUCTS */
function renderProducts(){
  productsGrid.innerHTML=products.map(p=>`
    <div onclick="addToCart('${p.name}')" class="border p-2">
      ${p.name}<br>Rp ${p.sell}
    </div>
  `).join("");
}

/* CART */
function addToCart(name){
  let p=products.find(x=>x.name===name);
  let ex=cart.find(i=>i.name===name);

  if(ex) ex.qty++; else cart.push({name:p.name,qty:1,price:p.sell});

  renderCart();
}

function renderCart(){
  let t=0;

  cartItems.innerHTML=cart.map(i=>{
    let sub=i.qty*i.price;
    t+=sub;
    return `${i.name} x${i.qty} = ${sub}<br>`;
  }).join("");

  total.innerText=t;
}

/* CHECKOUT */
async function checkout(method){
  if(cart.length===0) return;

  let payload={
    type:"addTransaction",
    user:currentUser,
    items:JSON.stringify(cart),
    payment:method
  };

  try{
    await fetch(API,{method:"POST",body:JSON.stringify(payload)});
    printReceipt();
    cart=[];
    renderCart();
  }catch(e){
    saveOffline(payload);
  }
}

/* QRIS */
function payQRIS(){
  let url="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=PAY-"+total.innerText;
  let w=window.open("");
  w.document.write(`<img src="${url}">`);
}

/* RECEIPT */
function printReceipt(){
  let w=window.open("","","width=300");

  w.document.write(`
  <style>body{font-family:monospace;width:80mm}</style>
  ${cart.map(i=>`${i.name} x${i.qty}=${i.qty*i.price}`).join("<br>")}
  <hr>Total:${total.innerText}
  `);

  w.print();
}

/* OFFLINE */
function saveOffline(d){
  let q=JSON.parse(localStorage.getItem("q")||"[]");
  q.push(d);
  localStorage.setItem("q",JSON.stringify(q));
}

/* BARCODE CAMERA */
function startScanner(){
  const scanner=new Html5Qrcode("reader");

  scanner.start({facingMode:"environment"},{fps:10,qrbox:250},
    code=>{
      let p=products.find(x=>x.barcode==code);
      if(p) addToCart(p.name);
    }
  );
}

/* ANALYTICS */
async function loadAnalytics(){
  let res=await fetch(API+"?type=transactions");
  let data=await res.json();

  let daily={};

  data.slice(1).forEach(r=>{
    let d=new Date(r[0]).toLocaleDateString();
    daily[d]=(daily[d]||0)+Number(r[3]);
  });

  new Chart(chart,{
    type:"line",
    data:{labels:Object.keys(daily),datasets:[{data:Object.values(daily)}]}
  });
}
</script>

</body>
</html>
