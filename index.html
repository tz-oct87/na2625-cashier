<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.tailwindcss.com"></script>

<style>
body{background:#f8fafc;font-family:sans-serif}
.header{background:linear-gradient(90deg,#10b981,#059669)}
.card{background:white;border-radius:16px;box-shadow:0 4px 10px rgba(0,0,0,0.08)}
.product:hover{transform:scale(0.97)}
.product{transition:0.2s}
.category{white-space:nowrap;padding:6px 14px;border-radius:999px;background:#e5e7eb}
.category.active{background:#10b981;color:white}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header text-white p-4 text-center text-lg font-bold">
Kasir POS
</div>

<!-- CATEGORY -->
<div id="categories" class="flex gap-2 overflow-x-auto p-3"></div>

<!-- MAIN -->
<div class="grid md:grid-cols-3 gap-4 p-4">

<!-- PRODUCTS -->
<div class="md:col-span-2">
  <div id="products" class="grid grid-cols-2 md:grid-cols-3 gap-3"></div>
</div>

<!-- CART -->
<div class="card p-3">
  <h2 class="font-bold mb-2">Cart</h2>
  <div id="cart"></div>

  <div class="mt-2">
    Total: <b id="total">0</b>
  </div>

  <button onclick="checkout()" class="bg-green-500 text-white w-full p-3 mt-2 rounded-xl">
    Bayar
  </button>
</div>

</div>

<!-- RECEIPT -->
<div id="receipt" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center">
  <div class="bg-white w-72 p-4 rounded">
    <h2 class="text-center font-bold">STRUK</h2>
    <div id="receiptContent" class="text-sm mt-2"></div>
    <button onclick="window.print()" class="bg-green-500 text-white w-full p-2 mt-2 rounded">
      Print
    </button>
  </div>
</div>

<script>
const API="https://script.google.com/macros/s/AKfycbz0SXsxX1jRAO-vSxKs_hGZqXXWO8nposUzayV82bwJpTEX_hfiD_Oc9xAsNw3ToKaq/exec";

let products=[],cart=[],activeCategory="All";

// LOAD
async function load(){
  let res=await fetch(API+"?type=products");
  let data=await res.json();

  products=data.slice(1).map(p=>({
    name:p[0],sell:+p[1],cost:+p[2],
    stock:+p[3],image:p[5],category:p[6]||"General"
  }));

  renderCategories();
  renderProducts();
}

// CATEGORY
function renderCategories(){
  let cats=["All",...new Set(products.map(p=>p.category))];

  categories.innerHTML=cats.map(c=>`
    <div onclick="setCat('${c}')"
      class="category ${c===activeCategory?'active':''}">
      ${c}
    </div>
  `).join("");
}

function setCat(c){
  activeCategory=c;
  renderCategories();
  renderProducts();
}

// PRODUCTS
function renderProducts(){
  let list=products.filter(p=>activeCategory==="All"||p.category===activeCategory);

  productsDiv=list.map(p=>`
    <div class="card product p-2 text-center" onclick="add('${p.name}')">
      <img src="${p.image||'https://via.placeholder.com/100'}" class="w-full h-24 object-cover rounded">
      <div class="mt-1">${p.name}</div>
      <div class="text-green-600">Rp ${p.sell}</div>
    </div>
  `).join("");

  document.getElementById("products").innerHTML=productsDiv;
}

// CART
function add(name){
  let p=products.find(x=>x.name===name);
  let ex=cart.find(i=>i.name===name);

  if(ex) ex.qty++;
  else cart.push({name:p.name,qty:1,price:p.sell});

  renderCart();
}

function renderCart(){
  let t=0;

  cart.forEach(i=>t+=i.qty*i.price);

  total.innerText=t;

  cart.innerHTML=cart.map(i=>`
    <div class="flex justify-between border-b py-1">
      ${i.name} x${i.qty}
      <span>${i.qty*i.price}</span>
    </div>
  `).join("");
}

// CHECKOUT
async function checkout(){
  await fetch(API,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      type:"addTransaction",
      items:JSON.stringify(cart),
      total:total.innerText,
      profit:0,
      customer:"-"
    })
  });

  showReceipt();
  cart=[];
  renderCart();
}

// RECEIPT
function showReceipt(){
  receipt.classList.remove("hidden");

  receiptContent.innerHTML=cart.map(i=>`
    <div>${i.name} x${i.qty} = ${i.qty*i.price}</div>
  `).join("") + `<hr>Total: ${total.innerText}`;
}

// INIT
load();
</script>

</body>
</html>
