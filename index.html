<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-gray-100">

<!-- HEADER -->
<div class="bg-gradient-to-r from-green-500 to-green-700 text-white p-4 flex justify-between">
  <button onclick="toggleMenu()">☰</button>
  <div id="title">Transaksi Baru</div>
  <div>🛒 <span id="cartCount">0</span></div>
</div>

<!-- MENU -->
<div id="menu" class="fixed bg-white w-64 h-full p-4 hidden shadow">
  <button onclick="toggleMenu()">❌</button>
  <div class="mt-4 space-y-3">
    <div onclick="nav('billing')">Cashier</div>
    <div onclick="nav('products')">Products</div>
    <div onclick="nav('stock')">Stock</div>
    <div onclick="nav('analytics')">Reports</div>
  </div>
</div>

<!-- CONTENT -->
<div class="p-4 space-y-4">

<!-- CASHIER -->
<div id="billing">
  <input id="searchProduct" placeholder="Search..." class="w-full p-3 rounded">

  <div id="results"></div>

  <div class="bg-white p-3 rounded mt-3">
    <div id="cart"></div>
    <div>Total: <b id="total">0</b></div>
    <button onclick="checkout()" class="bg-green-500 w-full text-white p-3 mt-2 rounded">
      Checkout
    </button>
  </div>
</div>

<!-- PRODUCTS -->
<div id="products" class="hidden">
  <input id="name" placeholder="Name" class="input">
  <input id="sell" placeholder="Sell" class="input">
  <input id="cost" placeholder="Cost" class="input">
  <input id="stockVal" placeholder="Stock" class="input">
  <input id="barcode" placeholder="Barcode" class="input">
  <input id="image" placeholder="Image URL" class="input">

  <button onclick="addProduct()" class="bg-green-500 text-white p-2 w-full">Add</button>

  <div id="productList"></div>
</div>

<!-- STOCK -->
<div id="stock" class="hidden">
  <select id="stockProduct"></select>
  <input id="qty" type="number">
  <button onclick="addStock()">Update</button>
</div>

<!-- ANALYTICS -->
<div id="analytics" class="hidden">
  <canvas id="chart"></canvas>
</div>

</div>

<!-- RECEIPT MODAL -->
<div id="receipt" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center">
  <div class="bg-white p-5 w-80 rounded">
    <h2 class="text-center font-bold">Receipt</h2>
    <div id="receiptContent"></div>
    <button onclick="window.print()" class="bg-green-500 text-white w-full mt-2 p-2">Print</button>
  </div>
</div>

<script>
const API="https://script.google.com/macros/s/AKfycbxlXSiIyNiC7sHT4TvEYTU0LsuGLYnrftcCKIMT9BXp3_ImRp9OWpvB1nJgvftvuKfR/exec";

let products=[],cart=[];

// NAV
function nav(id){
  ["billing","products","stock","analytics"].forEach(p=>{
    document.getElementById(p).classList.add("hidden");
  });
  document.getElementById(id).classList.remove("hidden");
}

// MENU
function toggleMenu(){
  menu.classList.toggle("hidden");
}

// LOAD PRODUCTS
async function loadProducts(){
  let res=await fetch(API+"?type=products");
  let data=await res.json();

  products=data.slice(1).map(p=>({
    name:p[0],sell:+p[1],cost:+p[2],stock:+p[3],barcode:p[4],image:p[5]
  }));

  renderProducts();
}

// RENDER
function renderProducts(){
  results.innerHTML=products.map(p=>`
    <div onclick="add('${p.name}')" class="flex gap-2 bg-white p-2 rounded mt-2">
      <img src="${p.image}" class="w-12 h-12 rounded">
      <div>${p.name}<br>Rp ${p.sell}</div>
    </div>
  `).join("");
}

// CART
function add(name){
  let p=products.find(x=>x.name===name);
  let ex=cart.find(i=>i.name===name);

  if(ex) ex.qty++;
  else cart.push({name:p.name,qty:1,price:p.sell});

  renderCart();
}

function renderCart(){
  let t=0;
  cart.forEach(i=>t+=i.qty*i.price);

  total.innerText=t;
  cartCount.innerText=cart.length;

  cart.innerHTML=cart.map(i=>`
    <div>${i.name} x${i.qty}</div>
  `).join("");
}

// CHECKOUT
async function checkout(){
  await fetch(API,{
    method:"POST",
    body:JSON.stringify({
      type:"addTransaction",
      items:JSON.stringify(cart),
      total:total.innerText,
      profit:0,
      customer:"-"
    })
  });

  showReceipt();
}

// RECEIPT
function showReceipt(){
  receipt.classList.remove("hidden");

  receiptContent.innerHTML=cart.map(i=>`
    <div>${i.name} x${i.qty}</div>
  `).join("") + `<hr>Total: ${total.innerText}`;
}

// CHART
async function loadChart(){
  let res=await fetch(API+"?type=transactions");
  let data=await res.json();

  let labels=data.slice(1).map(r=>new Date(r[0]).toLocaleDateString());
  let values=data.slice(1).map(r=>r[2]);

  new Chart(chart,{
    type:"line",
    data:{labels,datasets:[{data:values}]}
  });
}

// INIT
loadProducts();
loadChart();
</script>

</body>
</html>
