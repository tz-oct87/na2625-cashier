<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-950 text-slate-200">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NA2625 | DARK POS PRO</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
.page-content { display:none; height:100%; overflow-y:auto; }
.page-content.active { display:block; }
.nav-btn.active { background:#1e293b; color:#2dd4bf; border-left:4px solid #2dd4bf; }
.modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:100; align-items:center; justify-content:center; backdrop-filter:blur(4px);}
.modal.active { display:flex; }
</style>
</head>

<body class="h-full overflow-hidden font-sans">

<!-- ALERT MODAL -->
<div id="alertModal" class="modal">
  <div class="bg-slate-900 border border-slate-800 w-full max-w-sm p-6 rounded-2xl text-center">
    <p id="alertText" class="mb-4 font-bold"></p>
    <button onclick="closeModal('alertModal')" class="w-full bg-teal-600 p-3 rounded-xl font-bold">OK</button>
  </div>
</div>

<!-- HISTORY MODAL -->
<div id="historyModal" class="modal">
  <div class="bg-slate-900 w-full max-w-md p-8 rounded-3xl">
    <h3 class="text-xl font-black text-teal-400 mb-6">Order Details</h3>
    <div id="historyDetailContent" class="space-y-3 mb-6 max-h-64 overflow-y-auto"></div>
    <button onclick="closeModal('historyModal')" class="w-full bg-slate-800 p-3 rounded-xl">Close</button>
  </div>
</div>

<!-- INVOICE -->
<div id="invoiceModal" class="modal">
  <div class="bg-white text-black w-80 p-6 rounded-xl">
    <div id="receiptArea">
      <h2 class="text-center font-bold mb-4">Receipt</h2>
      <div id="receiptItems"></div>
      <div class="mt-4 text-sm">
        <div>Total: Rp<span id="recTotal"></span></div>
        <div>Paid: Rp<span id="recPaid"></span></div>
        <div>Change: Rp<span id="recChange"></span></div>
      </div>
    </div>
    <div class="flex gap-2 mt-4">
      <button onclick="downloadReceipt()" class="flex-1 bg-teal-600 text-white p-2 rounded">Save</button>
      <button onclick="closeModal('invoiceModal')" class="flex-1 bg-gray-300 p-2 rounded">Close</button>
    </div>
  </div>
</div>

<!-- LOGIN -->
<div id="loginPage" class="fixed inset-0 flex items-center justify-center bg-slate-950">
  <div class="bg-slate-900 p-8 rounded-3xl w-80 text-center">
    <h1 class="text-2xl text-teal-400 mb-6">NA2625</h1>
    <input id="user" placeholder="Username" class="w-full p-3 mb-3 bg-slate-800 rounded">
    <input id="pass" type="password" placeholder="Password" class="w-full p-3 mb-3 bg-slate-800 rounded">
    <button id="loginBtn" class="w-full bg-teal-600 p-3 rounded">LOGIN</button>
  </div>
</div>

<!-- APP -->
<div id="app" class="flex h-full hidden">

<nav class="w-64 bg-slate-900 p-4 flex flex-col">
  <button onclick="showPage('cashier')" class="nav-btn mb-2">🛒 Cashier</button>
  <button onclick="showPage('manage')" class="nav-btn mb-2">📦 Inventory</button>
  <button onclick="showPage('history')" class="nav-btn mb-2">📜 History</button>
  <button onclick="logout()" class="text-red-400 mt-auto">Logout</button>
</nav>

<main class="flex-1 p-6">

<!-- CASHIER -->
<div id="page-cashier" class="page-content active">
  <input id="posSearch" oninput="renderProducts()" placeholder="Search..." class="w-full p-3 mb-4 bg-slate-800 rounded">
  <div id="productsGrid" class="grid grid-cols-2 gap-4 mb-4"></div>

  <div id="cartItems" class="space-y-2 mb-4"></div>

  <div>Total: Rp<span id="total">0</span></div>
  <input id="cashInput" type="number" placeholder="Cash" class="w-full p-2 bg-slate-800 rounded mt-2">
  <button onclick="checkout()" class="w-full bg-teal-600 p-3 mt-2 rounded">Checkout</button>
</div>

<!-- MANAGE -->
<div id="page-manage" class="page-content">
  <input id="newPName" placeholder="Name" class="p-2 bg-slate-800">
  <input id="newPStock" type="number" placeholder="Stock" class="p-2 bg-slate-800">
  <input id="newPSell" type="number" placeholder="Sell" class="p-2 bg-slate-800">
  <input id="newPCost" type="number" placeholder="Cost" class="p-2 bg-slate-800">
  <button onclick="addNewProduct()" class="bg-teal-600 p-2 mt-2">Add</button>

  <div id="manageList"></div>
</div>

<!-- HISTORY -->
<div id="page-history" class="page-content">
  <div id="historyList"></div>
</div>

</main>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbxiU0YaHPmi0UPVlDLT2ralbD6ILHhxTcYQYZAYTnegROev67U01tolgVtg6jmnc_wI/exec";

let products=[], cart=[], currentUser="";

// MODAL
function showAlert(msg){
  alertText.innerText = msg;
  alertModal.classList.add('active');
}
function closeModal(id){
  document.getElementById(id).classList.remove('active');
}

// LOGIN
loginBtn.onclick = async () => {
  const res = await fetch(API,{method:'POST',body:JSON.stringify({type:'login',user:user.value,pass:pass.value})});
  const data = await res.json();
  if(data.success){
    localStorage.setItem("NA_POS_USER", user.value);
    location.reload();
  } else showAlert("Login Failed");
};

window.onload = ()=>{
  const saved = localStorage.getItem("NA_POS_USER");
  if(saved){
    currentUser = saved;
    loginPage.style.display="none";
    app.classList.remove("hidden");
    loadProducts();
  }
};

function logout(){
  localStorage.removeItem("NA_POS_USER");
  location.reload();
}

// NAV
function showPage(p){
  document.querySelectorAll('.page-content').forEach(x=>x.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  if(p==="history") fetchHistory();
  if(p==="manage") renderManage();
}

// PRODUCTS
async function loadProducts(){
  const res = await fetch(API+"?type=products");
  products = await res.json();
  renderProducts();
}

function renderProducts(){
  const s = posSearch.value.toLowerCase();
  productsGrid.innerHTML = products.filter(p=>p.name.toLowerCase().includes(s)).map(p=>{
    const img = p.imgId?API+'?type=img&id='+p.imgId:'https://via.placeholder.com/100';
    return `
    <div onclick="addToCart('${p.name}')" class="bg-slate-900 p-3 rounded">
      <img src="${img}" class="h-20 w-full object-cover">
      <div>${p.name}</div>
      <div>Rp${p.sell}</div>
    </div>`;
  }).join("");
}

// CART
function addToCart(name){
  const p = products.find(x=>x.name===name);
  if(p.stock<=0) return showAlert("Out of stock");

  let i = cart.find(x=>x.name===name);
  if(i) i.qty++;
  else cart.push({name:p.name,qty:1,price:p.sell,cost:p.cost});

  renderCart();
}

function changeQty(name,d){
  let i = cart.find(x=>x.name===name);
  if(!i) return;
  i.qty += d;
  if(i.qty<=0) cart = cart.filter(x=>x.name!==name);
  renderCart();
}

function renderCart(){
  let total = 0;
  cartItems.innerHTML = cart.map(i=>{
    total += i.qty*i.price;
    return `
    <div class="flex justify-between">
      ${i.name}
      <div>
        <button onclick="changeQty('${i.name}',-1)">-</button>
        ${i.qty}
        <button onclick="changeQty('${i.name}',1)">+</button>
      </div>
      Rp${i.qty*i.price}
    </div>`;
  }).join("");
  document.getElementById("total").innerText = total;
}

// CHECKOUT
async function checkout(){
  let total = cart.reduce((s,i)=>s+i.qty*i.price,0);
  let paid = Number(cashInput.value||0);

  if(paid<total) return showAlert("Not enough");

  recTotal.innerText = total;
  recPaid.innerText = paid;
  recChange.innerText = paid-total;

  receiptItems.innerHTML = cart.map(i=>`${i.name} x${i.qty}`).join("<br>");
  invoiceModal.classList.add("active");

  await fetch(API,{method:'POST',body:JSON.stringify({
    type:'addTransaction',
    user:currentUser,
    total,
    profit:0,
    items:JSON.stringify(cart),
    paid,
    change:paid-total
  })});

  cart=[];
  renderCart();
  loadProducts();
}

// HISTORY
async function fetchHistory(){
  const res = await fetch(API+"?type=transactions");
  const data = (await res.json()).slice(1).reverse();

  historyList.innerHTML = data.map(r=>`
    <div onclick="showHistoryDetail('${encodeURIComponent(r[5])}')">
      Rp${r[3]}
    </div>`).join("");
}

function showHistoryDetail(str){
  const items = JSON.parse(decodeURIComponent(str));
  historyDetailContent.innerHTML = items.map(i=>`${i.name} x${i.qty}`).join("<br>");
  historyModal.classList.add("active");
}

// INVENTORY
function renderManage(){
  manageList.innerHTML = products.map(p=>`
    <div>
      <img onclick="changeProductPic('${p.name}')" src="${p.imgId?API+'?type=img&id='+p.imgId:''}" width="50">
      ${p.name}
    </div>`).join("");
}
</script>

</body>
</html>
