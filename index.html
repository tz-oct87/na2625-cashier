<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NA2625 CREATIVEWORKS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        .page-content { display: none; height: 100%; width: 100%; overflow-y: auto; }
        .page-content.active { display: block; }
        .nav-btn.active { background-color: #1A877E; color: white; }
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 200; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .modal-overlay.active { display: flex; }
        @media print { body * { visibility: hidden; } #invoiceContent, #invoiceContent * { visibility: visible; } #invoiceContent { position: absolute; left: 0; top: 0; width: 80mm; } .no-print { display: none; } }
    </style>
</head>
<body class="h-full bg-gray-50 overflow-hidden font-sans text-gray-900">

<div id="invoiceModal" class="modal-overlay">
    <div class="bg-white w-full max-w-sm rounded-3xl overflow-hidden shadow-2xl flex flex-col mx-4">
        <div id="invoiceArea" class="p-8 bg-white text-gray-800">
            <div id="invoiceContent">
                <div class="text-center border-b-2 border-dashed pb-4 mb-4">
                    <h1 class="font-black text-xl">NA2625 CREATIVEWORKS</h1>
                    <p class="text-[10px] text-gray-400 uppercase tracking-widest mt-1">Order Completed</p>
                    <p id="invDate" class="text-[9px] mt-2 font-mono text-gray-400"></p>
                </div>
                <div id="invItems" class="space-y-2 mb-4 text-xs"></div>
                <div class="border-t-2 border-dashed pt-4 space-y-1 font-bold text-sm">
                    <div class="flex justify-between"><span>Total</span><span id="invTotal"></span></div>
                    <div class="flex justify-between text-teal-600"><span>Cash</span><span id="invPaid"></span></div>
                    <div class="flex justify-between text-red-500"><span>Change</span><span id="invChange"></span></div>
                </div>
                <div class="mt-8 text-center text-[10px] text-gray-400">Thank you for your purchase!</div>
            </div>
        </div>
        <div class="p-6 bg-gray-50 flex gap-2 border-t">
            <button onclick="printInvoice()" class="flex-1 bg-teal-600 text-white py-3 rounded-xl font-bold text-xs">PRINT</button>
            <button onclick="downloadInvoice()" class="flex-1 bg-gray-800 text-white py-3 rounded-xl font-bold text-xs">SAVE PNG</button>
            <button onclick="location.reload()" class="flex-1 bg-gray-200 py-3 rounded-xl font-bold text-xs">CLOSE</button>
        </div>
    </div>
</div>

<div id="loginPage" class="fixed inset-0 z-[100] flex items-center justify-center bg-white px-6">
    <div class="w-full max-w-sm p-10 border rounded-[2.5rem] shadow-2xl text-center">
        <h1 class="text-2xl font-black text-teal-800 mb-8 leading-tight">NA2625<br>CREATIVEWORKS</h1>
        <div class="space-y-4">
            <input id="user" type="text" placeholder="Username" class="w-full p-4 border rounded-2xl outline-none focus:ring-2 focus:ring-teal-500 text-center">
            <input id="pass" type="password" placeholder="Password" class="w-full p-4 border rounded-2xl outline-none focus:ring-2 focus:ring-teal-500 text-center">
            <button id="loginBtn" class="w-full bg-teal-600 text-white p-4 rounded-2xl font-black shadow-lg">SIGN IN</button>
        </div>
    </div>
</div>

<div id="app" class="flex h-full w-full hidden">
    <nav class="w-64 bg-white border-r flex flex-col h-full shrink-0">
        <div class="p-8 border-b"><h2 class="text-lg font-black text-teal-900 leading-tight">NA2625</h2></div>
        <div class="flex-1 p-4 space-y-1">
            <button onclick="showPage('cashier')" class="nav-btn w-full text-left px-5 py-4 rounded-2xl font-bold text-gray-400 hover:bg-gray-50 transition">🛒 Cashier</button>
            <button onclick="showPage('manage')" class="nav-btn w-full text-left px-5 py-4 rounded-2xl font-bold text-gray-400 hover:bg-gray-50 transition">📦 Products</button>
            <button onclick="showPage('inventory')" class="nav-btn w-full text-left px-5 py-4 rounded-2xl font-bold text-gray-400 hover:bg-gray-50 transition">➕ Add Item</button>
            <button onclick="showPage('history')" class="nav-btn w-full text-left px-5 py-4 rounded-2xl font-bold text-gray-400 hover:bg-gray-50 transition">📜 Reports</button>
        </div>
    </nav>

    <main class="flex-1 relative bg-gray-50 overflow-hidden">
        <div id="page-cashier" class="page-content active p-8">
            <div class="flex gap-8 h-full">
                <div class="flex-1 flex flex-col">
                    <input type="text" id="posSearch" oninput="renderProducts()" placeholder="Search products..." class="p-5 rounded-3xl border mb-6 shadow-sm outline-none focus:ring-2 focus:ring-teal-500">
                    <div id="productsGrid" class="grid grid-cols-2 lg:grid-cols-4 gap-4 overflow-y-auto pr-2"></div>
                </div>
                <div class="w-80 bg-white rounded-[2.5rem] shadow-xl p-8 flex flex-col border">
                    <h3 class="font-black text-gray-300 text-[10px] uppercase mb-6">Order Details</h3>
                    <div id="cartItems" class="flex-1 overflow-y-auto space-y-4 mb-6"></div>
                    <div class="border-t pt-6 space-y-4">
                        <div class="flex justify-between text-xl font-black"><span>Total</span><span>Rp <span id="total">0</span></span></div>
                        <input type="number" id="cashInput" placeholder="Buyer Money (Rp)" class="w-full p-4 bg-gray-50 border rounded-2xl text-center font-bold outline-none focus:ring-2 focus:ring-teal-500">
                        <button onclick="checkout()" class="w-full bg-teal-600 text-white p-5 rounded-2xl font-black shadow-lg hover:bg-teal-700 transition">PAY NOW</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="page-manage" class="page-content p-12">
            <div class="flex justify-between mb-8"><h2 class="text-2xl font-black">Manage Inventory</h2></div>
            <div class="grid grid-cols-1 gap-4" id="manageList"></div>
        </div>

        <div id="page-inventory" class="page-content p-12">
            <div class="max-w-xl mx-auto bg-white p-12 rounded-[2.5rem] shadow-sm border">
                <h2 class="text-2xl font-black mb-8">Register Product</h2>
                <div class="space-y-4">
                    <input id="pName" placeholder="Product Name" class="w-full p-4 border rounded-2xl bg-gray-50">
                    <div class="grid grid-cols-2 gap-4">
                        <input id="pSell" type="number" placeholder="Sell Price" class="w-full p-4 border rounded-2xl bg-gray-50">
                        <input id="pCost" type="number" placeholder="Cost Price" class="w-full p-4 border rounded-2xl bg-gray-50">
                    </div>
                    <input id="pStock" type="number" placeholder="Initial Stock" class="w-full p-4 border rounded-2xl bg-gray-50">
                    <input id="pImg" placeholder="Image URL (Direct Link)" class="w-full p-4 border rounded-2xl bg-gray-50">
                    <button onclick="saveProduct()" class="w-full bg-teal-600 text-white p-5 rounded-2xl font-black">ADD TO SYSTEM</button>
                </div>
            </div>
        </div>

        <div id="page-history" class="page-content p-12"><h2 class="text-2xl font-black mb-6">Transactions</h2><div id="historyList" class="space-y-3"></div></div>
    </main>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbwPac1qhqVt0lL136_SaDC-RXbIzn4Uc3_Ymxv6PqrpBmoyZQVHwUT0BoX8CdR3YB-U/exec"; 
let products = [], cart = [], currentUser = "";

function showPage(p) { 
    document.querySelectorAll('.page-content').forEach(x => x.classList.remove('active'));
    document.getElementById('page-'+p).classList.add('active');
    if(p === 'manage') renderManage();
    if(p === 'history') renderHistory();
}

document.getElementById('loginBtn').onclick = async () => {
    const u = document.getElementById('user').value, p = document.getElementById('pass').value;
    const res = await fetch(API, { method: 'POST', body: JSON.stringify({ type: 'login', user: u, pass: p }) });
    const data = await res.json();
    if(data.success) { 
        currentUser = u; 
        document.getElementById('loginPage').style.display='none'; 
        document.getElementById('app').classList.remove('hidden'); 
        loadProducts(); showPage('cashier'); 
    }
};

async function loadProducts() {
    const res = await fetch(API + "?type=products");
    const data = await res.json();
    products = data.slice(1).map(r => ({ name: r[0], sell: +r[1], cost: +r[2], stock: +r[3], img: r[4] }));
    renderProducts();
}

function renderProducts() {
    const s = document.getElementById('posSearch').value.toLowerCase();
    document.getElementById('productsGrid').innerHTML = products.filter(p => p.name.toLowerCase().includes(s)).map(p => `
        <div onclick="updateQuantity('${p.name}', 1)" class="bg-white rounded-3xl border border-gray-100 overflow-hidden shadow-sm hover:border-teal-500 cursor-pointer active:scale-95 transition">
            <div class="h-32 bg-gray-100 overflow-hidden">
                <img src="${p.img || 'https://via.placeholder.com/150'}" class="w-full h-full object-cover">
            </div>
            <div class="p-4"><div class="font-bold text-xs truncate">${p.name}</div><div class="text-teal-600 font-black">Rp ${p.sell.toLocaleString()}</div></div>
        </div>`).join("");
}

function updateQuantity(name, change) {
    let item = cart.find(i => i.name === name);
    if (!item && change > 0) {
        const p = products.find(x => x.name === name);
        cart.push({ name: p.name, qty: 1, price: p.sell });
    } else if (item) {
        item.qty += change;
        if (item.qty <= 0) cart = cart.filter(i => i.name !== name);
    }
    renderCart();
}

function renderCart() {
    let total = 0;
    document.getElementById('cartItems').innerHTML = cart.map(i => {
        total += i.qty * i.price;
        return `<div class="flex justify-between items-center p-3 bg-gray-50 rounded-2xl border text-[11px] font-bold">
            <div>${i.name} x${i.qty}</div>
            <div class="flex gap-2"><button onclick="updateQuantity('${i.name}',-1)" class="w-5 h-5 bg-white border rounded-full">-</button><button onclick="updateQuantity('${i.name}',1)" class="w-5 h-5 bg-white border rounded-full">+</button></div>
        </div>`;
    }).join("");
    document.getElementById('total').innerText = total.toLocaleString();
}

async function checkout() {
    const total = parseInt(document.getElementById('total').innerText.replace(/,/g, ''));
    const paid = parseInt(document.getElementById('cashInput').value);
    if (!paid || paid < total) return alert("Insufficient cash!");
    
    const change = paid - total;
    const payload = { type: 'addTransaction', user: currentUser, payment: 'Cash', items: JSON.stringify(cart), paid, change };
    
    await fetch(API, { method: 'POST', body: JSON.stringify(payload) });
    
    // Setup Invoice
    document.getElementById('invDate').innerText = new Date().toLocaleString();
    document.getElementById('invTotal').innerText = "Rp " + total.toLocaleString();
    document.getElementById('invPaid').innerText = "Rp " + paid.toLocaleString();
    document.getElementById('invChange').innerText = "Rp " + change.toLocaleString();
    document.getElementById('invItems').innerHTML = cart.map(i => `<div class="flex justify-between"><span>${i.name} x${i.qty}</span><span>${(i.qty*i.price).toLocaleString()}</span></div>`).join("");
    
    document.getElementById('invoiceModal').classList.add('active');
    cart = []; document.getElementById('cashInput').value = ""; renderCart(); loadProducts();
}

function printInvoice() { window.print(); }
function downloadInvoice() {
    html2canvas(document.querySelector("#invoiceArea")).then(canvas => {
        const link = document.createElement('a');
        link.download = 'Invoice-' + Date.now() + '.png';
        link.href = canvas.toDataURL();
        link.click();
    });
}

function renderManage() {
    document.getElementById('manageList').innerHTML = products.map((p, idx) => `
        <div class="bg-white p-6 rounded-3xl border flex items-center gap-6">
            <img src="${p.img}" class="w-16 h-16 object-cover rounded-xl bg-gray-50">
            <div class="flex-1 grid grid-cols-4 gap-4">
                <input class="p-2 border rounded-lg text-xs" value="${p.name}" id="editName-${idx}">
                <input class="p-2 border rounded-lg text-xs" value="${p.sell}" id="editSell-${idx}">
                <input class="p-2 border rounded-lg text-xs" value="${p.stock}" id="editStock-${idx}">
                <button onclick="updateProduct(${idx})" class="bg-teal-600 text-white rounded-lg font-bold text-xs">UPDATE</button>
            </div>
        </div>`).join("");
}

async function updateProduct(idx) {
    const payload = {
        type: 'editProduct',
        oldName: products[idx].name,
        name: document.getElementById(`editName-${idx}`).value,
        sell: document.getElementById(`editSell-${idx}`).value,
        stock: document.getElementById(`editStock-${idx}`).value,
        cost: products[idx].cost,
        image: products[idx].img
    };
    await fetch(API, { method: 'POST', body: JSON.stringify(payload) });
    alert("Updated!"); loadProducts();
}

async function saveProduct() {
    const payload = {
        type: 'addProduct',
        name: document.getElementById('pName').value,
        sell: document.getElementById('pSell').value,
        cost: document.getElementById('pCost').value,
        stock: document.getElementById('pStock').value,
        image: document.getElementById('pImg').value
    };
    await fetch(API, { method: 'POST', body: JSON.stringify(payload) });
    alert("Product Registered.");
    loadProducts();
}
</script>
</body>
</html>
