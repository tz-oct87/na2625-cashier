<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NA2625 CREATIVEWORKS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        .page-content { display: none; height: 100%; width: 100%; overflow-y: auto; }
        .page-content.active { display: block; }
        .nav-btn.active { background-color: #1A877E; color: white; }
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 200; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .modal-overlay.active { display: flex; }
    </style>
</head>
<body class="h-full bg-gray-50 overflow-hidden font-sans text-gray-900">

<div id="invoiceModal" class="modal-overlay">
    <div class="bg-white w-full max-w-sm rounded-[2.5rem] overflow-hidden shadow-2xl flex flex-col mx-4">
        <div id="invoiceArea" class="p-10 bg-white">
            <div class="text-center border-b-2 border-dashed pb-6 mb-6">
                <h1 class="font-black text-xl text-teal-800 uppercase">NA2625</h1>
                <p class="text-[10px] text-gray-400 uppercase tracking-widest mt-1 font-bold">Order Completed</p>
            </div>
            <div id="invItems" class="space-y-3 mb-6 text-xs font-medium"></div>
            <div class="border-t-2 border-dashed pt-6 space-y-2">
                <div class="flex justify-between font-black text-sm"><span>Total</span><span id="invTotal"></span></div>
                <div class="flex justify-between font-bold text-xs text-teal-600"><span>Paid</span><span id="invPaid"></span></div>
                <div class="flex justify-between font-bold text-xs text-red-500"><span>Change</span><span id="invChange"></span></div>
            </div>
        </div>
        <div class="p-6 bg-gray-50 flex gap-2 border-t">
            <button onclick="window.print()" class="flex-1 bg-teal-600 text-white py-4 rounded-2xl font-black text-xs">PRINT</button>
            <button onclick="downloadPng()" class="flex-1 bg-gray-800 text-white py-4 rounded-2xl font-black text-xs">SAVE PNG</button>
            <button onclick="closeInvoice()" class="flex-1 bg-gray-200 text-gray-600 py-4 rounded-2xl font-black text-xs">CLOSE</button>
        </div>
    </div>
</div>

<div id="loginPage" class="fixed inset-0 z-[100] flex items-center justify-center bg-white px-6">
    <div class="w-full max-w-sm p-12 border rounded-[3rem] shadow-2xl text-center">
        <h1 class="text-3xl font-black text-teal-900 mb-10">NA2625</h1>
        <div class="space-y-4">
            <input id="user" type="text" placeholder="Username" class="w-full p-5 border rounded-2xl bg-gray-50 outline-none text-center font-bold">
            <input id="pass" type="password" placeholder="Password" class="w-full p-5 border rounded-2xl bg-gray-50 outline-none text-center font-bold">
            <button id="loginBtn" class="w-full bg-teal-600 text-white p-5 rounded-2xl font-black shadow-xl">SIGN IN</button>
        </div>
    </div>
</div>

<div id="app" class="flex h-full w-full hidden">
    <nav class="w-72 bg-white border-r flex flex-col h-full shrink-0">
        <div class="p-10 border-b"><h2 class="text-xl font-black text-teal-950">NA2625</h2></div>
        <div class="flex-1 p-4 space-y-2">
            <button onclick="showPage('cashier')" class="nav-btn w-full text-left px-6 py-5 rounded-3xl font-black text-gray-400">🛒 Cashier</button>
            <button onclick="showPage('manage')" class="nav-btn w-full text-left px-6 py-5 rounded-3xl font-black text-gray-400">📦 Products</button>
            <button onclick="showPage('inventory')" class="nav-btn w-full text-left px-6 py-5 rounded-3xl font-black text-gray-400">➕ Add Item</button>
        </div>
        <div class="p-8"><button onclick="logout()" class="text-xs font-black text-red-400 uppercase">Logout</button></div>
    </nav>

    <main class="flex-1 relative bg-gray-50 overflow-hidden">
        <div id="page-cashier" class="page-content active p-10">
            <div class="flex gap-10 h-full">
                <div class="flex-1 flex flex-col">
                    <input type="text" id="posSearch" oninput="renderProducts()" placeholder="Search..." class="p-6 rounded-[2rem] border-none shadow-sm mb-8 font-bold">
                    <div id="productsGrid" class="grid grid-cols-2 lg:grid-cols-4 gap-6 overflow-y-auto"></div>
                </div>
                <div class="w-96 bg-white rounded-[3rem] shadow-2xl p-10 flex flex-col border border-gray-100">
                    <h3 class="font-black text-gray-300 text-[10px] uppercase mb-8">Cart Items</h3>
                    <div id="cartItems" class="flex-1 overflow-y-auto space-y-4 mb-8"></div>
                    <div class="border-t pt-8 space-y-4">
                        <div class="flex justify-between text-3xl font-black"><span>Total</span><span>Rp <span id="total">0</span></span></div>
                        <input type="number" id="cashInput" placeholder="Buyer Money (Rp)" class="w-full p-6 bg-gray-50 rounded-[1.5rem] text-center font-black text-xl border-2 border-transparent focus:border-teal-500 transition">
                        <button onclick="checkout()" class="w-full bg-teal-600 text-white p-6 rounded-[1.5rem] font-black text-lg shadow-xl active:scale-95 transition">CHECKOUT</button>
                    </div>
                </div>
            </div>
        </div>
        <div id="page-manage" class="page-content p-12"><h2 class="text-3xl font-black mb-10">Products</h2><div id="manageList" class="grid gap-4"></div></div>
        <div id="page-inventory" class="page-content p-12"><div id="inventoryForm">...Add logic here...</div></div>
    </main>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbyQ6e1jOVihDr5A7P7FWusZT-UhYG1mM7OJR8l_Wry0SfGQn_GD5ygyTbqFhtaYL2Av/exec"; 
let products = [], cart = [], currentUser = "";

// --- PERSISTENT LOGIN LOGIC ---
window.onload = () => {
    const savedUser = localStorage.getItem('pos_user');
    if(savedUser) {
        currentUser = savedUser;
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('app').classList.remove('hidden');
        loadProducts();
        showPage('cashier');
    }
};

document.getElementById('loginBtn').onclick = async () => {
    const u = document.getElementById('user').value, p = document.getElementById('pass').value;
    const res = await fetch(API, { method: 'POST', body: JSON.stringify({ type: 'login', user: u, pass: p }) });
    const data = await res.json();
    if(data.success) { 
        currentUser = u; 
        localStorage.setItem('pos_user', u); // SAVE LOGIN
        document.getElementById('loginPage').style.display='none'; 
        document.getElementById('app').classList.remove('hidden'); 
        loadProducts();
    } else { alert("Login failed!"); }
};

function logout() {
    localStorage.removeItem('pos_user');
    location.reload();
}

async function loadProducts() {
    const res = await fetch(API + "?type=products");
    const data = await res.json();
    products = data.slice(1).map(r => ({ name: r[0], sell: Number(r[1]), cost: Number(r[2]), stock: Number(r[3]), img: r[4] }));
    renderProducts();
}

function renderProducts() {
    const s = document.getElementById('posSearch').value.toLowerCase();
    document.getElementById('productsGrid').innerHTML = products.filter(p => p.name.toLowerCase().includes(s)).map(p => `
        <div onclick="updateQuantity('${p.name}', 1)" class="bg-white rounded-[2rem] shadow-sm p-4 text-center cursor-pointer active:scale-95 transition-all border-2 border-transparent hover:border-teal-500">
            <img src="${p.img || 'https://via.placeholder.com/100'}" class="w-full h-32 object-cover rounded-2xl mb-4">
            <div class="font-black text-xs uppercase truncate">${p.name}</div>
            <div class="text-teal-600 font-black">Rp ${p.sell.toLocaleString()}</div>
        </div>`).join("");
}

function updateQuantity(name, change) {
    let item = cart.find(i => i.name === name);
    if (!item && change > 0) {
        const p = products.find(x => x.name === name);
        cart.push({ name: p.name, qty: 1, price: p.sell, cost: p.cost });
    } else if (item) {
        item.qty += change;
        if (item.qty <= 0) cart = cart.filter(i => i.name !== name);
    }
    renderCart();
}

function renderCart() {
    let total = 0;
    document.getElementById('cartItems').innerHTML = cart.map(i => {
        total += (i.qty * i.price);
        return `<div class="flex justify-between items-center p-4 bg-gray-50 rounded-2xl border font-bold text-xs">
            <div>${i.name} x${i.qty}</div>
            <div>Rp ${(i.qty * i.price).toLocaleString()}</div>
        </div>`;
    }).join("");
    document.getElementById('total').innerText = total.toLocaleString();
}

// --- FIXED CALCULATION LOGIC ---
async function checkout() {
    const total = cart.reduce((sum, item) => sum + (item.qty * item.price), 0);
    const paidText = document.getElementById('cashInput').value.replace(/[^0-9]/g, '');
    const paid = parseInt(paidText || 0);
    
    if (paid < total) return alert("Cash not enough!");

    const change = paid - total;
    const profit = cart.reduce((sum, it) => sum + (it.qty * (it.price - it.cost)), 0);
    
    // Display Invoice immediately
    document.getElementById('invTotal').innerText = "Rp " + total.toLocaleString();
    document.getElementById('invPaid').innerText = "Rp " + paid.toLocaleString();
    document.getElementById('invChange').innerText = "Rp " + change.toLocaleString();
    document.getElementById('invItems').innerHTML = cart.map(i => `
        <div class="flex justify-between"><span>${i.name} x${i.qty}</span><span>${(i.qty*i.price).toLocaleString()}</span></div>
    `).join("");
    
    document.getElementById('invoiceModal').classList.add('active');

    // Background sync to Google Sheets
    fetch(API, { method: 'POST', body: JSON.stringify({ 
        type: 'addTransaction', user: currentUser, total, profit, items: JSON.stringify(cart), paid, change 
    })}).then(() => loadProducts());
}

function closeInvoice() {
    document.getElementById('invoiceModal').classList.remove('active');
    cart = [];
    document.getElementById('cashInput').value = "";
    renderCart();
}

function downloadPng() {
    html2canvas(document.querySelector("#invoiceArea")).then(canvas => {
        const link = document.createElement('a');
        link.download = 'Invoice.png';
        link.href = canvas.toDataURL();
        link.click();
    });
}

function showPage(p) {
    document.querySelectorAll('.page-content').forEach(x => x.classList.remove('active'));
    document.getElementById('page-'+p).classList.add('active');
}
</script>
</body>
</html>
