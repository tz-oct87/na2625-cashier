<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-950 text-slate-200">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NA2625 | POS PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        .page-content { display: none; height: 100%; overflow-y: auto; }
        .page-content.active { display: block; }
        .nav-btn.active { background: #1e293b; color: #2dd4bf; border-left: 4px solid #2dd4bf; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .modal.active { display: flex; }
    </style>
</head>
<body class="h-full overflow-hidden font-sans">

<div id="loginPage" class="fixed inset-0 z-[110] flex items-center justify-center bg-slate-950">
    <div class="w-full max-w-sm p-10 bg-slate-900 rounded-3xl border border-slate-800 shadow-2xl text-center">
        <h1 class="text-3xl font-black text-teal-400 mb-8">NA2625</h1>
        <div class="space-y-4">
            <input id="user" type="text" placeholder="Username" class="w-full p-4 rounded-xl bg-slate-800 border border-slate-700 outline-none text-center">
            <input id="pass" type="password" placeholder="Password" class="w-full p-4 rounded-xl bg-slate-800 border border-slate-700 outline-none text-center">
            <button id="loginBtn" class="w-full bg-teal-600 p-4 rounded-xl font-bold transition hover:bg-teal-500">SIGN IN</button>
        </div>
    </div>
</div>

<div id="app" class="flex h-full hidden">
    <nav class="w-64 bg-slate-900 border-r border-slate-800 flex flex-col h-full shrink-0">
        <div class="p-8 text-xl font-black text-white border-b border-slate-800">NA2625 <span class="text-teal-400">POS</span></div>
        <div class="flex-1 p-4 space-y-1">
            <button onclick="showPage('cashier')" class="nav-btn w-full text-left px-6 py-4 rounded-xl font-bold text-slate-400">🛒 Cashier</button>
            <button onclick="showPage('manage')" class="nav-btn w-full text-left px-6 py-4 rounded-xl font-bold text-slate-400">📦 Inventory</button>
        </div>
        <div class="p-6 border-t border-slate-800"><button onclick="logout()" class="w-full text-xs font-bold text-red-400 uppercase tracking-widest">Logout</button></div>
    </nav>

    <main class="flex-1 bg-slate-950 p-8 overflow-hidden flex flex-col">
        <div id="page-cashier" class="page-content active h-full">
            <div class="flex gap-8 h-full">
                <div class="flex-1 flex flex-col">
                    <input id="posSearch" oninput="renderProducts()" placeholder="Search..." class="w-full p-4 bg-slate-900 border border-slate-800 rounded-2xl mb-6 outline-none">
                    <div id="productsGrid" class="grid grid-cols-2 lg:grid-cols-4 gap-4 overflow-y-auto"></div>
                </div>
                <div class="w-80 bg-slate-900 rounded-3xl p-6 border border-slate-800 flex flex-col shrink-0">
                    <h3 class="font-bold text-slate-500 uppercase text-[10px] mb-4">Cart</h3>
                    <div id="cartItems" class="flex-1 overflow-y-auto space-y-2 mb-4"></div>
                    <div class="border-t border-slate-800 pt-4 space-y-4">
                        <div class="flex justify-between text-xl font-black"><span>Total</span><span>Rp<span id="total">0</span></span></div>
                        <input type="number" id="cashInput" placeholder="Cash" class="w-full p-4 bg-slate-800 rounded-xl text-center font-bold">
                        <button onclick="checkout()" class="w-full bg-teal-600 p-4 rounded-xl font-black">CHECKOUT</button>
                    </div>
                </div>
            </div>
        </div>
        <div id="page-manage" class="page-content"><div id="manageList" class="grid gap-4"></div></div>
    </main>
</div>

<div id="invoiceModal" class="modal">
    <div class="bg-white text-slate-900 w-80 p-6 rounded-xl">
        <div id="receiptArea" class="p-2 text-center">
            <h2 class="font-black text-xl mb-4 border-b pb-4">NA2625</h2>
            <div id="receiptItems" class="text-xs space-y-2 mb-4 text-left"></div>
            <div class="border-t pt-4 text-xs font-bold flex justify-between"><span>TOTAL</span><span id="recTotal"></span></div>
        </div>
        <button onclick="closeModal('invoiceModal')" class="w-full mt-6 bg-slate-200 p-3 rounded-lg font-bold text-xs">Close</button>
    </div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbyeC5Bez-jTB7_UYfj-iYVoJWAveO4mo5n6nJzVT1M07_Ajn3cL3GXXqp0QhVzUw1Gu/exec";
let products = [], cart = [], currentUser = "";

window.onload = () => {
    const saved = localStorage.getItem('NA_POS_USER');
    if (saved) { currentUser = saved; document.getElementById('loginPage').style.display = 'none'; document.getElementById('app').classList.remove('hidden'); loadProducts(); }
};

function logout() { localStorage.removeItem('NA_POS_USER'); location.reload(); }
function showPage(p) {
    document.querySelectorAll('.page-content').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(x => x.classList.remove('active'));
    document.getElementById('page-'+p).classList.add('active');
    if(p === 'manage') renderManage();
}
function closeModal(id) { document.getElementById(id).classList.remove('active'); }

document.getElementById('loginBtn').onclick = async () => {
    const u = document.getElementById('user').value, p = document.getElementById('pass').value;
    const res = await fetch(API, { method: 'POST', body: JSON.stringify({ type: 'login', user: u, pass: p }) });
    const data = await res.json();
    if(data.success) { localStorage.setItem('NA_POS_USER', u); location.reload(); } else alert("Login Failed");
};

async function loadProducts() {
    const res = await fetch(API + "?type=products");
    products = await res.json();
    renderProducts();
}

function renderProducts() {
    const s = document.getElementById('posSearch').value.toLowerCase();
    document.getElementById('productsGrid').innerHTML = products.filter(p => p.name.toLowerCase().includes(s)).map(p => `
        <div onclick="addToCart('${p.name}')" class="bg-slate-900 rounded-2xl p-4 border border-slate-800 hover:border-teal-500 cursor-pointer">
            <img src="${p.imgId ? API + '?type=img&id=' + p.imgId : 'https://via.placeholder.com/150'}" class="w-full h-24 object-cover rounded-xl mb-2">
            <p class="font-bold text-[10px] text-slate-400 truncate uppercase">${p.name}</p>
            <p class="text-teal-400 font-black">Rp${p.sell.toLocaleString()}</p>
        </div>`).join("");
}

function addToCart(name) {
    const p = products.find(x => x.name === name);
    if(p.stock <= 0) return alert("No Stock");
    let item = cart.find(i => i.name === name);
    if (item) item.qty++; else cart.push({ ...p, qty: 1, price: p.sell });
    renderCart();
}

function renderCart() {
    let total = 0;
    document.getElementById('cartItems').innerHTML = cart.map(i => {
        total += i.qty * i.price;
        return `<div class="flex justify-between bg-slate-800 p-2 rounded-xl text-[10px]"><span>${i.name} x${i.qty}</span><span>Rp${(i.qty*i.price).toLocaleString()}</span></div>`;
    }).join("");
    document.getElementById('total').innerText = total.toLocaleString();
}

async function checkout() {
    const total = cart.reduce((sum, i) => sum + (i.qty * i.price), 0);
    const paid = Number(document.getElementById('cashInput').value || 0);
    if (paid < total) return alert("Insufficient Cash");
    document.getElementById('recTotal').innerText = "Rp" + total.toLocaleString();
    document.getElementById('invoiceModal').classList.add('active');
    await fetch(API, { method: 'POST', body: JSON.stringify({ type: 'addTransaction', user: currentUser, total, items: JSON.stringify(cart), paid, change: paid - total }) });
    cart = []; loadProducts(); renderCart();
}

function renderManage() {
    document.getElementById('manageList').innerHTML = products.map((p, idx) => `
        <div class="bg-slate-900 p-4 rounded-2xl border border-slate-800 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <img onclick="uploadImage('${p.name}', ${idx})" src="${p.imgId ? API + '?type=img&id=' + p.imgId : 'https://via.placeholder.com/150'}" class="w-12 h-12 rounded-lg object-cover cursor-pointer hover:opacity-50">
                <p class="font-bold uppercase">${p.name}</p>
            </div>
            <div class="flex gap-2">
                <input id="stk-${idx}" type="number" value="${p.stock}" class="w-16 bg-slate-800 p-2 rounded text-xs">
                <button onclick="saveItem('${p.name}', ${idx})" class="bg-teal-600 px-4 py-2 rounded text-[10px] font-bold">SAVE</button>
            </div>
        </div>`).join("");
}

async function saveItem(name, idx) {
    const p = products.find(x => x.name === name);
    await fetch(API, { method: 'POST', body: JSON.stringify({ type: 'editProduct', oldName: name, name, stock: Number(document.getElementById(`stk-${idx}`).value), sell: p.sell, cost: p.cost, imgId: p.imgId }) });
    alert("Saved"); loadProducts();
}

async function uploadImage(name, idx) {
    const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*';
    input.onchange = async (e) => {
        const file = e.target.files[0];
        if (file.size > 1000000) return alert("File too large (>1MB)");
        const reader = new FileReader();
        reader.onload = async () => {
            const base64 = reader.result;
            try {
                // Header text/plain trick to bypass browser pre-flight security
                const res = await fetch(API, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({ type: 'uploadImage', base64: base64 }) 
                });
                const data = await res.json();
                if (data.success) {
                    const p = products.find(x => x.name === name);
                    await fetch(API, { method: 'POST', body: JSON.stringify({ type: 'editProduct', oldName: name, name, stock: p.stock, sell: p.sell, cost: p.cost, imgId: data.imgId }) });
                    alert("Image Updated!"); loadProducts(); renderManage();
                }
            } catch (err) { alert("Upload failed. Verify 'Anyone' access and Deployment URL."); }
        };
        reader.readAsDataURL(file);
    };
    input.click();
}
</script>
</body>
</html>
