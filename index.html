<!DOCTYPE html>
<html lang="id" class="h-full bg-slate-950 text-slate-200">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NA2625 CREATIVEWORKS | POS PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        .page-content { display: none; height: 100%; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .page-content.active { display: block; }
        #app { display: flex; height: 100vh; flex-direction: column; }
        
        @media (min-width: 768px) {
            #app { flex-direction: row; }
            nav { width: 280px; height: 100%; border-right: 1px solid #1e293b; }
        }
        
        @media (max-width: 767px) {
            nav { order: 2; width: 100%; height: 75px; flex-direction: row !important; border-top: 1px solid #1e293b; padding: 0 !important; background: #0f172a; }
            nav .nav-btn { flex: 1; justify-content: center; border: none !important; padding: 0 !important; font-size: 10px; color: #64748b; }
            nav .nav-btn.active { border-top: 3px solid #2dd4bf !important; color: #2dd4bf !important; background: transparent; }
            .desktop-only { display: none; }
            main { flex: 1; padding: 12px !important; padding-bottom: 90px !important; }
        }

        .nav-btn.active { background: #1e293b; color: #2dd4bf; border-left: 4px solid #2dd4bf; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .modal.active { display: flex; }
        
        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 12px 24px; border-radius: 12px; z-index: 200; opacity: 0; transition: 0.3s; pointer-events: none; }
        #toast.show { opacity: 1; }
        .logo-main { max-width: 160px; margin: 0 auto; filter: drop-shadow(0 0 10px rgba(45, 212, 191, 0.2)); }
    </style>
</head>
<body class="h-full overflow-hidden font-sans">

<div id="toast" class="font-bold shadow-2xl bg-teal-600 text-white">SUCCESS</div>

<div id="loginPage" class="fixed inset-0 z-[110] flex items-center justify-center bg-slate-950 p-6">
    <div class="w-full max-w-sm p-8 bg-slate-900 rounded-3xl border border-slate-800 text-center shadow-2xl">
        <img src="https://tactykz.com/wp-content/uploads/2026/03/NA2625-CR.png" alt="Logo" class="logo-main mb-6">
        <h1 class="text-xs font-black text-slate-500 mb-8 tracking-[0.3em] uppercase">NA2625 CREATIVEWORKS</h1>
        <input id="user" type="text" placeholder="User" class="w-full p-4 mb-4 rounded-xl bg-slate-800 border border-slate-700 outline-none text-center focus:border-teal-500 text-lg">
        <input id="pass" type="password" placeholder="Pass" class="w-full p-4 mb-6 rounded-xl bg-slate-800 border border-slate-700 outline-none text-center focus:border-teal-500 text-lg">
        <button id="loginBtn" onclick="doLogin()" class="w-full bg-teal-600 p-4 rounded-xl font-black transition-all shadow-lg">SIGN IN</button>
    </div>
</div>

<div id="app" class="hidden">
    <nav class="bg-slate-900 flex flex-col shrink-0 z-50">
        <div class="p-8 border-b border-slate-800 desktop-only text-center">
            <img src="https://tactykz.com/wp-content/uploads/2026/03/NA2625-CR.png" alt="Logo" class="w-24 mx-auto mb-4">
            <p class="text-[9px] font-black text-teal-400 tracking-widest uppercase">NA2625 CREATIVEWORKS</p>
        </div>
        
        <div class="flex-1 flex md:flex-col p-2 gap-1">
            <button onclick="showPage('cashier')" class="nav-btn active w-full flex flex-col md:flex-row items-center md:px-6 py-4 rounded-xl font-bold">🛒 <span class="md:ml-3" id="lang-nav-cashier"></span></button>
            <button onclick="showPage('manage')" class="nav-btn w-full flex flex-col md:flex-row items-center md:px-6 py-4 rounded-xl font-bold">📦 <span class="md:ml-3" id="lang-nav-inv"></span></button>
            <button onclick="showPage('history')" class="nav-btn w-full flex flex-col md:flex-row items-center md:px-6 py-4 rounded-xl font-bold">📜 <span class="md:ml-3" id="lang-nav-hist"></span></button>
            <button onclick="showPage('settings')" class="nav-btn w-full flex flex-col md:flex-row items-center md:px-6 py-4 rounded-xl font-bold">⚙️ <span class="md:ml-3" id="lang-nav-sett"></span></button>
        </div>

        <div class="p-4 desktop-only border-t border-slate-800">
            <select id="langSelect" onchange="changeLanguage(this.value)" class="w-full bg-slate-800 border border-slate-700 text-[10px] p-2 rounded-lg font-bold uppercase outline-none text-teal-400">
                <option value="id">Bahasa Indonesia</option>
                <option value="en">English</option>
                <option value="nl">Dutch</option>
                <option value="jp">Japan</option>
                <option value="kr">Korean</option>
                <option value="cn">China</option>
                <option value="my">Melayu</option>
                <option value="ph">Tagalog</option>
                <option value="pk">Pakistani</option>
                <option value="np">Nepal</option>
            </select>
        </div>
    </nav>

    <main class="flex-1 overflow-hidden flex flex-col">
        <div id="page-cashier" class="page-content active p-4 md:p-6">
            <div class="flex flex-col lg:flex-row gap-6 h-full">
                <div class="flex-1 flex flex-col overflow-hidden">
                    <input id="posSearch" oninput="renderProducts()" class="w-full p-4 bg-slate-900 border border-slate-800 rounded-2xl mb-4 outline-none focus:border-teal-500 shadow-xl">
                    <div id="productsGrid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3 overflow-y-auto pb-20 pr-1"></div>
                </div>
                
                <div class="w-full lg:w-80 bg-slate-900 rounded-3xl p-6 border border-slate-800 flex flex-col shrink-0 shadow-2xl">
                    <div class="flex justify-between items-center mb-4 pb-2 border-b border-slate-800">
                        <h3 class="font-bold text-slate-500 text-[10px] uppercase tracking-widest" id="lang-cart-title">Cart</h3>
                        <button onclick="cart=[];renderCart();" class="text-[9px] text-red-400 font-bold uppercase">Clear</button>
                    </div>
                    <div id="cartItems" class="flex-1 overflow-y-auto space-y-2 mb-4"></div>
                    <div class="space-y-4">
                        <div class="flex justify-between items-end">
                            <span class="text-xs text-slate-500 font-bold uppercase">Total</span>
                            <span class="text-2xl font-black text-white"><span class="curr-sym"></span><span id="total">0</span></span>
                        </div>
                        <input type="number" id="cashInput" class="w-full p-4 bg-slate-800 rounded-xl text-center font-bold text-xl outline-none border border-slate-700 focus:border-teal-500">
                        <button id="checkoutBtn" onclick="checkout()" class="w-full bg-teal-600 p-4 rounded-xl font-black py-5 shadow-lg uppercase tracking-widest" id="lang-pay-btn">PAY</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="page-manage" class="page-content p-4">
            <div class="max-w-4xl mx-auto">
                <div class="bg-slate-900 p-6 rounded-3xl border border-slate-800 mb-6">
                    <h3 class="text-teal-400 font-black mb-4 uppercase text-xs tracking-widest" id="lang-add-title"></h3>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                        <input id="new-name" placeholder="Name" class="bg-slate-800 p-4 rounded-xl text-sm border border-slate-700 outline-none">
                        <input id="new-sell" type="number" placeholder="Price" class="bg-slate-800 p-4 rounded-xl text-sm border border-slate-700 outline-none">
                        <input id="new-cost" type="number" placeholder="Cost" class="bg-slate-800 p-4 rounded-xl text-sm border border-slate-700 outline-none">
                        <input id="new-stock" type="number" placeholder="Stock" class="bg-slate-800 p-4 rounded-xl text-sm border border-slate-700 outline-none">
                    </div>
                    <button onclick="addNewProduct()" class="mt-4 w-full bg-teal-600 p-4 rounded-xl font-black uppercase text-sm">Update Stock</button>
                </div>
                <div id="manageList" class="space-y-3 pb-20"></div>
            </div>
        </div>

        <div id="page-history" class="page-content p-4">
            <div class="max-w-2xl mx-auto space-y-6">
                <div class="flex justify-between items-center bg-slate-900 p-6 rounded-2xl border border-slate-800">
                    <div>
                        <p class="text-[9px] text-slate-500 font-bold uppercase mb-1">Total Sales</p>
                        <p id="sumRevenue" class="text-2xl font-black text-white">0</p>
                    </div>
                    <button onclick="exportStatement()" class="bg-teal-600 px-4 py-2 rounded-xl font-black text-[10px] uppercase">Export PDF</button>
                </div>
                <div id="historyList" class="space-y-3 pb-20"></div>
            </div>
        </div>

        <div id="page-settings" class="page-content p-4">
            <div class="max-w-md mx-auto space-y-6">
                <div class="bg-slate-900 p-8 rounded-3xl border border-slate-800 shadow-2xl text-center">
                    <img src="https://tactykz.com/wp-content/uploads/2026/03/NA2625-CR.png" alt="Logo" class="w-32 mx-auto mb-6">
                    <h2 class="text-teal-400 font-black mb-6 uppercase tracking-widest">Store Setup</h2>
                    <div class="space-y-4 text-left">
                        <div>
                            <label class="text-[9px] text-slate-500 font-bold uppercase mb-2 block">Language / Currency</label>
                            <select onchange="changeLanguage(this.value)" class="w-full bg-slate-800 border border-slate-700 p-4 rounded-xl font-bold uppercase outline-none text-teal-400">
                                <option value="id">Bahasa Indonesia (IDR)</option>
                                <option value="en">English (USD)</option>
                                <option value="nl">Dutch (EUR)</option>
                                <option value="jp">Japan (JPY)</option>
                                <option value="kr">Korean (KRW)</option>
                                <option value="cn">China (CNY)</option>
                                <option value="my">Melayu (MYR)</option>
                                <option value="ph">Tagalog (PHP)</option>
                                <option value="pk">Pakistani (PKR)</option>
                                <option value="np">Nepal (NPR)</option>
                            </select>
                        </div>
                        <input id="set-name" placeholder="Store Name" class="w-full bg-slate-800 p-4 rounded-xl border border-slate-700 outline-none">
                        <textarea id="set-addr" placeholder="Address" class="w-full bg-slate-800 p-4 rounded-xl border border-slate-700 outline-none h-20"></textarea>
                        <button onclick="saveSettings()" class="w-full bg-teal-600 p-4 rounded-xl font-black uppercase shadow-lg">Save Config</button>
                    </div>
                </div>
                <button onclick="logout()" class="w-full bg-red-600/10 text-red-500 p-4 rounded-xl font-black uppercase border border-red-900/30">Logout Session</button>
            </div>
        </div>
    </main>
</div>

<div id="invoiceModal" class="modal">
    <div class="bg-white text-slate-900 w-[90%] max-w-[350px] p-6 rounded-2xl">
        <div id="receiptArea" class="text-center font-mono text-[12px] p-2">
            <img src="https://tactykz.com/wp-content/uploads/2026/03/NA2625-CR.png" alt="Logo" class="w-20 mx-auto mb-2 grayscale">
            <h2 id="invStoreName" class="font-black text-sm uppercase">NA2625</h2>
            <p id="invStoreAddr" class="text-[9px] mb-4"></p>
            <div id="receiptItems" class="text-left border-t border-dashed border-gray-300 py-2 space-y-1"></div>
            <div class="border-t border-dashed border-gray-300 pt-2 font-bold flex justify-between">
                <span>TOTAL</span><span id="recTotal"></span>
            </div>
        </div>
        <div class="grid grid-cols-2 gap-2 mt-4">
            <button onclick="printBluetooth()" class="bg-teal-600 text-white p-3 rounded-xl font-black text-[10px] uppercase">BT Print</button>
            <button onclick="closeModal('invoiceModal')" class="bg-slate-100 p-3 rounded-xl font-bold text-slate-400 uppercase text-[10px]">Close</button>
        </div>
    </div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbweov-VD-18mMRdQJ6IbAv6Mcx2Oesq8naGvDfHpDQkdbVYlMh6VKlqFdb30tsdd59p/exec";
let currentLang = 'id';
let products = [], cart = [], currentUser = "", historyData = [], salesCount = {};

const translations = {
    id: { cashier: 'KASIR', inv: 'INVENTARIS', hist: 'RIWAYAT', sett: 'PENGATURAN', search: 'Cari produk...', cart: 'KERANJANG', pay: 'BAYAR SEKARANG', add: 'TAMBAH PRODUK', sym: 'Rp' },
    en: { cashier: 'CASHIER', inv: 'INVENTORY', hist: 'HISTORY', sett: 'SETTINGS', search: 'Search items...', cart: 'CART', pay: 'CHECKOUT', add: 'ADD NEW ITEM', sym: '$' },
    nl: { cashier: 'KASSA', inv: 'VOORRAAD', hist: 'HISTORIE', sett: 'INSTELLINGEN', search: 'Zoeken...', cart: 'MANDJE', pay: 'BETALEN', add: 'ITEM TOEVOEGEN', sym: '€' },
    jp: { cashier: 'レジ', inv: '在庫管理', hist: '販売履歴', sett: '環境設定', search: '検索...', cart: 'カート', pay: '決済する', add: '新規登録', sym: '¥' },
    kr: { cashier: '계산대', inv: '재고관리', hist: '판매기록', sett: '시스템설정', search: '검색...', cart: '장바구니', pay: '결제하기', add: '품목추가', sym: '₩' },
    cn: { cashier: '收银', inv: '库存', hist: '记录', sett: '设置', search: '搜索...', cart: '购物车', pay: '结账', add: '新增产品', sym: '¥' },
    my: { cashier: 'KAUNTER', inv: 'INVENTORI', hist: 'REKOD', sett: 'TETAPAN', search: 'Cari...', cart: 'BAKUL', pay: 'BAYAR', add: 'TAMBAH BARANG', sym: 'RM' },
    ph: { cashier: 'KAHERA', inv: 'IMBENTARYO', hist: 'KASAYSAYAN', sett: 'SETTING', search: 'Hanapin...', cart: 'CART', pay: 'MAGBAYAD', add: 'DAGDAGAN', sym: '₱' },
    pk: { cashier: 'کیشیر', inv: 'اسٹاک', hist: 'تاریخ', sett: 'سیٹنگز', search: 'تلاش کریں', cart: 'جھولی', pay: 'ادائیگی', add: 'نیا شامل کریں', sym: 'Rs' },
    np: { cashier: 'क्यासियर', inv: 'मौज्दात', hist: 'इतिहास', sett: 'सेटिङ', search: 'खोज्नुहोस्', cart: 'कार्ट', pay: 'तिर्नुहोस्', add: 'थप्नुहोस्', sym: 'रू' }
};

function changeLanguage(lang) {
    currentLang = lang;
    const t = translations[lang];
    document.getElementById('lang-nav-cashier').innerText = t.cashier;
    document.getElementById('lang-nav-inv').innerText = t.inv;
    document.getElementById('lang-nav-hist').innerText = t.hist;
    document.getElementById('lang-nav-sett').innerText = t.sett;
    document.getElementById('posSearch').placeholder = t.search;
    document.getElementById('lang-cart-title').innerText = t.cart;
    document.getElementById('checkoutBtn').innerText = t.pay;
    document.getElementById('lang-add-title').innerText = t.add;
    document.querySelectorAll('.curr-sym').forEach(el => el.innerText = t.sym);
    localStorage.setItem('NA_POS_LANG', lang);
    renderProducts();
}

async function doLogin() {
    const u = document.getElementById('user').value, p = document.getElementById('pass').value;
    if(!u || !p) return;
    const res = await fetch(API, { method: 'POST', body: JSON.stringify({ type: 'login', user: u, pass: p }) });
    const data = await res.json();
    if(data.success) { localStorage.setItem('NA_POS_USER', u); location.reload(); }
}

function logout() { localStorage.removeItem('NA_POS_USER'); location.reload(); }

async function loadAppData() {
    try {
        const [pRes, hRes] = await Promise.all([fetch(API+"?type=products"), fetch(API+"?type=transactions")]);
        products = await pRes.json();
        historyData = (await hRes.json()).reverse();
        calculateAnalytics();
        renderProducts();
        renderHistory();
        if(document.getElementById('page-manage').classList.contains('active')) renderManage();
    } catch(e) { showToast("Sync Failed", true); }
}

function calculateAnalytics() {
    salesCount = {};
    historyData.forEach(row => {
        try { JSON.parse(row[5]).forEach(it => { salesCount[it.name] = (salesCount[it.name] || 0) + it.qty; }); } catch(e) {}
    });
}

function renderProducts() {
    const q = document.getElementById('posSearch').value.toLowerCase();
    const sym = translations[currentLang].sym;
    const best = Object.keys(salesCount).reduce((a, b) => salesCount[a] > salesCount[b] ? a : b, "");
    
    document.getElementById('productsGrid').innerHTML = products.filter(p => p.name.toLowerCase().includes(q)).map(p => `
        <div onclick="addToCart('${p.name}')" class="relative bg-slate-900 rounded-2xl p-4 border ${p.name===best?'border-teal-500':'border-slate-800'} text-center shadow-lg active:scale-95 transition-all">
            ${p.name===best?'<span class="absolute -top-2 -left-2 bg-teal-500 text-slate-950 text-[7px] font-black px-2 py-1 rounded-lg">TOP SELL</span>':''}
            <p class="font-black text-[10px] text-white truncate uppercase mb-1">${p.name}</p>
            <p class="text-teal-400 font-black text-sm">${sym}${p.sell.toLocaleString()}</p>
            <p class="text-[8px] ${p.stock<5?'text-red-500':'text-slate-600'} mt-2 uppercase">Stock: ${p.stock}</p>
        </div>`).join("");
}

function addToCart(name) {
    const p = products.find(x => x.name === name);
    if(p.stock <= 0) return showToast("No Stock", true);
    let i = cart.find(x => x.name === name);
    if (i) { if(i.qty >= p.stock) return; i.qty++; }
    else cart.push({ name: p.name, qty: 1, price: p.sell, cost: p.cost });
    renderCart();
}

function renderCart() {
    let t = 0; const sym = translations[currentLang].sym;
    document.getElementById('cartItems').innerHTML = cart.map(i => {
        t += i.qty * i.price;
        return `<div class="bg-slate-800 p-3 rounded-xl flex justify-between items-center border border-slate-700">
            <div><p class="text-[9px] font-black text-white uppercase">${i.name}</p>
            <p class="text-[9px] text-teal-400">${sym}${(i.qty*i.price).toLocaleString()}</p></div>
            <span class="font-bold text-xs">x${i.qty}</span>
        </div>`;
    }).join("");
    document.getElementById('total').innerText = t.toLocaleString();
}

async function checkout() {
    const total = cart.reduce((sum, i) => sum + (i.qty * i.price), 0);
    const paid = Number(document.getElementById('cashInput').value || 0);
    if (cart.length === 0 || paid < total) return showToast("Check Cart/Cash", true);
    const profit = cart.reduce((sum, i) => sum + (i.qty * (i.price - i.cost)), 0);
    showToast("PROCESSING...");
    await fetch(API, { method: 'POST', body: JSON.stringify({ 
        type: 'addTransaction', user: currentUser, total, profit, items: JSON.stringify(cart), paid, change: paid - total 
    })});
    showInvoice(currentUser, [...cart], total, paid, paid-total);
    cart = []; document.getElementById('cashInput').value = "";
    loadAppData();
}

function showInvoice(user, items, total, paid, change) {
    const set = JSON.parse(localStorage.getItem('NA_POS_SETTINGS') || '{}');
    const sym = translations[currentLang].sym;
    document.getElementById('invStoreName').innerText = set.name || "NA2625";
    document.getElementById('invStoreAddr').innerText = set.addr || "";
    document.getElementById('recTotal').innerText = sym + total.toLocaleString();
    document.getElementById('receiptItems').innerHTML = items.map(i => `<div class="flex justify-between"><span>${i.name} x${i.qty}</span><span>${(i.qty*i.price).toLocaleString()}</span></div>`).join("");
    document.getElementById('invoiceModal').classList.add('active');
}

async function printBluetooth() {
    const set = JSON.parse(localStorage.getItem('NA_POS_SETTINGS') || '{}');
    const encoder = new TextEncoder();
    let cmds = ['\x1B\x40', '\x1B\x61\x01', (set.name || "NA2625").toUpperCase() + '\n', '--------------------------------\n'];
    cart.forEach(i => cmds.push(`${i.name.substring(0,20)} x${i.qty}\n`));
    cmds.push('--------------------------------\n', `TOTAL: ${document.getElementById('recTotal').innerText}\n\n\n`);
    const data = encoder.encode(cmds.join(''));
    try {
        const device = await navigator.bluetooth.requestDevice({ filters: [{ services: ['000018f0-0000-1000-8000-00805f9b34fb'] }] });
        const server = await device.gatt.connect();
        const service = await server.getPrimaryService('000018f0-0000-1000-8000-00805f9b34fb');
        const characteristic = await service.getCharacteristic('00002af1-0000-1000-8000-00805f9b34fb');
        await characteristic.writeValue(data);
    } catch (e) { alert("BT Fail: Use Screen Print"); }
}

function exportStatement() {
    const win = window.open('', '_blank');
    const sym = translations[currentLang].sym;
    const rows = historyData.map(r => `<tr><td>${new Date(r[0]).toLocaleDateString()}</td><td>${sym}${Number(r[3]).toLocaleString()}</td></tr>`).join("");
    win.document.write(`<html><body><h1>NA2625 Sales Report</h1><table border="1" width="100%">${rows}</table></body></html>`);
    win.document.close(); win.print();
}

function renderManage() {
    document.getElementById('manageList').innerHTML = products.map((p, idx) => `
        <div class="bg-slate-900 p-4 rounded-xl border border-slate-800 flex justify-between items-center">
            <span class="text-[10px] font-black uppercase text-teal-400">${p.name}</span>
            <div class="flex gap-2">
                <input id="stk-${idx}" type="number" value="${p.stock}" class="w-16 bg-slate-800 p-2 rounded text-[10px] outline-none">
                <button onclick="updateStock('${p.name}', ${idx})" class="bg-teal-600 px-3 py-1 rounded text-[9px] font-bold">SAVE</button>
            </div>
        </div>`).join("");
}

async function updateStock(name, idx) {
    const nS = Number(document.getElementById(`stk-${idx}`).value);
    await fetch(API, { method: 'POST', body: JSON.stringify({ type: 'editProduct', oldName: name, name, stock: nS })});
    loadAppData(); showToast("STOCK SAVED");
}

function renderHistory() {
    const sym = translations[currentLang].sym;
    let rev = 0;
    document.getElementById('historyList').innerHTML = historyData.map(r => {
        rev += Number(r[3]);
        return `<div class="bg-slate-900 p-4 rounded-xl border border-slate-800 flex justify-between items-center">
            <div><p class="text-[8px] text-slate-500">${new Date(r[0]).toLocaleString()}</p>
            <p class="font-black text-white">${sym}${Number(r[3]).toLocaleString()}</p></div>
        </div>`;
    }).join("");
    document.getElementById('sumRevenue').innerText = sym + rev.toLocaleString();
}

function showPage(p) {
    document.querySelectorAll('.page-content').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(x => x.classList.remove('active'));
    document.getElementById('page-' + p).classList.add('active');
    const btn = Array.from(document.querySelectorAll('.nav-btn')).find(b => b.getAttribute('onclick').includes(`'${p}'`));
    if (btn) btn.classList.add('active');
    if (p === 'manage') renderManage();
    if (p === 'settings') loadSettings();
}

function loadSettings() {
    const s = JSON.parse(localStorage.getItem('NA_POS_SETTINGS') || '{}');
    document.getElementById('set-name').value = s.name || "";
    document.getElementById('set-addr').value = s.addr || "";
}

function saveSettings() {
    localStorage.setItem('NA_POS_SETTINGS', JSON.stringify({
        name: document.getElementById('set-name').value, addr: document.getElementById('set-addr').value
    })); showToast("SETTINGS SAVED");
}

function showToast(m, e=false) {
    const t = document.getElementById('toast'); t.innerText = m;
    t.style.background = e ? '#ef4444' : '#0d9488';
    t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500);
}

function closeModal(id) { document.getElementById(id).classList.remove('active'); }

async function addNewProduct() {
    const n = document.getElementById('new-name').value, s = Number(document.getElementById('new-sell').value);
    const c = Number(document.getElementById('new-cost').value), st = Number(document.getElementById('new-stock').value);
    if(!n || !s) return;
    await fetch(API, { method: 'POST', body: JSON.stringify({ type: 'addProduct', name: n, sell: s, cost: c, stock: st }) });
    loadAppData();
}

window.onload = () => {
    const savedU = localStorage.getItem('NA_POS_USER');
    const savedL = localStorage.getItem('NA_POS_LANG') || 'id';
    changeLanguage(savedL);
    if (savedU) {
        currentUser = savedU;
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('app').classList.remove('hidden');
        loadAppData();
    }
};
</script>
</body>
</html>
