<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NA2625 POS</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body{background:#f1f5f9;font-family:sans-serif}
.sidebar{background:#020617}
.navBtn{display:block;width:100%;text-align:left;padding:10px;border-radius:8px}
.navBtn:hover{background:#1e293b}
.card{background:white;border-radius:12px;padding:12px;box-shadow:0 4px 10px rgba(0,0,0,0.08)}
.page{display:none}
.page.active{display:block}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar text-white w-60 fixed h-full p-4 hidden md:block">
  <div class="text-xl font-bold mb-6">NA2625</div>
  <button onclick="showPage('cashier')" class="navBtn">🧾 Cashier</button>
  <button onclick="showPage('products')" class="navBtn">📦 Products</button>
  <button onclick="showPage('stock')" class="navBtn">📥 Stock</button>
  <button onclick="showPage('analytics')" class="navBtn">📊 Analytics</button>
</div>

<!-- MAIN -->
<div class="md:ml-64 p-4">

<!-- CASHIER -->
<div id="cashier" class="page active">
  <h1 class="text-xl mb-3">Cashier</h1>
  <div class="grid md:grid-cols-3 gap-4">

    <div class="md:col-span-2">
      <div id="productsGrid" class="grid grid-cols-2 md:grid-cols-3 gap-3"></div>
    </div>

    <div class="card">
      <h2 class="font-bold">Cart</h2>
      <div id="cartItems"></div>
      <div>Total: <b id="total">0</b></div>
      <button onclick="checkout()" class="bg-green-500 text-white w-full mt-2 p-2 rounded">Checkout</button>
    </div>

  </div>
</div>

<!-- PRODUCTS -->
<div id="products" class="page">
  <h1 class="text-xl mb-3">Products</h1>

  <div class="card grid grid-cols-5 gap-2">
    <input id="pName" placeholder="Name" class="border p-2">
    <input id="pSell" placeholder="Sell" class="border p-2">
    <input id="pCost" placeholder="Cost" class="border p-2">
    <input id="pStock" placeholder="Stock" class="border p-2">
    <input id="pImg" placeholder="Image URL" class="border p-2">
  </div>

  <button onclick="addProduct()" class="bg-green-500 text-white p-2 mt-2 rounded">Add Product</button>

  <div id="productList" class="mt-4"></div>
</div>

<!-- STOCK -->
<div id="stock" class="page">
  <h1 class="text-xl mb-3">Stock</h1>

  <select id="stockProduct" class="border p-2"></select>
  <input id="stockQty" type="number" class="border p-2">
  <button onclick="updateStock()" class="bg-blue-500 text-white p-2">Update</button>
</div>

<!-- ANALYTICS -->
<div id="analytics" class="page">
  <h1 class="text-xl mb-3">Analytics</h1>
  <div id="report" class="card"></div>
</div>

</div>

<script>
const API="https://script.google.com/macros/s/AKfycbw79UUvDLUP-IZK70yL4YkJvYBf0liNSDY1bichPotvYjyvEFKUBP09iFfxGtItzIBr/exec";

let products=[],cart=[];

/* NAV */
function showPage(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* LOAD */
async function load(){
  let res=await fetch(API+"?type=products");
  let data=await res.json();

  products=data.slice(1).map(p=>({
    name:p[0],sell:+p[1],cost:+p[2],stock:+p[3],image:p[5]
  }));

  renderProducts();
  renderProductList();
  renderStockDropdown();
}

/* CASHIER PRODUCTS */
function renderProducts(){
  productsGrid.innerHTML=products.map(p=>`
    <div class="card" onclick="addToCart('${p.name}')">
      <img src="${p.image||'https://via.placeholder.com/100'}" class="w-full h-24 object-cover">
      <div>${p.name}</div>
      <div>Rp ${p.sell}</div>
    </div>
  `).join("");
}

/* CART */
function addToCart(name){
  let p=products.find(x=>x.name===name);
  let ex=cart.find(i=>i.name===name);
  if(ex) ex.qty++;
  else cart.push({name:p.name,qty:1,price:p.sell});
  renderCart();
}

function renderCart(){
  let t=0;
  cartItems.innerHTML=cart.map(i=>{
    let sub=i.qty*i.price;
    t+=sub;
    return `<div>${i.name} x${i.qty} = ${sub}</div>`;
  }).join("");
  total.innerText=t;
}

/* CHECKOUT */
async function checkout(){
  await fetch(API,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      type:"addTransaction",
      items:JSON.stringify(cart),
      total:total.innerText,
      profit:0,
      customer:"-"
    })
  });
  cart=[];
  renderCart();
}

/* PRODUCTS PAGE */
async function addProduct(){
  await fetch(API,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      type:"addProduct",
      name:pName.value,
      sell:pSell.value,
      cost:pCost.value,
      stock:pStock.value,
      image:pImg.value
    })
  });
  load();
}

function renderProductList(){
  productList.innerHTML=products.map(p=>`
    <div class="card flex justify-between">
      ${p.name} (${p.stock})
      <button onclick="deleteProduct('${p.name}')">❌</button>
    </div>
  `).join("");
}

async function deleteProduct(name){
  await fetch(API,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({type:"deleteProduct",name})
  });
  load();
}

/* STOCK */
function renderStockDropdown(){
  stockProduct.innerHTML=products.map(p=>`<option>${p.name}</option>`).join("");
}

async function updateStock(){
  await fetch(API,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      type:"updateStock",
      name:stockProduct.value,
      qty:+stockQty.value,
      action:"ADD"
    })
  });
  load();
}

/* ANALYTICS */
async function loadAnalytics(){
  let res=await fetch(API+"?type=transactions");
  let data=await res.json();

  let total=0;
  data.slice(1).forEach(r=>total+=+r[2]);

  report.innerHTML=`Total Revenue: Rp ${total}`;
}

load();
</script>

</body>
</html>
